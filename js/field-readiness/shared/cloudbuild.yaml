steps:
  - name: gcr.io/cloud-builders/docker
    dir: js/field-readiness/shared
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/farmvista-field-weather-sharedreadiness:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/farmvista-field-weather-sharedreadiness:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - farmvista-field-weather-sharedreadiness
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/farmvista-field-weather-sharedreadiness:$COMMIT_SHA
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/farmvista-field-weather-sharedreadiness:$COMMIT_SHA
