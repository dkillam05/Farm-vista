<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FarmVista • Weather / Readiness Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B7E46"/>

  <link rel="manifest" href="/Farm-vista/manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="/Farm-vista/assets/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/Farm-vista/assets/icons/icon-192.png"/>

  <script src="/Farm-vista/js/theme-boot.js"></script>
  <link rel="stylesheet" href="/Farm-vista/assets/css/theme.css"/>
  <link rel="stylesheet" href="/Farm-vista/assets/css/app.css"/>

  <script src="/Farm-vista/js/firebase-config.js"></script>

  <script>
    window.FV_DATE_RANGE_PICKER_CONFIG = {
      disallowFuture: true,
      maxLookbackDays: 30
    };
  </script>
  <script src="/Farm-vista/js/fv-date-range-picker.js"></script>

  <script>
    (function(){
      if(!customElements.get('fv-shell')){
        const s = document.createElement('script');
        s.src = '/Farm-vista/js/fv-shell.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>

  <style>
    :root{
      --glass: rgba(255,255,255,.84);
      --glass-border: rgba(255,255,255,.18);
      --glass-shadow: 0 14px 36px rgba(0,0,0,.18);
      --text-dark: #18211b;
      --blur: blur(14px);
      --menu-w: min(320px, calc(100vw - 18px));
    }

    html.dark{
      --glass: rgba(22,28,24,.80);
      --glass-border: rgba(255,255,255,.08);
      --glass-shadow: 0 16px 44px rgba(0,0,0,.38);
      --text-dark: #f3f7f2;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#253327;
    }

    body{
      color:var(--text-dark);
    }

    fv-shell{
      display:block;
      width:100%;
      height:100%;
    }

    .rain-page{
      position:fixed;
      left:0;
      right:0;
      top:calc(var(--hdr-h, 74px) + env(safe-area-inset-top, 0px));
      bottom:calc(var(--ftr-h, 42px));
      overflow:hidden;
      background:#233125;
    }

    .map-stage,
    #rainMap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    #rainMap{
      background:#dfe5dd;
    }

        .glass{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 14px 36px rgba(0,0,0,.18);
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    html.dark .glass{
      background:rgba(22,28,24,.96);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 44px rgba(0,0,0,.38);
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .top-left-tools{
      position:absolute;
      top:10px;
      left:10px;
      z-index:35;
      pointer-events:none;
    }

    .top-left-tools > *{
      pointer-events:auto;
    }

.top-tools{
  position:absolute;
  top:10px;
  right:10px;
  z-index:35;
  pointer-events:auto;
}

    .icon-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      color:var(--text-dark);
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      padding:0;
      text-decoration:none;
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      display:block;
      flex:0 0 auto;
    }

    .icon-btn:active{
      transform:translateY(1px);
    }

    .panel-menu{
      position:absolute;
      top:58px;
      right:0;
      z-index:36;
      width:var(--menu-w);
      max-width:calc(100vw - 12px);
      padding:12px;
      border-radius:18px;
      display:none;
      pointer-events:auto;
      max-height:min(76vh, 720px);
      overflow-y:auto;
      overflow-x:visible;
      box-sizing:border-box;
      overscroll-behavior:contain;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }

    .panel-menu::-webkit-scrollbar{
      width:0;
      height:0;
      display:none;
    }

    .panel-menu *{
      box-sizing:border-box;
      min-width:0;
    }

    .panel-menu.open{
      display:block;
    }

    .menu-field{
      margin-bottom:12px;
      position:relative;
      min-width:0;
      overflow:visible;
    }

    .menu-field:last-child{
      margin-bottom:0;
    }

    .menu-field label{
      display:block;
      margin:0 0 6px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text-dark);
      opacity:.84;
    }

    .menu-select{
      width:100%;
      max-width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:
        linear-gradient(45deg, transparent 50%, rgba(0,0,0,.42) 50%),
        linear-gradient(135deg, rgba(0,0,0,.42) 50%, transparent 50%),
        color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      background-position:
        calc(100% - 21px) calc(50% - 3px),
        calc(100% - 13px) calc(50% - 3px),
        0 0;
      background-size:8px 8px, 8px 8px, 100% 100%;
      background-repeat:no-repeat;
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px 38px 12px 12px;
      outline:none;
      box-sizing:border-box;
    }

    .menu-input{
      width:100%;
      max-width:100%;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px;
      outline:none;
      box-sizing:border-box;
      cursor:pointer;
    }

    .menu-input::placeholder{
      color:color-mix(in srgb, var(--text-dark) 72%, transparent 28%);
      opacity:1;
    }

    .menu-btn{
      width:100%;
      max-width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      border:none;
      border-radius:14px;
      background:color-mix(in srgb, #2F6C3C 88%, #ffffff 12%);
      color:#fff;
      font:inherit;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(47,108,60,.28);
      text-align:center;
      white-space:normal;
    }

    .menu-btn:active{
      transform:translateY(1px);
    }

    .menu-inline{
      display:grid;
      gap:8px;
      margin-top:2px;
      min-width:0;
      overflow:hidden;
    }

    .menu-pill{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:12px;
      padding:10px 12px;
      background:color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
      font-size:13px;
      font-weight:900;
      color:var(--text-dark);
      min-width:0;
      overflow:hidden;
    }

    .menu-pill > span{
      min-width:0;
    }

    .menu-pill .mutedish{
      opacity:.72;
      font-weight:800;
      flex:0 0 auto;
    }

    .menu-debug{
      font-size:11px;
      color:var(--text-dark);
      opacity:.78;
      line-height:1.25;
      margin-top:2px;
      word-break:break-word;
      overflow-wrap:anywhere;
      min-width:0;
    }

    .menu-subtle{
      font-size:11px;
      line-height:1.3;
      color:var(--text-dark);
      opacity:.76;
      margin-top:6px;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .mode-section[hidden]{
      display:none !important;
    }

    #calendarPopover{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      left:auto;
      width:min(360px, 92vw);
      max-width:min(360px, calc(100vw - 24px));
      background:var(--glass);
      border:1px solid var(--glass-border);
      border-radius:16px;
      box-shadow:0 14px 45px rgba(0,0,0,.25);
      padding:12px;
      display:none;
      z-index:100000;
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      box-sizing:border-box;
      overflow-x:hidden;
    }

    @media (max-width:520px){
      #calendarPopover{
        width:min(340px, 92vw);
        right:0;
      }
    }

    .cal-top{
      display:grid;
      grid-template-columns:1fr 1fr 36px;
      gap:10px;
      align-items:center;
      margin-bottom:10px;
      min-width:0;
    }

    .cal-xbtn{
      width:34px;
      height:34px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.08);
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text-dark);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      padding:0;
    }

    .cal-xbtn svg{
      width:18px;
      height:18px;
      display:block;
    }

    .cal-xbtn:active{
      transform:translateY(1px);
    }

    #calDays{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      min-width:0;
    }

    .cal-day{
      border:1px solid rgba(0,0,0,.08);
      border-radius:10px;
      padding:10px 0;
      text-align:center;
      font-size:12px;
      cursor:pointer;
      background:color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
      user-select:none;
      color:var(--text-dark);
      font-weight:800;
    }

    .cal-day.other-month{
      opacity:.45;
    }

    .cal-day.in-range{
      background:color-mix(in srgb, #2F6C3C 14%, var(--surface) 86%);
    }

    .cal-day.range-start,
    .cal-day.range-end,
    .cal-day.single-day,
    .cal-day.start-selected{
      background:#2F6C3C;
      color:#fff;
      border-color:transparent;
    }

    .cal-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
      min-width:0;
    }

    .cal-actions{
      display:flex;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .cal-btn{
      min-width:auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:38px;
      border-radius:12px;
      font:inherit;
      font-size:13px;
      font-weight:900;
      padding:0 12px;
      cursor:pointer;
      white-space:nowrap;
    }

    .cal-btn-neutral{
      border:1px solid rgba(0,0,0,.08);
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text-dark);
    }

    .cal-btn-primary{
      border:none;
      background:#2F6C3C;
      color:#fff;
    }

    .left-legend{
      position:absolute;
      left:8px;
      top:50%;
      transform:translateY(-50%);
      z-index:20;
      width:40px;
      pointer-events:none;
    }

    .legend-wrap{
      position:relative;
      width:100%;
      height:min(46vh, 380px);
      min-height:230px;
      border-radius:14px;
      overflow:visible;
    }

    .legend-bar{
      position:absolute;
      left:0;
      top:0;
      width:12px;
      height:100%;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      background:
        linear-gradient(
          to top,
          #58a8ff 0%,
          #6cc7ff 12%,
          #55d79a 24%,
          #46d14d 38%,
          #d7df49 54%,
          #f0b843 72%,
          #ef6b46 88%,
          #d92cc6 100%
        );
    }

    .legend-bar.readiness{
      background:
        linear-gradient(
          to top,
          #2f8f4b 0%,
          #53b85d 20%,
          #88c14d 34%,
          #d7df49 52%,
          #f0b843 72%,
          #e16b43 88%,
          #c83b3b 100%
        );
    }

    .legend-label{
      position:absolute;
      left:18px;
      transform:translateY(50%);
      font-size:10px;
      font-weight:900;
      color:#fff;
      line-height:1;
      text-shadow:0 1px 4px rgba(0,0,0,.55);
      white-space:nowrap;
    }

    .legend-label.l1{ bottom:100%; transform:translateY(0); }
    .legend-label.l2{ bottom:83%; }
    .legend-label.l3{ bottom:68%; }
    .legend-label.l4{ bottom:50%; }
    .legend-label.l5{ bottom:34%; }
    .legend-label.l6{ bottom:18%; }
    .legend-label.l7{ bottom:0; transform:translateY(0); }

    .map-chip{
      position:absolute;
      left:50%;
      bottom:12px;
      transform:translateX(-50%);
      z-index:24;
      pointer-events:none;
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      color:var(--text-dark);
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:900;
      letter-spacing:.02em;
      white-space:nowrap;
      max-width:min(90vw, 640px);
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .popup-card{
      max-width:260px;
      font-size:13px;
      line-height:1.28;
      color:#18211b;
    }

    .popup-card .name{
      font-weight:900;
      margin:0 0 4px;
    }

    .popup-card .muted{
      opacity:.76;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-weight:800;
    }

    @media (max-width:680px){
      .icon-btn{
        width:44px;
        height:44px;
      }

      .panel-menu{
        top:52px;
        width:min(280px, calc(100vw - 16px));
        max-width:calc(100vw - 16px);
      }

      .left-legend{
        left:4px;
        width:30px;
      }

      .legend-wrap{
        height:min(38vh, 280px);
        min-height:180px;
      }

      .legend-bar{
        width:10px;
      }

      .legend-label{
        left:15px;
        font-size:9px;
      }

      .map-chip{
        bottom:8px;
        font-size:11px;
        padding:8px 12px;
      }
    }
  </style>
</head>

<body>
  <fv-shell data-boot-hold-ms="3000">
    <div class="rain-page">
      <div class="map-stage">
        <div id="rainMap" aria-label="Weather and readiness map"></div>

        <div class="top-left-tools">
          <a
            id="btnBack"
            class="icon-btn"
            href="/Farm-vista/pages/crop-production/field-weather.html"
            aria-label="Back to Field Weather"
            title="Back to Field Weather"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>

        <div class="left-legend" aria-label="Map legend">
          <div class="legend-wrap">
            <div id="legendBar" class="legend-bar"></div>
            <span class="legend-label l1" id="legendTop">Max</span>
            <span class="legend-label l2" id="legendQ5"></span>
            <span class="legend-label l3" id="legendQ4"></span>
            <span class="legend-label l4" id="legendMid"></span>
            <span class="legend-label l5" id="legendQ2"></span>
            <span class="legend-label l6" id="legendQ1"></span>
            <span class="legend-label l7" id="legendBottom">Min</span>
          </div>
        </div>

        <div id="mapModeChip" class="map-chip">Rainfall Map</div>

        <div class="top-tools">
          <button id="btnMenu" class="icon-btn" type="button" aria-label="Map options">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7H20M4 12H20M4 17H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>

          <div id="menuPanel" class="glass panel-menu" aria-label="Map controls">
            <div class="menu-field">
              <label for="mapModeSel">Map data</label>
              <select id="mapModeSel" class="menu-select">
                <option value="rainfall" selected>Rainfall</option>
                <option value="readiness">Readiness</option>
              </select>
            </div>

            <div class="menu-field">
              <label for="viewSel">Map style</label>
              <select id="viewSel" class="menu-select">
                <option value="hybrid" selected>Satellite Hybrid</option>
                <option value="roadmap">Road Map</option>
                <option value="terrain">Terrain</option>
              </select>
            </div>

            <div id="rainModeSection" class="mode-section">
              <div class="menu-field">
                <label for="radiusSel">Blend radius</label>
                <select id="radiusSel" class="menu-select">
                  <option value="900">Tight</option>
                  <option value="1300">Medium</option>
                  <option value="1800" selected>Blended</option>
                  <option value="2400">Broad</option>
                  <option value="3200">Extra Broad</option>
                </select>
              </div>

              <div class="menu-field">
                <label for="jobRangeInput">Time frame</label>
                <input id="jobRangeInput" class="menu-input" type="text" readonly placeholder="Choose date range"/>

                <div id="calendarPopover" aria-label="Date range picker">
                  <div class="cal-top">
                    <select id="monthSelect" class="menu-select" style="padding:10px"></select>
                    <select id="yearSelect" class="menu-select" style="padding:10px"></select>

                    <button id="closeCalBtn" class="cal-xbtn" type="button" aria-label="Close">
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
                      </svg>
                    </button>
                  </div>

                  <div id="calDays"></div>

                  <div class="cal-footer">
                    <span id="rangeSummary" style="font-size:12px; opacity:.86;">No dates selected</span>
                    <div class="cal-actions">
                      <button id="clearRangeBtn" class="cal-btn cal-btn-neutral" type="button">Clear</button>
                      <button id="applyRangeBtn" class="cal-btn cal-btn-primary" type="button">Apply</button>
                    </div>
                  </div>
                </div>

                <div class="menu-subtle">
                  Rainfall legend now lifts its lower end off zero when the displayed map never gets near zero, so lower-end fields separate better.
                </div>
              </div>

              <div class="menu-field">
                <label>Refresh</label>
                <button id="btnRefreshRain" class="menu-btn" type="button">Reload Rainfall</button>
              </div>
            </div>

            <div id="readinessModeSection" class="mode-section" hidden>
              <div class="menu-field">
                <label>Refresh</label>
                <button id="btnRefreshReadiness" class="menu-btn" type="button">Reload Readiness</button>
              </div>
            </div>

            <div class="menu-field">
              <label>Map status</label>
              <div class="menu-inline">
                <div class="menu-pill">
                  <span class="mutedish">Status</span>
                  <span id="statusText">Loading…</span>
                </div>
                <div class="menu-pill">
                  <span class="mutedish">Fields / Points</span>
                  <span><span id="fieldsText" class="mono">0</span> / <span id="pointsText" class="mono">0</span></span>
                </div>
                <div class="menu-pill">
                  <span class="mutedish">Mode</span>
                  <span id="modeText">Rainfall</span>
                </div>
                <div id="debugText" class="menu-debug">waiting…</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </fv-shell>

  <script type="module">
    import {
      initializeApp, getApps, getApp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

    import {
      getAuth, onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    import {
      getFirestore, collection, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    import {
      ensureFRModules,
      runFieldReadiness
    } from '/Farm-vista/js/field-readiness/formula.js';

    import {
      fetchAndHydrateFieldParams
    } from '/Farm-vista/js/field-readiness/data.js';

    'use strict';

    const MRMS_COLLECTION = 'field_mrms_weather';
    const FIELDS_COLLECTION = 'fields';
    const FARMS_COLLECTION = 'farms';
    const FR_STATE_COLLECTION = 'field_readiness_state';

    const CACHE_TTL_MS = 2 * 60 * 1000;
    const RANGE_CACHE = new Map();

    const LS_RANGE_KEY = 'fv_dev_rain_map_range_v2';
    const LS_MODE_KEY = 'fv_dev_weather_map_mode_v2';

    const RAIN_GUARDRAIL_ZERO_MAX = 0.10;
    const RAIN_GUARDRAIL_LIFT_MIN = 0.12;
    const RAIN_GUARDRAIL_SPREAD_MIN = 0.18;

    let map = null;
    let infoWindow = null;
    let currentRangeKey = 'last72h';
    let currentRangeStartISO = '';
    let currentRangeEndISO = '';
    let currentRequestId = 0;
    let dbRef = null;
    let authRef = null;
    let hasWiredUi = false;
    let startRequested = false;
    let startFinished = false;
    let currentMapMode = 'rainfall';

    let mrmsCache = { loadedAt: 0, data: [] };
    let fieldsCache = { loadedAt: 0, data: [] };
    let farmsCache = { loadedAt: 0, data: [] };

    let mapCircles = [];
    let fieldMarkers = [];

    let lastFieldSummaries = [];
    let lastTapTargets = [];
    let lastRenderedFields = [];
    let lastScaleMeta = null;

    const readinessState = {
      fields: [],

    function lower(s){

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function clamp(v, min, max){
      const n = Number(v);
      if (!Number.isFinite(n)) return min;

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));

    function escapeHtml(s){
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function retry(fn, tries=3, waitMs=250){
      return (async ()=>{
        let lastErr = null;
        for (let i = 0; i < tries; i++){
          try{
            return await fn();
          }catch(err){
            lastErr = err;
            if (i < tries - 1) await sleep(waitMs * (i + 1));
          }
        }
        throw lastErr;
      })();
    }

    function isPermissionError(err){
      const msg = String(err && (err.message || err.code || err) || '').toLowerCase();
      return msg.includes('insufficient permissions') || msg.includes('permission-denied');
    }

    function detectLayoutMode(){
      const ua = navigator.userAgent || '';
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      const isMobile = /iPhone|Android|Mobile|iPad|iPod/i.test(ua);

      document.body.classList.remove('desktop-view', 'mobile-browser', 'pwa-standalone');

      if (isStandalone){
        document.body.classList.add('pwa-standalone');
      } else if (isMobile){
        document.body.classList.add('mobile-browser');
      } else {
        document.body.classList.add('desktop-view');
      }
    }

    function waitForGoogleMaps(timeoutMs=20000){
      const started = Date.now();
      return new Promise((resolve, reject)=>{
        const tick = ()=>{
          if (window.google && window.google.maps){
            resolve(window.google.maps);
            return;
          }
          if (Date.now() - started > timeoutMs){
            reject(new Error('Google Maps is still loading.'));
            return;
          }
          setTimeout(tick, 80);
        };
        tick();
      });
    }

    async function initFirebase(){
      const cfg = firebaseConfig();
      const app = getApps().length ? getApp() : initializeApp(cfg);
      authRef = getAuth(app);
      dbRef = getFirestore(app);

      await new Promise(resolve=>{
        let done = false;
        const off = onAuthStateChanged(authRef, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        });

        setTimeout(()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, 3000);
      });

      return { app, auth: authRef, db: dbRef };
    }

    function fitToFields(rows){
      if (!map || !Array.isArray(rows) || !rows.length || !(window.google && google.maps && google.maps.LatLngBounds)) return;

      if (rows.length === 1){
        const only = rows[0];
        const lat = toNum(only.lat ?? (only.location && only.location.lat));
        const lng = toNum(only.lng ?? (only.location && only.location.lng));
        if (lat == null || lng == null) return;
        map.setCenter({ lat, lng });
        if ((map.getZoom() || 0) < 11) map.setZoom(11);
        return;
      }

      const bounds = new google.maps.LatLngBounds();
      let added = 0;

      rows.forEach(r=>{
        const lat = toNum(r.lat ?? (r.location && r.location.lat));
        const lng = toNum(r.lng ?? (r.location && r.location.lng));
        if (lat == null || lng == null) return;
        bounds.extend({ lat, lng });
        added++;
      });

      if (!added) return;

      map.fitBounds(bounds, {
        top: 60,
        right: 60,
        bottom: 60,
        left: 60
      });

      google.maps.event.addListenerOnce(map, 'idle', ()=>{
        const z = map.getZoom() || 0;
        if (z > 13) map.setZoom(13);
      });
    }

    function pointLabelFromKey(key){
      const k = lower(key);
      if (!k || k === 'center' || k === 'c') return 'Center';
      if (k === 'nw' || k === 'northwest') return 'NW';
      if (k === 'ne' || k === 'northeast') return 'NE';
      if (k === 'sw' || k === 'southwest') return 'SW';
      if (k === 'se' || k === 'southeast') return 'SE';
      if (k === 'n' || k === 'north') return 'North';
      if (k === 's' || k === 'south') return 'South';
      if (k === 'e' || k === 'east') return 'East';
      if (k === 'w' || k === 'west') return 'West';
      return String(key || 'Point').toUpperCase();
    }

    function metersPerPixelAtLat(lat, zoom){
      const safeLat = clamp(Number(lat || 0), -85, 85);
      const z = Number.isFinite(Number(zoom)) ? Number(zoom) : 8;
      return (156543.03392 * Math.cos(safeLat * Math.PI / 180)) / Math.pow(2, z);
    }

    function approxDistanceMeters(lat1, lng1, lat2, lng2){
      const midLat = ((Number(lat1) + Number(lat2)) / 2) * Math.PI / 180;
      const dLat = (Number(lat2) - Number(lat1)) * 111320;
      const dLng = (Number(lng2) - Number(lng1)) * (111320 * Math.cos(midLat));
      return Math.sqrt((dLat * dLat) + (dLng * dLng));
    }

    function updateTapTargetsForCurrentZoom(){
      if (!Array.isArray(lastTapTargets) || !lastTapTargets.length) return;
      const zoom = map ? (map.getZoom() || 8) : 8;

      lastTapTargets.forEach(t=>{
        const lat = Number(t.lat || 0);
        const base = Number(t.blobOuterRadiusMeters || t.hitRadiusMeters || 320);
        const minPx = t.kind === 'readiness' ? 26 : 30;
        const minMeters = metersPerPixelAtLat(lat, zoom) * minPx;
        t.hitRadiusMeters = Math.max(base, minMeters);
      });
    }

    function nearestTapTarget(lat, lng){
      if (!Array.isArray(lastTapTargets) || !lastTapTargets.length) return null;

      let best = null;
      let bestDist = Infinity;

      lastTapTargets.forEach(t=>{
        const d = approxDistanceMeters(lat, lng, t.lat, t.lng);
        const hr = Number(t.hitRadiusMeters || 0);
        if (d <= hr && d < bestDist){
          best = t;
          bestDist = d;
        }
      });

      if (best) return best;

      lastTapTargets.forEach(t=>{
        const d = approxDistanceMeters(lat, lng, t.lat, t.lng);
        if (d < bestDist){
          best = t;
          bestDist = d;
        }
      });

      return bestDist <= 800 ? best : null;
    }

    function lerp(a, b, t){
      return a + ((b - a) * t);
    }

    function colorFromGradientStops(t, stops){
      const x = clamp(Number(t || 0), 0, 1);
      const arr = Array.isArray(stops) ? stops.slice() : [];
      if (!arr.length) return 'rgb(88,168,255)';
      if (x <= arr[0].t) return `rgb(${arr[0].c[0]}, ${arr[0].c[1]}, ${arr[0].c[2]})`;
      if (x >= arr[arr.length - 1].t){
        const c = arr[arr.length - 1].c;
        return `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
      }

      for (let i = 0; i < arr.length - 1; i++){
        const a = arr[i];
        const b = arr[i + 1];
        if (x >= a.t && x <= b.t){
          const localT = (x - a.t) / Math.max(0.000001, (b.t - a.t));
          const r = Math.round(lerp(a.c[0], b.c[0], localT));
          const g = Math.round(lerp(a.c[1], b.c[1], localT));
          const bb = Math.round(lerp(a.c[2], b.c[2], localT));
          return `rgb(${r}, ${g}, ${bb})`;
        }
      }

      const last = arr[arr.length - 1].c;
      return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
    }

    function startOfDay(date){
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return null;
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function endOfDay(date){
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) return null;
      return new Date(date.getFullYear(), date.getMonth(), date.getDate(), 23, 59, 59, 999);
    }

    function dateToISO(date){
      const d = startOfDay(date);
      if (!d) return '';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function parseISODate(value){
      const s = String(value || '').trim();
      const m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return null;
      const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      return Number.isNaN(d.getTime()) ? null : startOfDay(d);
    }

    function formatRangeDate(date){
      const d = startOfDay(date);
      if (!d) return '';
      return d.toLocaleDateString(undefined, {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function getPickerApi(){
      return (window.FVDateRangePicker && typeof window.FVDateRangePicker.getRange === 'function')
        ? window.FVDateRangePicker
        : null;
    }

    function getDefault72HourRange(){
      const end = endOfDay(new Date());
      const start = startOfDay(new Date(end.getTime() - (72 * 60 * 60 * 1000)));
      return { start, end };
    }

    function getLast72hDateRangeISO(){
      const def = getDefault72HourRange();
      return {
        startISO: dateToISO(def.start),
        endISO: dateToISO(def.end)
      };
    }

    function applyDefault72HourRangeToPicker(opts={}){
      const options = opts && typeof opts === 'object' ? opts : {};
      const picker = getPickerApi();
      if (!picker) return false;

      const r = picker.getRange();
      const hasRange = !!(
        r &&
        String(r.startISO || '').trim() &&
        String(r.endISO || '').trim()
      );
      if (hasRange) return false;

      const def = getDefault72HourRange();
      picker.setRange(def.start, def.end, { silent: !!options.silent });
      return true;
    }

    function getCurrentRangeDisplay(){
      if (currentRangeStartISO && currentRangeEndISO){
        const s = parseISODate(currentRangeStartISO);
        const e = parseISODate(currentRangeEndISO);
        if (s && e){
          return `${formatRangeDate(s)} – ${formatRangeDate(e)}`;
        }
      }
      const def = getDefault72HourRange();
      return `${formatRangeDate(def.start)} – ${formatRangeDate(def.end)}`;
    }

    function rangeTitle(){
      if (currentRangeStartISO && currentRangeEndISO){
        const s = parseISODate(currentRangeStartISO);
        const e = parseISODate(currentRangeEndISO);
        if (s && e){
          return `Rain — ${formatRangeDate(s)} to ${formatRangeDate(e)}`;
        }
      }
      const def = getDefault72HourRange();
      return `Rain — ${formatRangeDate(def.start)} to ${formatRangeDate(def.end)}`;
    }

    function readinessTitle(){

    }

    function getActiveRangeState(){
      const picker = getPickerApi();
      if (picker){
        const r = picker.getRange();
        const startISO = String(r && r.startISO || '').trim();
        const endISO = String(r && r.endISO || '').trim();

        if (startISO && endISO){
          return {
            key: `custom:${startISO}:${endISO}`,
            startISO,
            endISO
          };
        }
      }

      const def = getDefault72HourRange();
      const startISO = dateToISO(def.start);
      const endISO = dateToISO(def.end);

      return {
        key: `default72h:${startISO}:${endISO}`,
        startISO,
        endISO
      };
    }

    function restoreCurrentRangeFromLocal(){
      try{
        const raw = String(localStorage.getItem(LS_RANGE_KEY) || '').trim();
        const picker = getPickerApi();
        if (!picker) return false;

        if (!raw){
          return applyDefault72HourRangeToPicker({ silent:true });
        }

        const parsed = JSON.parse(raw);
        const startISO = String(parsed && parsed.startISO || '').trim();
        const endISO = String(parsed && parsed.endISO || '').trim();

        if (startISO && endISO){
          picker.setRange(startISO, endISO, { silent:true });
          return true;
        }

        picker.clear({ silent:true });
        return applyDefault72HourRangeToPicker({ silent:true });
      }catch(_){
        return applyDefault72HourRangeToPicker({ silent:true });
      }
    }

    function syncCurrentRangeFromPicker(persist=true){
      const next = getActiveRangeState();
      currentRangeKey = next.key;
      currentRangeStartISO = next.startISO;

    function normalizeFieldDoc(docId, d){
      const lat = toNum(
        d && (
          d.lat ??
          (d.location && d.location.lat) ??
          (d.center && d.center.lat) ??
          (d.centroid && d.centroid.lat) ??
          (d.coords && d.coords.lat)
        )
      );
      const lng = toNum(
        d && (
          d.lng ??
          d.lon ??
          (d.location && d.location.lng) ??
          (d.location && d.location.lon) ??
          (d.center && d.center.lng) ??
          (d.center && d.center.lon) ??
          (d.centroid && d.centroid.lng) ??
          (d.centroid && d.centroid.lon) ??
          (d.coords && (d.coords.lng ?? d.coords.lon))
        )
      );

      const fieldId = String((d && (d.fieldId || d.id || docId)) || docId || '').trim();
      if (!fieldId) return null;

      const fieldName = String(
        (d && (d.fieldName || d.name || d.field || d.label)) || 'Field'
      ).trim() || 'Field';

      const farmId = String((d && (d.farmId || d.farmID || '')) || '').trim();
      const county = String((d && (d.county || '')) || '').trim();
      const stateName = String((d && (d.state || '')) || '').trim();

      return {
        id: fieldId,
        fieldId,
        name: fieldName,
        farmId,
        county,
        state: stateName,
        location: (lat != null && lng != null) ? { lat, lng } : null,
        raw: d || {}
      };
    }

    function normalizeMrmsDoc(docId, d){
      const lat = toNum(d && d.location && d.location.lat);
      const lng = toNum(d && d.location && d.location.lng);
      if (lat == null || lng == null) return null;

      const fieldId = String((d && (d.fieldId || docId)) || docId || '');
      const fieldName = String((d && d.fieldName) || (d && d.name) || 'Field');
      const farmId = String((d && d.farmId) || '');
      const farmName = d && d.farmName != null ? String(d.farmName) : '';

      return {
        docId: String(docId || ''),
        fieldId,
        fieldName,
        farmId,
        farmName,
        location: { lat, lng },
        raw: d || {}
      };
    }

    async function loadFieldDocs(force=false){
      if (!dbRef) await initFirebase();

      const fresh = !force && fieldsCache.data.length && (Date.now() - fieldsCache.loadedAt) < CACHE_TTL_MS;
      if (fresh) return fieldsCache.data;

      const snap = await retry(() => getDocs(collection(dbRef, FIELDS_COLLECTION)), 3, 250);
      const out = [];

      snap.forEach(docSnap=>{
        const row = normalizeFieldDoc(docSnap.id, docSnap.data() || {});
        if (row) out.push(row);
      });

      fieldsCache = {
        loadedAt: Date.now(),
        data: out
      };

      return out;
    }

    async function loadFarmDocs(force=false){
      if (!dbRef) await initFirebase();

      const fresh = !force && farmsCache.data.length && (Date.now() - farmsCache.loadedAt) < CACHE_TTL_MS;
      if (fresh) return farmsCache.data;

      try{
        const snap = await retry(() => getDocs(collection(dbRef, FARMS_COLLECTION)), 3, 250);
        const out = [];

        snap.forEach(docSnap=>{
          const d = docSnap.data() || {};
          out.push({
            id: String(docSnap.id || ''),
            name: String(d.name || d.farmName || 'Farm')
          });
        });

        farmsCache = {
          loadedAt: Date.now(),
          data: out
        };

        return out;
      }catch(_){
        farmsCache = {
          loadedAt: Date.now(),
          data: []
        };
        return [];
      }
    }

    async function loadMrmsDocs(force=false){
      if (!dbRef) await initFirebase();

      const fresh = !force && mrmsCache.data.length && (Date.now() - mrmsCache.loadedAt) < CACHE_TTL_MS;
      if (fresh) return mrmsCache.data;

      try{
        const snap = await retry(() => getDocs(collection(dbRef, MRMS_COLLECTION)), 3, 250);
        const out = [];

        snap.forEach(docSnap=>{
          const row = normalizeMrmsDoc(docSnap.id, docSnap.data() || {});
          if (row) out.push(row);
        });

        mrmsCache = {
          loadedAt: Date.now(),
          data: out
        };

        return out;
      }catch(e){
        if (isPermissionError(e)){
          console.warn('[WeatherMap] MRMS permission denied; continuing without MRMS collection.');
          mrmsCache = {
            loadedAt: Date.now(),
            data: []
          };
          return [];
        }
        throw e;
      }
    }

    async function loadPersistedStateMap(force=false){
      const now = Date.now();
      if (!force && readinessState._persistLoadedAt && (now - readinessState._persistLoadedAt) < 30000){
        return readinessState.persistedStateByFieldId || {};
      }

      const out = {};

      try{
        const snap = await retry(() => getDocs(collection(dbRef, FR_STATE_COLLECTION)), 3, 250);
        snap.forEach(docSnap=>{
          const d = docSnap.data() || {};
          const fid = String(d.fieldId || docSnap.id || '').trim();
          const storageFinal = toNum(d.storageFinal);
          const asOfDateISO = String(d.asOfDateISO || '').trim().slice(0,10);

          if (!fid || storageFinal == null || !asOfDateISO) return;

          out[fid] = {
            fieldId: fid,
            storageFinal,
            asOfDateISO,
            SmaxAtSave: toNum(d.SmaxAtSave ?? d.smaxAtSave) ?? 0
          };
        });
      }catch(e){
        console.warn('[WeatherMap] persisted state load failed:', e);
      }

      readinessState.persistedStateByFieldId = out;
      readinessState._persistLoadedAt = now;
      return out;
    }

    function sumDailySeriesWithinDates(parentDoc, startISO, endISO){
      const rows = Array.isArray(parentDoc && parentDoc.mrmsDailySeries30d) ? parentDoc.mrmsDailySeries30d.slice() : null;
      if (!rows || !rows.length) return null;

      if (!startISO || !endISO){
        const def = getDefault72HourRange();
        startISO = dateToISO(def.start);
        endISO = dateToISO(def.end);
      }

      return rows.reduce((sum, row)=>{
        const iso = String(row && row.dateISO || '').trim();
        if (!iso) return sum;
        if (iso < startISO || iso > endISO) return sum;
        return sum + (toNum(row && row.rainMm) || 0);
      }, 0);
    }

    function totalRainMmForActiveRange(parentDoc){
      if (!parentDoc || typeof parentDoc !== 'object') return null;
      return sumDailySeriesWithinDates(parentDoc, currentRangeStartISO, currentRangeEndISO);
    }

    function totalRainInLast72h(parentDoc){
      if (!parentDoc || typeof parentDoc !== 'object') return 0;
      const r = getLast72hDateRangeISO();
      const mm = sumDailySeriesWithinDates(parentDoc, r.startISO, r.endISO);
      return Number.isFinite(mm) ? (mm / 25.4) : 0;
    }

    function extractSampleGeometry(parentDoc){
      const samples = Array.isArray(parentDoc && parentDoc.mrmsHourlyLatest && parentDoc.mrmsHourlyLatest.samples)
        ? parentDoc.mrmsHourlyLatest.samples
        : [];

      const out = [];
      samples.forEach(sample=>{
        const lat = toNum(sample && sample.lat);
        const lng = toNum(sample && sample.lon);
        if (lat == null || lng == null) return;
        out.push({
          key: String((sample && sample.key) || 'center'),
          lat,
          lng
        });
      });

      return out;
    }

    function hasUsableRainData(parentDoc){
      const totalMm = totalRainMmForActiveRange(parentDoc);
      const geom = extractSampleGeometry(parentDoc);
      return Number.isFinite(totalMm) || geom.length > 0;
    }

    function buildFieldPoints(row){
      const totalMm = totalRainMmForActiveRange(row.raw);
      if (!Number.isFinite(totalMm) && !extractSampleGeometry(row.raw).length) return [];

      const totalInches = Number.isFinite(totalMm) ? (totalMm / 25.4) : 0;
      let geom = extractSampleGeometry(row.raw);

      if (!geom.length){
        geom = [{
          key: 'center',
          lat: row.location.lat,
          lng: row.location.lng
        }];
      }

      return geom.map(g => ({
        fieldId: row.fieldId,
        fieldName: row.fieldName,
        farmId: row.farmId,
        pointLabel: pointLabelFromKey(g.key),
        lat: g.lat,
        lng: g.lng,
        rainInches: totalInches
      }));
    }

    function buildRainSummary(row){
      const totalMm = totalRainMmForActiveRange(row.raw);
      if (!Number.isFinite(totalMm) && !extractSampleGeometry(row.raw).length) return null;

      return {
        kind: 'rainfall',
        fieldId: row.fieldId,
        fieldName: row.fieldName,
        farmId: row.farmId,
        lat: row.location.lat,
        lng: row.location.lng,
        rainInches: Number.isFinite(totalMm) ? (totalMm / 25.4) : 0
      };
    }

    function openPopupForHit(hit){

    function buildLayersForRain(n){
      if (n <= 0.18){
        return [
          { scale:1.75, opacity:0.028 + (n * 0.015) },
          { scale:1.28, opacity:0.042 + (n * 0.018) },
          { scale:0.95, opacity:0.060 + (n * 0.022) }
        ];
      }
      return [
        { scale:1.90, opacity:0.026 + (n * 0.020) },
        { scale:1.45, opacity:0.040 + (n * 0.024) },
        { scale:1.08, opacity:0.056 + (n * 0.028) },
        { scale:0.76, opacity:0.072 + (n * 0.032) }
      ];
    }

    function blendRadiusMeters(){
      const n = Number($('radiusSel')?.value || 1800);
      return Number.isFinite(n) ? n : 1800;
    }

    function drawRainBlobs(points, fields, scale){
      ensureMap();
      clearMapOverlays();

      const radius = blendRadiusMeters();
      updateRainLegend(scale);

      points.forEach(p=>{
        const lat = toNum(p.lat);
        const lng = toNum(p.lng);
        const rain = Number(p.rainInches || 0);
        if (lat == null || lng == null) return;

        const n = normalizeRainValueForScale(rain, scale);
        const color = colorFromGradientStops(n, scale.stops);
        const center = { lat, lng };

        const layers = buildLayersForRain(n);
        const outerScale = layers.reduce((m, layer)=> Math.max(m, Number(layer.scale || 0)), 1);
        const blobOuterRadiusMeters = radius * outerScale;

        const tapTarget = {
          kind: 'rainfall',
          fieldId: p.fieldId,
          fieldName: p.fieldName,
          pointLabel: p.pointLabel,
          lat: p.lat,
          lng: p.lng,
          blobOuterRadiusMeters,
          hitRadiusMeters: blobOuterRadiusMeters
        };

        layers.forEach((layer, layerIdx)=>{
          const circle = new google.maps.Circle({
            map,
            center,
            radius: radius * layer.scale,
            strokeOpacity: 0,
            strokeWeight: 0,
            fillColor: color,
            fillOpacity: Math.min(0.14, layer.opacity),
            zIndex: 10 + layerIdx,
            clickable: true
          });

          circle.__tapTarget = tapTarget;

          circle.addListener('click', ()=>{
            openPopupForHit(circle.__tapTarget);
          });

          mapCircles.push(circle);
        });

        lastTapTargets.push(tapTarget);
      });

      updateTapTargetsForCurrentZoom();
      setPointMeta(points.length);
      setFieldsMeta(fields.length);
      fitToFields(fields);

      const sampleHit = lastTapTargets[0] ? Math.round(lastTapTargets[0].hitRadiusMeters) : 0;
      const floorLabel = scale.usedDynamicFloor
        ? `dynamic floor ${scale.domainMin.toFixed(2)}"`
        : 'zero floor';

      setDebug(
        'range=' + getCurrentRangeDisplay() +
        ' • fields=' + fields.length +
        ' • points=' + points.length +
        ' • tap≈' + sampleHit + 'm' +
        ' • ' + floorLabel +
        ' • max=' + Number(scale.domainMax || 0).toFixed(2) + '"'
      );
    }

    function handleMapTap(ev){
      if (!ev || !ev.latLng || !lastTapTargets.length) return;

      const lat = ev.latLng.lat();
      const lng = ev.latLng.lng();
      const hit = nearestTapTarget(lat, lng);

      if (!hit){
        if (infoWindow) infoWindow.close();
        return;
      }

      openPopupForHit(hit);
    }

    function cacheRangeResult(cacheKey, data){
      RANGE_CACHE.set(cacheKey, {
        ts: Date.now(),
        data
      });
    }

    function getCachedRangeResult(cacheKey){
      const hit = RANGE_CACHE.get(cacheKey);
      if (!hit) return null;
      if ((Date.now() - hit.ts) > (5 * 60 * 1000)) return null;
      return hit.data;
    }

    function buildRainScale(values){
      const cleaned = (Array.isArray(values) ? values : [])
        .map(v => Number(v))
        .filter(v => Number.isFinite(v) && v >= 0);

      const maxInches = cleaned.length ? Math.max(...cleaned) : 0;
      const minInches = cleaned.length ? Math.min(...cleaned) : 0;

      const stops = [
        { t:0.00, c:[88,168,255] },
        { t:0.16, c:[108,199,255] },
        { t:0.34, c:[99,223,137] },
        { t:0.52, c:[73,201,74] },
        { t:0.70, c:[215,223,73] },
        { t:0.84, c:[240,184,67] },
        { t:0.94, c:[239,107,70] },
        { t:1.00, c:[217,44,198] }
      ];

      if (!cleaned.length || maxInches <= RAIN_GUARDRAIL_ZERO_MAX){
        return {
          name: 'trace',
          domainMin: 0,
          domainMax: Math.max(0.10, maxInches || 0.10),
          actualMin: minInches,
          actualMax: maxInches,
          usedDynamicFloor: false,
          stops
        };
      }

      const spread = maxInches - minInches;

      const canLiftFloor = (
        minInches >= RAIN_GUARDRAIL_LIFT_MIN &&
        spread >= RAIN_GUARDRAIL_SPREAD_MIN
      );

      const domainMin = canLiftFloor ? minInches : 0;
      const domainMax = Math.max(maxInches, domainMin + 0.10);

      return {
        name: canLiftFloor ? 'dynamic-floor' : 'zero-floor',
        domainMin,
        domainMax,
        actualMin: minInches,
        actualMax: maxInches,
        usedDynamicFloor: canLiftFloor,
        stops
      };
    }

    function readinessColor(t){
      const x = clamp(Number(t || 0), 0, 1);
      const stops = [
        { t:0.00, c:[200,59,59] },
        { t:0.22, c:[225,107,67] },
        { t:0.45, c:[240,184,67] },
        { t:0.62, c:[215,223,73] },
        { t:0.80, c:[83,184,93] },
        { t:1.00, c:[47,143,75] }
      ];
      return colorFromGradientStops(1 - x, stops);
    }

    function normalizeRainValueForScale(v, scale){
      const min = Number(scale.domainMin || 0);
      const max = Number(scale.domainMax || 1);
      if (!Number.isFinite(v)) return 0;
      if (!Number.isFinite(min) || !Number.isFinite(max) || Math.abs(max - min) < 0.0001) return 0.5;
      return clamp((v - min) / (max - min), 0, 1);
    }

    function normalizeReadinessValue(v){
      const n = Number(v);
      if (!Number.isFinite(n)) return 0;
      return clamp(n / 100, 0, 1);
    }

    function formatLegendValue(n){
      const v = Number(n || 0);
      if (v >= 10) return v.toFixed(0) + '"+';
      if (v >= 1) return v.toFixed(1) + '"';
      if (v >= 0.1) return v.toFixed(1).replace(/^0/, '') + '"';
      return v.toFixed(2).replace(/^0/, '') + '"';
    }

    function formatReadinessValue(n){
      const v = Number(n || 0);
      return `${Math.round(v)}`;
    }

    function setLegendMode(mode){
      const bar = $('legendBar');
      if (!bar) return;
      bar.classList.toggle('readiness', mode === 'readiness');
    }

    function updateRainLegend(scale){
      setLegendMode('rainfall');

      const min = Number(scale.domainMin || 0);
      const max = Number(scale.domainMax || 1);

      const q5 = min + ((max - min) * 0.83);
      const q4 = min + ((max - min) * 0.68);
      const mid = min + ((max - min) * 0.50);
      const q2 = min + ((max - min) * 0.34);
      const q1 = min + ((max - min) * 0.18);

      $('legendTop').textContent = formatLegendValue(max);
      $('legendQ5').textContent = formatLegendValue(q5);
      $('legendQ4').textContent = formatLegendValue(q4);
      $('legendMid').textContent = formatLegendValue(mid);
      $('legendQ2').textContent = formatLegendValue(q2);
      $('legendQ1').textContent = formatLegendValue(q1);
      $('legendBottom').textContent = formatLegendValue(min);
    }

    function updateReadinessLegend(){
      setLegendMode('readiness');
      $('legendTop').textContent = '100';
      $('legendQ5').textContent = '85';
      $('legendQ4').textContent = '70';
      $('legendMid').textContent = '50';
      $('legendQ2').textContent = '30';
      $('legendQ1').textContent = '15';
      $('legendBottom').textContent = '0';
    }

    async function buildRainRenderableRows(requestId, force=false){
      const rows = await loadMrmsDocs(force);
      if (requestId !== currentRequestId) return { cancelled:true };

      const selectedFarmId = getSelectedFarmId();
      const farmFiltered = selectedFarmId
        ? rows.filter(row => String(row.farmId || '') === selectedFarmId)
        : rows.slice();

      const usableRows = farmFiltered.filter(row => hasUsableRainData(row.raw));

      usableRows.sort((a, b)=>
        String(a.fieldName).localeCompare(String(b.fieldName), undefined, { numeric:true, sensitivity:'base' })
      );

      const points = [];
      const summaries = [];
      const renderedFields = [];

      usableRows.forEach(row=>{
        const fieldPoints = buildFieldPoints(row);
        const summary = buildRainSummary(row);
        if (!fieldPoints.length || !summary) return;

        renderedFields.push({
          fieldId: row.fieldId,
          fieldName: row.fieldName,
          farmId: row.farmId,
          lat: row.location.lat,
          lng: row.location.lng
        });

        summaries.push(summary);
        points.push(...fieldPoints);
      });

      return {
        points,
        summaries,
        renderedFields
      };
    }

            async function buildReadinessRenderableRows(requestId, force=false){
      const [fields, farms, mrmsRows, persistedMap] = await Promise.all([
        loadFieldDocs(force),
        loadFarmDocs(force),
        loadMrmsDocs(force),
        loadPersistedStateMap(force)
      ]);

      if (requestId !== currentRequestId) return { cancelled:true };

      const selectedFarmId = getSelectedFarmId();

      const farmMap = new Map();
      farms.forEach(f=>{
        farmMap.set(String(f.id || ''), String(f.name || ''));
      });

      readinessState.fields = Array.isArray(fields) ? fields.slice() : [];
      readinessState.farmsById = farmMap;
      readinessState.farmFilter = selectedFarmId || '__all__';
      readinessState.persistedStateByFieldId = persistedMap || {};
      readinessState._persistLoadedAt = Date.now();
      readinessState.lastRuns = new Map();

      await ensureFRModules(readinessState);

      const mrmsByFieldId = new Map();
      mrmsRows.forEach(r=>{
        if (r && r.fieldId) mrmsByFieldId.set(String(r.fieldId), r);
      });

      // ✅ Only use actual field docs, same idea as the tiles page
      const candidates = (Array.isArray(fields) ? fields : [])
        .filter(f=>{
          if (!f || !f.id) return false;
          if (selectedFarmId && String(f.farmId || '') !== selectedFarmId) return false;

          const lat = toNum(f.location && f.location.lat);
          const lng = toNum(f.location && f.location.lng);
          return lat != null && lng != null;
        })
        .map(f=>{
          const fid = String(f.id);
          const m = mrmsByFieldId.get(fid) || null;

          return {
            id: fid,
            fieldId: fid,
            name: String(f.name || 'Field'),
            farmId: String(f.farmId || ''),
            farmName: String(
              (farmMap.get(String(f.farmId || ''))) ||
              (m && m.farmName) ||
              ''
            ),
            county: String(f.county || ''),
            state: String(f.state || ''),
            location: {
              lat: Number(f.location.lat),
              lng: Number(f.location.lng)
            },
            mrmsRaw: m ? (m.raw || null) : null
          };
        })
        .sort((a, b)=>
          String(a.name || '').localeCompare(String(b.name || ''), undefined, {
            numeric:true,
            sensitivity:'base'
          })
        );

      const renderedFields = [];
      const summaries = [];

      const withTimeout = (promise, ms, label='timeout')=>{
        return Promise.race([
          promise,
          new Promise((_, reject)=>{
            setTimeout(()=> reject(new Error(label)), ms);
          })
        ]);
      };

      async function buildOne(field, index, total){
        if (requestId !== currentRequestId) return null;

        setDebug(`building readiness ${index + 1}/${total} • ${field.name || field.id}`);

        const fieldObj = {
          id: String(field.id),
          fieldId: String(field.fieldId),
          name: String(field.name || 'Field'),
          farmId: String(field.farmId || ''),
          county: String(field.county || ''),
          state: String(field.state || ''),
          location: {
            lat: Number(field.location.lat),
            lng: Number(field.location.lng)
          }
        };

        try{
          await withTimeout(
            fetchAndHydrateFieldParams(readinessState, String(field.id)),
            2500,
            'param load timeout'
          );
        }catch(e){
          console.warn('[WeatherMap] field params load failed:', field && field.id, e);
        }

        let run = null;
        try{
          run = await withTimeout(
            runFieldReadiness(readinessState, fieldObj, {}),
            8000,
            'readiness timeout'
          );
        }catch(e){
          console.warn('[WeatherMap] readiness run failed:', field && field.id, e);
        }

        if (!run || !Number.isFinite(Number(run.readinessR))){
          return null;
        }

        const rain72hInches = totalRainInLast72h(field.mrmsRaw);

        const rendered = {
          kind: 'readiness',
          fieldId: String(field.id),
          fieldName: String(field.name || 'Field'),
          farmId: String(field.farmId || ''),
          farmName: String(field.farmName || ''),
          county: String(field.county || ''),
          state: String(field.state || ''),
          lat: Number(field.location.lat),
          lng: Number(field.location.lng),
          readiness: Number(run.readinessR),
          rain72hInches
        };

        try{
          readinessState.lastRuns.set(String(field.id), run);
        }catch(_){}

        return rendered;
      }

      // ✅ Fast batched parallel processing
      const BATCH_SIZE = 8;

      for (let start = 0; start < candidates.length; start += BATCH_SIZE){
        if (requestId !== currentRequestId) return { cancelled:true };

        const batch = candidates.slice(start, start + BATCH_SIZE);
        const built = await Promise.all(
          batch.map((field, idx)=> buildOne(field, start + idx, candidates.length))
        );

        built.forEach(rendered=>{
          if (!rendered) return;
          renderedFields.push(rendered);
          summaries.push(rendered);
        });

        if ((start + BATCH_SIZE) < candidates.length){
          await new Promise(resolve => setTimeout(resolve, 8));
        }
      }

      return {
        summaries,
        renderedFields
      };
    }

    async function renderRain(force=false){
      const requestId = ++currentRequestId;
      syncCurrentRangeFromPicker(false);

      try{
        ensureMap();
        updateMapStyle();
      }catch(e){
        setStatus('Map failed');
        setDebug(String(e && e.message ? e.message : e || 'map error'));
        return;
      }

      const cacheKey = `rain:${currentRangeKey}:${getSelectedFarmId() || '__all__'}:${blendRadiusMeters()}`;
      const cached = !force ? getCachedRangeResult(cacheKey) : null;

      if (cached && Array.isArray(cached.points) && cached.points.length){
        lastFieldSummaries = Array.isArray(cached.summaries) ? cached.summaries : [];
        lastRenderedFields = Array.isArray(cached.renderedFields) ? cached.renderedFields : [];
        lastScaleMeta = cached.scale || null;
        drawRainBlobs(cached.points || [], cached.renderedFields || [], cached.scale);
        setStatus('Cached');
      } else {
        setStatus('Loading…');
        setDebug('loading MRMS docs…');
      }

      try{
        const res = await buildRainRenderableRows(requestId, force);
        if (!res || res.cancelled || requestId !== currentRequestId) return;

        const points = Array.isArray(res.points) ? res.points : [];
        const summaries = Array.isArray(res.summaries) ? res.summaries : [];
        const renderedFields = Array.isArray(res.renderedFields) ? res.renderedFields : [];
        const values = points.map(p => Number(p.rainInches || 0)).filter(v => Number.isFinite(v));
        const scale = buildRainScale(values);

        lastFieldSummaries = summaries;
        lastRenderedFields = renderedFields;
        lastScaleMeta = scale;

        if (!points.length || !renderedFields.length){
          clearMapOverlays();
          setFieldsMeta(0);
          setPointMeta(0);
          updateRainLegend(buildRainScale([0]));
          setStatus('No data');
          setDebug('no renderable rainfall rows • range=' + getCurrentRangeDisplay());
          return;
        }

        cacheRangeResult(cacheKey, { points, summaries, renderedFields, scale });
        drawRainBlobs(points, renderedFields, scale);
        const hasAnyRain = points.some(p => Number(p.rainInches || 0) > 0);
        setStatus(hasAnyRain ? 'Live' : 'Live (0 rain)');
      }catch(e){
        console.warn('[WeatherMap] rain render failed:', e);

        const fallback = getCachedRangeResult(cacheKey);
        if (fallback){
          lastFieldSummaries = Array.isArray(fallback.summaries) ? fallback.summaries : [];
          lastRenderedFields = Array.isArray(fallback.renderedFields) ? fallback.renderedFields : [];
          lastScaleMeta = fallback.scale || null;
          drawRainBlobs(fallback.points || [], fallback.renderedFields || [], fallback.scale);
          setStatus('Cached');
          setDebug('live failed • showing cached');
          return;
        }

        clearMapOverlays();
        setFieldsMeta(0);
        setPointMeta(0);
        setStatus('Load failed');
        setDebug(String(e && e.message ? e.message : e || 'render failed'));
      }
    }

    async function renderReadiness(force=false){
      const requestId = ++currentRequestId;

      try{
        ensureMap();
        updateMapStyle();
      }catch(e){
        setStatus('Map failed');
        setDebug(String(e && e.message ? e.message : e || 'map error'));
        return;
      }

      const cacheKey = `readiness:${getSelectedFarmId() || '__all__'}`;
      const cached = !force ? getCachedRangeResult(cacheKey) : null;

      if (cached && Array.isArray(cached.renderedFields) && cached.renderedFields.length){
        lastFieldSummaries = Array.isArray(cached.summaries) ? cached.summaries : [];
        lastRenderedFields = Array.isArray(cached.renderedFields) ? cached.renderedFields : [];
        drawReadinessMarkers(cached.renderedFields || []);
        setStatus('Cached');
      } else {
        setStatus('Loading…');
        setDebug('building readiness runs…');
      }

      try{
        const res = await buildReadinessRenderableRows(requestId, force);
        if (!res || res.cancelled || requestId !== currentRequestId) return;

        const summaries = Array.isArray(res.summaries) ? res.summaries : [];
        const renderedFields = Array.isArray(res.renderedFields) ? res.renderedFields : [];

        lastFieldSummaries = summaries;
        lastRenderedFields = renderedFields;

        if (!renderedFields.length){
          clearMapOverlays();
          setFieldsMeta(0);
          setPointMeta(0);
          updateReadinessLegend();
          setStatus('No data');
          setDebug('no readiness rows built');
          return;
        }

        cacheRangeResult(cacheKey, { summaries, renderedFields });
        drawReadinessMarkers(renderedFields);
        setStatus('Live');
      }catch(e){
        console.warn('[WeatherMap] readiness render failed:', e);

        const fallback = getCachedRangeResult(cacheKey);
        if (fallback){
          lastFieldSummaries = Array.isArray(fallback.summaries) ? fallback.summaries : [];
          lastRenderedFields = Array.isArray(fallback.renderedFields) ? fallback.renderedFields : [];
          drawReadinessMarkers(fallback.renderedFields || []);
          setStatus('Cached');
          setDebug('live failed • showing cached');
          return;
        }

        clearMapOverlays();
        setFieldsMeta(0);
        setPointMeta(0);
        setStatus('Load failed');
        setDebug(String(e && e.message ? e.message : e || 'readiness render failed'));
      }
    }

    async function renderActiveMode(force=false){
      if (currentMapMode === 'readiness'){
        setModeText('Readiness');
        setModeChip('Readiness Map');
        await renderReadiness(force);
      } else {
        setModeText('Rainfall');
        setModeChip('Rainfall Map');
        await renderRain(force);
      }
    }

    function applyMapModeUi(){
      const isReadiness = currentMapMode === 'readiness';

      const sel = $('mapModeSel');
      if (sel) sel.value = isReadiness ? 'readiness' : 'rainfall';

      $('rainModeSection').hidden = isReadiness;
      $('readinessModeSection').hidden = !isReadiness;

      if (isReadiness){
        updateReadinessLegend();
      } else if (lastScaleMeta){
        updateRainLegend(lastScaleMeta);
      } else {
        updateRainLegend(buildRainScale([0]));
      }

      setModeText(isReadiness ? 'Readiness' : 'Rainfall');
      setModeChip(isReadiness ? 'Readiness Map' : 'Rainfall Map');
    }

    function stopMenuBubble(e){
      if (!e) return;
      e.stopPropagation();
    }

        function wireUi(){
      if (hasWiredUi) return;
      hasWiredUi = true;

      const btnMenu = $('btnMenu');
      const menuPanel = $('menuPanel');
      const jobRangeInput = $('jobRangeInput');
      const calendarPopover = $('calendarPopover');
      const monthSelect = $('monthSelect');
      const yearSelect = $('yearSelect');
      const clearRangeBtn = $('clearRangeBtn');
      const applyRangeBtn = $('applyRangeBtn');
      const closeCalBtn = $('closeCalBtn');
      const calDays = $('calDays');
      const mapModeSel = $('mapModeSel');
      const viewSel = $('viewSel');
      const radiusSel = $('radiusSel');
      const btnRefreshRain = $('btnRefreshRain');
      const btnRefreshReadiness = $('btnRefreshReadiness');

      const keepMenuOpen = (e)=>{
        if (!e) return;
        e.stopPropagation();
      };

      const interactiveControls = [
        btnMenu,
        menuPanel,
        calendarPopover,
        jobRangeInput,
        monthSelect,
        yearSelect,
        clearRangeBtn,
        applyRangeBtn,
        closeCalBtn,
        calDays,
        mapModeSel,
        viewSel,
        radiusSel,
        btnRefreshRain,
        btnRefreshReadiness
      ].filter(Boolean);

      interactiveControls.forEach(el=>{
        el.addEventListener('pointerdown', keepMenuOpen);
        el.addEventListener('mousedown', keepMenuOpen);
        el.addEventListener('touchstart', keepMenuOpen, { passive:true });
        el.addEventListener('click', keepMenuOpen);
      });

      if (btnMenu && menuPanel){
        btnMenu.addEventListener('click', ()=>{
          menuPanel.classList.toggle('open');
        });

        document.addEventListener('pointerdown', (e)=>{
          if (!menuPanel.classList.contains('open')) return;

          const path = typeof e.composedPath === 'function' ? e.composedPath() : [];
          const clickedInsideMenu = path.includes(menuPanel);
          const clickedMenuButton = path.includes(btnMenu);
          const clickedCalendar = calendarPopover ? path.includes(calendarPopover) : false;

          if (clickedInsideMenu || clickedMenuButton || clickedCalendar) return;
          menuPanel.classList.remove('open');
        });
      }

      jobRangeInput?.addEventListener('focus', ()=>{
        try{ jobRangeInput.blur(); }catch(_){}
      });

      $('btnRefreshRain')?.addEventListener('click', ()=>{
        currentMapMode = 'rainfall';
        saveCurrentMapModeToLocal();
        applyMapModeUi();
        renderActiveMode(true);
      });

      $('btnRefreshReadiness')?.addEventListener('click', ()=>{
        currentMapMode = 'readiness';
        saveCurrentMapModeToLocal();
        applyMapModeUi();
        renderActiveMode(true);
      });

      $('mapModeSel')?.addEventListener('change', async (e)=>{
        currentMapMode = String(e && e.target && e.target.value || 'rainfall');
        saveCurrentMapModeToLocal();
        applyMapModeUi();
        await renderActiveMode(false);
      });

      $('viewSel')?.addEventListener('change', ()=>{
        updateMapStyle();
      });

      $('radiusSel')?.addEventListener('change', ()=>{
        if (currentMapMode === 'rainfall'){
          renderRain(false);
        }
      });

      document.addEventListener('fv:date-range-applied', ()=>{
        syncCurrentRangeFromPicker(true);
        if (currentMapMode === 'rainfall'){
          renderRain(false);
        }
      });

      document.addEventListener('fv:date-range-cleared', ()=>{
        applyDefault72HourRangeToPicker({ silent:true });
        syncCurrentRangeFromPicker(true);
        if (currentMapMode === 'rainfall'){
          renderRain(false);
        }
      });
    }

    async function startWeatherMap(){
      if (startRequested && startFinished) return;
      if (startRequested && !startFinished) return;

      startRequested = true;

      try{
        detectLayoutMode();
        await initFirebase();
        await waitForGoogleMaps();
        ensureMap();
        wireUi();

        restoreCurrentRangeFromLocal();
        applyDefault72HourRangeToPicker({ silent:true });
        syncCurrentRangeFromPicker(false);

        currentMapMode = restoreCurrentMapModeFromLocal();
        applyMapModeUi();

        await renderActiveMode(false);
        startFinished = true;
      }catch(e){
        startRequested = false;
        startFinished = false;
        console.warn('[WeatherMap] startup failed:', e);
        setStatus('Startup failed');
        setDebug(String(e && e.message ? e.message : e || 'startup error'));
      }
    }

    window.startWeatherMap = startWeatherMap;

    window.addEventListener('load', ()=>{
      setTimeout(()=>{
        startWeatherMap().catch(err=>{
          console.warn('[WeatherMap] delayed boot failed:', err);
        });
      }, 250);
    });

    document.addEventListener('visibilitychange', ()=>{
      if (document.visibilityState === 'visible' && !startFinished){
        startWeatherMap().catch(()=>{});
      }
    });
  </script>

  <script async src="https://maps.googleapis.com/maps/api/js?loading=async&key=AIzaSyCzKBEQ1-wCJ8_nv1dR3wQI0nTk1IrgWzY"></script>
