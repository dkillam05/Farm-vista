<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FarmVista • Dev Rain Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B7E46"/>

  <link rel="manifest" href="/Farm-vista/manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="/Farm-vista/assets/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/Farm-vista/assets/icons/icon-192.png"/>

  <script src="/Farm-vista/js/theme-boot.js"></script>
  <link rel="stylesheet" href="/Farm-vista/assets/css/theme.css"/>
  <link rel="stylesheet" href="/Farm-vista/assets/css/app.css"/>

  <script src="/Farm-vista/js/firebase-config.js"></script>
  <script src="/Farm-vista/js/firebase-init.js"></script>

  <script>
    (function(){
      if(!customElements.get('fv-shell')){
        const s = document.createElement('script');
        s.src = '/Farm-vista/js/fv-shell.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>

  <style>
    :root{
      --glass: rgba(255,255,255,.84);
      --glass-border: rgba(255,255,255,.18);
      --glass-shadow: 0 14px 36px rgba(0,0,0,.18);
      --text-dark: #18211b;
      --blur: blur(14px);
      --menu-w: min(300px, calc(100vw - 18px));
    }

    html.dark{
      --glass: rgba(22,28,24,.80);
      --glass-border: rgba(255,255,255,.08);
      --glass-shadow: 0 16px 44px rgba(0,0,0,.38);
      --text-dark: #f3f7f2;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#253327;
    }

    body{
      color:var(--text-dark);
    }

    fv-shell{
      display:block;
      width:100%;
      height:100%;
    }

    .rain-page{
      position:fixed;
      left:0;
      right:0;
      top:calc(var(--hdr-h, 74px) + env(safe-area-inset-top, 0px));
      bottom:calc(var(--ftr-h, 42px));
      overflow:hidden;
      background:#233125;
    }

    .map-stage,
    #rainMap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    #rainMap{
      background:#dfe5dd;
    }

    .glass{
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
    }

    .top-tools{
      position:absolute;
      top:10px;
      right:10px;
      z-index:35;
      pointer-events:none;
    }

    .top-tools > *{
      pointer-events:auto;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      color:var(--text-dark);
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      padding:0;
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      display:block;
    }

    .icon-btn:active{
      transform:translateY(1px);
    }

    .panel-menu{
      position:absolute;
      top:58px;
      right:0;
      z-index:36;
      width:var(--menu-w);
      padding:12px;
      border-radius:18px;
      display:none;
      pointer-events:auto;
    }

    .panel-menu.open{
      display:block;
    }

    .menu-field{
      margin-bottom:12px;
    }

    .menu-field:last-child{
      margin-bottom:0;
    }

    .menu-field label{
      display:block;
      margin:0 0 6px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text-dark);
      opacity:.84;
    }

    .menu-select{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:
        linear-gradient(45deg, transparent 50%, rgba(0,0,0,.42) 50%),
        linear-gradient(135deg, rgba(0,0,0,.42) 50%, transparent 50%),
        color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      background-position:
        calc(100% - 21px) calc(50% - 3px),
        calc(100% - 13px) calc(50% - 3px),
        0 0;
      background-size:8px 8px, 8px 8px, 100% 100%;
      background-repeat:no-repeat;
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px 38px 12px 12px;
      outline:none;
      box-sizing:border-box;
    }

    .menu-btn{
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      border:none;
      border-radius:14px;
      background:color-mix(in srgb, #2F6C3C 88%, #ffffff 12%);
      color:#fff;
      font:inherit;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(47,108,60,.28);
    }

    .menu-btn:active{
      transform:translateY(1px);
    }

    .menu-inline{
      display:grid;
      gap:8px;
      margin-top:2px;
    }

    .menu-pill{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:12px;
      padding:10px 12px;
      background:color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
      font-size:13px;
      font-weight:900;
      color:var(--text-dark);
    }

    .menu-pill .mutedish{
      opacity:.72;
      font-weight:800;
    }

    .menu-debug{
      font-size:11px;
      color:var(--text-dark);
      opacity:.78;
      line-height:1.25;
      margin-top:2px;
      word-break:break-word;
    }

    .left-legend{
      position:absolute;
      left:8px;
      top:50%;
      transform:translateY(-50%);
      z-index:20;
      width:34px;
      pointer-events:none;
    }

    .legend-wrap{
      position:relative;
      width:100%;
      height:min(44vh, 360px);
      min-height:220px;
      border-radius:14px;
      overflow:visible;
    }

    .legend-bar{
      position:absolute;
      left:0;
      top:0;
      width:12px;
      height:100%;
      border-radius:999px;
      background:
        linear-gradient(
          to top,
          #58a8ff 0%,
          #6cc7ff 12%,
          #55d79a 24%,
          #46d14d 38%,
          #d7df49 54%,
          #f0b843 72%,
          #ef6b46 88%,
          #d92cc6 100%
        );
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .legend-label{
      position:absolute;
      left:18px;
      transform:translateY(50%);
      font-size:10px;
      font-weight:900;
      color:#fff;
      line-height:1;
      text-shadow:0 1px 4px rgba(0,0,0,.55);
      white-space:nowrap;
    }

    .legend-label.l1{ bottom:100%; transform:translateY(0); }
    .legend-label.l2{ bottom:83%; }
    .legend-label.l3{ bottom:68%; }
    .legend-label.l4{ bottom:50%; }
    .legend-label.l5{ bottom:34%; }
    .legend-label.l6{ bottom:18%; }
    .legend-label.l7{ bottom:0; transform:translateY(0); }

    .popup-card{
      max-width:235px;
      font-size:13px;
      line-height:1.25;
      color:#18211b;
    }

    .popup-card .name{
      font-weight:900;
      margin:0 0 4px;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-weight:800;
    }

    @media (max-width:680px){
      .icon-btn{
        width:44px;
        height:44px;
      }

      .panel-menu{
        top:52px;
        width:min(272px, calc(100vw - 16px));
      }

      .left-legend{
        left:4px;
        width:30px;
      }

      .legend-wrap{
        height:min(38vh, 280px);
        min-height:180px;
      }

      .legend-bar{
        width:10px;
      }

      .legend-label{
        left:15px;
        font-size:9px;
      }
    }
  </style>
</head>

<body>
  <fv-shell data-boot-hold-ms="3000">
    <div class="rain-page">
      <div class="map-stage">
        <div id="rainMap" aria-label="Rain map"></div>

        <div class="left-legend" aria-label="Rainfall legend">
          <div class="legend-wrap">
            <div class="legend-bar"></div>
            <span class="legend-label l1" id="legendTop">Max</span>
            <span class="legend-label l2" id="legendQ5"></span>
            <span class="legend-label l3" id="legendQ4"></span>
            <span class="legend-label l4" id="legendMid"></span>
            <span class="legend-label l5" id="legendQ2"></span>
            <span class="legend-label l6" id="legendQ1"></span>
            <span class="legend-label l7" id="legendBottom">Min</span>
          </div>
        </div>

        <div class="top-tools">
          <button id="btnMenu" class="icon-btn" type="button" aria-label="Map options">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7H20M4 12H20M4 17H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>

          <div id="menuPanel" class="glass panel-menu" aria-label="Map controls">
            <div class="menu-field">
              <label for="viewSel">Map style</label>
              <select id="viewSel" class="menu-select">
                <option value="hybrid" selected>Satellite Hybrid</option>
                <option value="roadmap">Road Map</option>
                <option value="terrain">Terrain</option>
              </select>
            </div>

            <div class="menu-field">
              <label for="radiusSel">Blend radius</label>
              <select id="radiusSel" class="menu-select">
                <option value="900">Tight</option>
                <option value="1300">Medium</option>
                <option value="1800" selected>Blended</option>
                <option value="2400">Broad</option>
                <option value="3200">Extra Broad</option>
              </select>
            </div>

            <div class="menu-field">
              <label for="rangeSel">Time frame</label>
              <select id="rangeSel" class="menu-select">
                <option value="24h">Past 24 Hours</option>
                <option value="48h" selected>Past 48 Hours</option>
                <option value="72h">Past 72 Hours</option>
                <option value="7d">Past 7 Days</option>
                <option value="mtd">Month To Date</option>
              </select>
            </div>

            <div class="menu-field">
              <label>Refresh</label>
              <button id="btnRefresh" class="menu-btn" type="button">Reload Rainfall</button>
            </div>

            <div class="menu-field">
              <label>Map status</label>
              <div class="menu-inline">
                <div class="menu-pill">
                  <span class="mutedish">Status</span>
                  <span id="statusText">Loading…</span>
                </div>
                <div class="menu-pill">
                  <span class="mutedish">Fields / Points</span>
                  <span><span id="fieldsText" class="mono">0</span> / <span id="pointsText" class="mono">0</span></span>
                </div>
                <div id="debugText" class="menu-debug">waiting…</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </fv-shell>

  <script type="module">
    import {
      initializeApp, getApps, getApp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

    import {
      getAuth, onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    import {
      getFirestore, collection, getDocs
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    'use strict';

    const MRMS_COLLECTION = 'field_mrms_weather';
    const CACHE_TTL_MS = 2 * 60 * 1000;
    const RANGE_CACHE = new Map();

    let map = null;
    let infoWindow = null;
    let currentRange = '48h';
    let currentRequestId = 0;
    let dbRef = null;
    let authRef = null;

    let mrmsCache = { loadedAt: 0, data: [] };

    let rainCircles = [];
    let clickMarkers = [];
    let lastFieldSummaries = [];
    let lastTapTargets = [];
    let mapTapMarker = null;
    let lastRenderedFields = [];

    function $(id){ return document.getElementById(id); }

    function setStatus(msg){
      const el = $('statusText');
      if (el) el.textContent = String(msg || '');
    }

    function setFieldsMeta(n){
      const el = $('fieldsText');
      if (el) el.textContent = String(Number(n || 0));
    }

    function setPointMeta(n){
      const el = $('pointsText');
      if (el) el.textContent = String(Number(n || 0));
    }

    function setDebug(msg){
      const el = $('debugText');
      if (el) el.textContent = String(msg || '');
    }

    function lower(s){
      return String(s || '').trim().toLowerCase();
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function escapeHtml(s){
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function retry(fn, tries=3, waitMs=250){
      return (async ()=>{
        let lastErr = null;
        for (let i = 0; i < tries; i++){
          try{
            return await fn();
          }catch(err){
            lastErr = err;
            if (i < tries - 1) await sleep(waitMs * (i + 1));
          }
        }
        throw lastErr;
      })();
    }

    function detectLayoutMode(){
      const ua = navigator.userAgent || '';
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      const isMobile = /iPhone|Android|Mobile|iPad|iPod/i.test(ua);

      document.body.classList.remove('desktop-view', 'mobile-browser', 'pwa-standalone');

      if (isStandalone){
        document.body.classList.add('pwa-standalone');
      } else if (isMobile){
        document.body.classList.add('mobile-browser');
      } else {
        document.body.classList.add('desktop-view');
      }
    }

    function waitForGoogleMaps(timeoutMs=20000){
      const started = Date.now();
      return new Promise((resolve, reject)=>{
        const tick = ()=>{
          if (window.google && window.google.maps){
            resolve(window.google.maps);
            return;
          }
          if (Date.now() - started > timeoutMs){
            reject(new Error('Google Maps is still loading.'));
            return;
          }
          setTimeout(tick, 80);
        };
        tick();
      });
    }

    function firebaseConfig(){
      const cfg = window.FV_FIREBASE_CONFIG || null;
      if (!cfg || typeof cfg !== 'object') throw new Error('Firebase config missing.');
      return cfg;
    }

    async function initFirebase(){
      const cfg = firebaseConfig();
      const app = getApps().length ? getApp() : initializeApp(cfg);
      authRef = getAuth(app);
      dbRef = getFirestore(app);

      await new Promise(resolve=>{
        let done = false;
        const off = onAuthStateChanged(authRef, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        });
        setTimeout(()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, 2500);
      });

      return { app, auth: authRef, db: dbRef };
    }

    function ensureMap(){
      if (map) return map;
      if (!(window.google && window.google.maps)) throw new Error('Google Maps not loaded.');

      map = new google.maps.Map($('rainMap'), {
        center: { lat:39.80, lng:-89.85 },
        zoom: 11,
        mapTypeId: google.maps.MapTypeId.HYBRID,
        streetViewControl: false,
        fullscreenControl: false,
        mapTypeControl: false,
        clickableIcons: false,
        gestureHandling: 'greedy',
        zoomControl: false
      });

      infoWindow = new google.maps.InfoWindow();

      map.addListener('click', (ev)=>{
        handleMapTap(ev);
      });

      return map;
    }

    function updateMapStyle(){
      if (!map) return;
      const v = String($('viewSel')?.value || 'hybrid').toLowerCase();
      if (v === 'terrain') map.setMapTypeId(google.maps.MapTypeId.TERRAIN);
      else if (v === 'roadmap') map.setMapTypeId(google.maps.MapTypeId.ROADMAP);
      else map.setMapTypeId(google.maps.MapTypeId.HYBRID);
    }

    function rangeTitle(range){
      if (range === '24h') return 'Rain — Past 24 Hours';
      if (range === '48h') return 'Rain — Past 48 Hours';
      if (range === '72h') return 'Rain — Past 72 Hours';
      if (range === '7d') return 'Rain — Past 7 Days';
      return 'Rain — Month To Date';
    }

    function normalizeMrmsDoc(docId, d){
      const lat = toNum(d && d.location && d.location.lat);
      const lng = toNum(d && d.location && d.location.lng);
      if (lat == null || lng == null) return null;

      const fieldId = String((d && (d.fieldId || docId)) || docId || '');
      const fieldName = String((d && d.fieldName) || (d && d.name) || 'Field');
      const farmId = String((d && d.farmId) || '');
      const farmName = d && d.farmName != null ? String(d.farmName) : '';

      return {
        docId: String(docId || ''),
        fieldId,
        fieldName,
        farmId,
        farmName,
        location: { lat, lng },
        raw: d || {}
      };
    }

    function getSelectedFarmId(){
      try{
        const qp = new URLSearchParams(window.location.search);
        const qv = String(qp.get('farmId') || '').trim();
        if (qv) return qv;
      }catch(_){}

      const lsKeys = [
        'fv_selected_farm_id',
        'fvFarmId',
        'selectedFarmId',
        'currentFarmId',
        'farmId'
      ];

      for (const key of lsKeys){
        try{
          const v = String(localStorage.getItem(key) || '').trim();
          if (v) return v;
        }catch(_){}
      }

      const globals = [
        window.FV_CURRENT_FARM_ID,
        window.currentFarmId,
        window.selectedFarmId,
        window.FV_CONTEXT && window.FV_CONTEXT.farmId,
        window.FV_CONTEXT && window.FV_CONTEXT.selectedFarmId
      ];

      for (const v of globals){
        const s = String(v || '').trim();
        if (s) return s;
      }

      return '';
    }

    async function loadMrmsDocs(force=false){
      if (!dbRef) await initFirebase();

      const fresh = !force && mrmsCache.data.length && (Date.now() - mrmsCache.loadedAt) < CACHE_TTL_MS;
      if (fresh) return mrmsCache.data;

      const snap = await retry(() => getDocs(collection(dbRef, MRMS_COLLECTION)), 3, 250);
      const out = [];

      snap.forEach(docSnap=>{
        const row = normalizeMrmsDoc(docSnap.id, docSnap.data() || {});
        if (row) out.push(row);
      });

      mrmsCache = {
        loadedAt: Date.now(),
        data: out
      };

      return out;
    }

    function sumHourlyLast24(parentDoc){
      const rows = Array.isArray(parentDoc && parentDoc.mrmsHourlyLast24) ? parentDoc.mrmsHourlyLast24 : null;
      if (!rows || !rows.length) return null;
      return rows.reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
    }

    function sumDailySeries(parentDoc, range){
      const rows = Array.isArray(parentDoc && parentDoc.mrmsDailySeries30d) ? parentDoc.mrmsDailySeries30d.slice() : null;
      if (!rows || !rows.length) return null;

      if (range === '48h'){
        return rows.slice(-2).reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }

      if (range === '72h'){
        return rows.slice(-3).reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }

      if (range === '7d'){
        return rows.slice(-7).reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }

      if (range === 'mtd'){
        const rowsInMonth = rows.filter(row=>{
          const iso = String(row && row.dateISO || '');
          if (!iso) return false;
          const dt = new Date(iso + 'T00:00:00');
          const now = new Date();
          return dt.getFullYear() === now.getFullYear() && dt.getMonth() === now.getMonth();
        });
        if (!rowsInMonth.length) return 0;
        return rowsInMonth.reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }

      return rows.reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
    }

    function totalRainMmForRange(parentDoc, range){
      if (!parentDoc || typeof parentDoc !== 'object') return null;
      if (range === '24h') return sumHourlyLast24(parentDoc);
      return sumDailySeries(parentDoc, range);
    }

    function extractSampleGeometry(parentDoc){
      const samples = Array.isArray(parentDoc && parentDoc.mrmsHourlyLatest && parentDoc.mrmsHourlyLatest.samples)
        ? parentDoc.mrmsHourlyLatest.samples
        : [];

      const out = [];
      samples.forEach(sample=>{
        const lat = toNum(sample && sample.lat);
        const lng = toNum(sample && sample.lon);
        if (lat == null || lng == null) return;
        out.push({
          key: String((sample && sample.key) || 'center'),
          lat,
          lng
        });
      });

      return out;
    }

    function pointLabelFromKey(key){
      const k = lower(key);
      if (!k) return 'Center';
      if (k === 'center') return 'Center';
      if (k === 'north') return 'North';
      if (k === 'south') return 'South';
      if (k === 'east') return 'East';
      if (k === 'west') return 'West';
      if (k === 'northeast') return 'Northeast';
      if (k === 'northwest') return 'Northwest';
      if (k === 'southeast') return 'Southeast';
      if (k === 'southwest') return 'Southwest';
      return String(key || 'Point');
    }

    function hasUsableRainData(parentDoc, range){
      const totalMm = totalRainMmForRange(parentDoc, range);
      const geom = extractSampleGeometry(parentDoc);
      return Number.isFinite(totalMm) || geom.length > 0;
    }

    function buildFieldPoints(row, range){
      const totalMm = totalRainMmForRange(row.raw, range);
      if (!Number.isFinite(totalMm) && !extractSampleGeometry(row.raw).length) return [];

      const totalInches = Number.isFinite(totalMm) ? (totalMm / 25.4) : 0;
      let geom = extractSampleGeometry(row.raw);

      if (!geom.length){
        geom = [{
          key: 'center',
          lat: row.location.lat,
          lng: row.location.lng
        }];
      }

      return geom.map(g => ({
        fieldId: row.fieldId,
        fieldName: row.fieldName,
        farmId: row.farmId,
        pointLabel: pointLabelFromKey(g.key),
        lat: g.lat,
        lng: g.lng,
        rainInches: totalInches
      }));
    }

    function buildFieldSummary(row, range){
      const totalMm = totalRainMmForRange(row.raw, range);
      if (!Number.isFinite(totalMm) && !extractSampleGeometry(row.raw).length) return null;

      return {
        fieldId: row.fieldId,
        fieldName: row.fieldName,
        farmId: row.farmId,
        lat: row.location.lat,
        lng: row.location.lng,
        rainInches: Number.isFinite(totalMm) ? (totalMm / 25.4) : 0
      };
    }

    function blendRadiusMeters(){
      const n = Number($('radiusSel')?.value || 1800);
      return Number.isFinite(n) ? n : 1800;
    }

    function clearMapOverlays(){
      rainCircles.forEach(x => { try{ x.setMap(null); }catch(_){} });
      clickMarkers.forEach(x => { try{ x.setMap(null); }catch(_){} });
      rainCircles = [];
      clickMarkers = [];
      lastTapTargets = [];
    }

    function lerp(a,b,t){
      return a + ((b - a) * t);
    }

    function colorFromGradientStops(t, stops){
      for (let i = 1; i < stops.length; i++){
        if (t <= stops[i].t){
          const a = stops[i - 1];
          const b = stops[i];
          const u = (t - a.t) / Math.max(0.0001, (b.t - a.t));
          const r = Math.round(lerp(a.c[0], b.c[0], u));
          const g = Math.round(lerp(a.c[1], b.c[1], u));
          const bl = Math.round(lerp(a.c[2], b.c[2], u));
          return `rgb(${r}, ${g}, ${bl})`;
        }
      }
      const last = stops[stops.length - 1].c;
      return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function getScaleMode(maxInches){
      if (!Number.isFinite(maxInches) || maxInches <= 0.10){
        return {
          name: 'trace',
          domainMin: 0,
          domainMax: 0.10,
          stops: [
            { t:0.00, c:[88,168,255] },
            { t:0.40, c:[108,199,255] },
            { t:0.75, c:[99,223,137] },
            { t:1.00, c:[73,201,74] }
          ],
          legendMax: 0.10
        };
      }

      if (maxInches <= 0.50){
        return {
          name: 'light',
          domainMin: 0,
          domainMax: 0.50,
          stops: [
            { t:0.00, c:[88,168,255] },
            { t:0.25, c:[108,199,255] },
            { t:0.55, c:[99,223,137] },
            { t:0.82, c:[215,223,73] },
            { t:1.00, c:[240,184,67] }
          ],
          legendMax: 0.50
        };
      }

      return {
        name: 'normal',
        domainMin: 0,
        domainMax: maxInches,
        stops: [
          { t:0.00, c:[88,168,255] },
          { t:0.16, c:[108,199,255] },
          { t:0.34, c:[99,223,137] },
          { t:0.52, c:[73,201,74] },
          { t:0.70, c:[215,223,73] },
          { t:0.84, c:[240,184,67] },
          { t:0.94, c:[239,107,70] },
          { t:1.00, c:[217,44,198] }
        ],
        legendMax: maxInches
      };
    }

    function normalizeForScale(v, scale){
      const min = Number(scale.domainMin || 0);
      const max = Number(scale.domainMax || 1);
      if (!Number.isFinite(v)) return 0;
      if (!Number.isFinite(min) || !Number.isFinite(max) || Math.abs(max - min) < 0.0001) return 0.5;
      return clamp((v - min) / (max - min), 0, 1);
    }

    function formatLegendValue(n){
      const v = Number(n || 0);
      if (v >= 10) return v.toFixed(0) + '"+';
      if (v >= 1) return v.toFixed(1) + '"';
      if (v >= 0.1) return v.toFixed(1).replace(/^0/, '') + '"';
      return v.toFixed(2).replace(/^0/, '') + '"';
    }

    function updateLegendDynamic(scale){
      const min = Number(scale.domainMin || 0);
      const max = Number(scale.domainMax || 1);

      const q5 = min + ((max - min) * 0.83);
      const q4 = min + ((max - min) * 0.68);
      const mid = min + ((max - min) * 0.50);
      const q2 = min + ((max - min) * 0.34);
      const q1 = min + ((max - min) * 0.18);

      $('legendTop').textContent = formatLegendValue(max);
      $('legendQ5').textContent = formatLegendValue(q5);
      $('legendQ4').textContent = formatLegendValue(q4);
      $('legendMid').textContent = formatLegendValue(mid);
      $('legendQ2').textContent = formatLegendValue(q2);
      $('legendQ1').textContent = formatLegendValue(q1);
      $('legendBottom').textContent = formatLegendValue(min);
    }

    function computeFieldBounds(fields){
      const bounds = new google.maps.LatLngBounds();
      fields.forEach(f=>{
        const lat = toNum(f && f.location && f.location.lat);
        const lng = toNum(f && f.location && f.location.lng);
        if (lat == null || lng == null) return;
        bounds.extend({ lat, lng });
      });
      return bounds;
    }

    function fitToFields(fields){
      if (!map || !fields || !fields.length) return;

      const bounds = computeFieldBounds(fields);
      if (bounds.isEmpty()) return;

      map.fitBounds(bounds, 0);

      google.maps.event.addListenerOnce(map, 'idle', ()=>{
        const z = map.getZoom();
        if (Number.isFinite(z) && z < 10) map.setZoom(10);
        if (Number.isFinite(z) && z > 14) map.setZoom(14);
      });
    }

    function buildPopupHtml(summary, pointLabel){
      return (
        '<div class="popup-card">' +
          '<div class="name">' + escapeHtml(summary.fieldName || 'Field') + '</div>' +
          '<div>' + escapeHtml(rangeTitle(currentRange)) + '</div>' +
          '<div>Rain: <span class="mono">' + Number(summary.rainInches || 0).toFixed(2) + ' in</span></div>' +
          (pointLabel ? '<div>Tap zone: ' + escapeHtml(pointLabel) + '</div>' : '') +
        '</div>'
      );
    }

    function metersBetween(lat1, lng1, lat2, lng2){
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) * Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function getTapThresholdMeters(){
      const z = Number(map && map.getZoom ? map.getZoom() : 11);
      const radius = blendRadiusMeters();

      if (z >= 14) return clamp(radius * 0.35, 260, 700);
      if (z >= 13) return clamp(radius * 0.45, 350, 950);
      if (z >= 12) return clamp(radius * 0.60, 500, 1300);
      if (z >= 11) return clamp(radius * 0.80, 700, 1900);
      if (z >= 10) return clamp(radius * 1.00, 900, 2600);
      return clamp(radius * 1.30, 1200, 3600);
    }

    function nearestTapTarget(lat, lng){
      if (!lastTapTargets.length) return null;

      let best = null;
      let bestDist = Infinity;

      lastTapTargets.forEach(item=>{
        const dist = metersBetween(lat, lng, Number(item.lat), Number(item.lng));
        if (dist < bestDist){
          bestDist = dist;
          best = item;
        }
      });

      const threshold = getTapThresholdMeters();
      if (!best || !Number.isFinite(bestDist) || bestDist > threshold) return null;

      return {
        ...best,
        tapDistanceMeters: bestDist
      };
    }

    function drawRadarLikeBlobs(points, fields){
      ensureMap();
      clearMapOverlays();

      const values = points.map(p => Number(p.rainInches || 0)).filter(v => Number.isFinite(v));
      const maxVal = values.length ? Math.max(...values) : 0;
      const scale = getScaleMode(maxVal);
      const radius = blendRadiusMeters();

      updateLegendDynamic(scale);

      points.forEach(p=>{
        const lat = toNum(p.lat);
        const lng = toNum(p.lng);
        const rain = Number(p.rainInches || 0);
        if (lat == null || lng == null) return;

        const n = normalizeForScale(rain, scale);
        const color = colorFromGradientStops(n, scale.stops);
        const center = { lat, lng };

        let layers;
        if (scale.name === 'trace'){
          layers = [
            { scale:1.70, opacity:0.018 + (n * 0.012) },
            { scale:1.25, opacity:0.028 + (n * 0.014) },
            { scale:0.92, opacity:0.040 + (n * 0.016) }
          ];
        } else if (scale.name === 'light'){
          layers = [
            { scale:1.85, opacity:0.022 + (n * 0.016) },
            { scale:1.35, opacity:0.034 + (n * 0.020) },
            { scale:0.98, opacity:0.048 + (n * 0.022) },
            { scale:0.72, opacity:0.060 + (n * 0.024) }
          ];
        } else {
          layers = [
            { scale:1.90, opacity:0.025 + (n * 0.020) },
            { scale:1.45, opacity:0.038 + (n * 0.024) },
            { scale:1.08, opacity:0.055 + (n * 0.028) },
            { scale:0.76, opacity:0.072 + (n * 0.032) }
          ];
        }

        layers.forEach(layer=>{
          const circle = new google.maps.Circle({
            map,
            center,
            radius: radius * layer.scale,
            strokeOpacity: 0,
            strokeWeight: 0,
            fillColor: color,
            fillOpacity: Math.min(scale.name === 'trace' ? 0.09 : 0.13, layer.opacity),
            zIndex: 10
          });
          rainCircles.push(circle);
        });

        const marker = new google.maps.Marker({
          position: center,
          map,
          opacity: 0.001,
          zIndex: 30
        });

        marker.addListener('click', ()=>{
          const summary = lastFieldSummaries.find(x => x.fieldId === p.fieldId) || p;
          infoWindow.setContent(buildPopupHtml(summary, p.pointLabel));
          infoWindow.open(map, marker);
        });

        clickMarkers.push(marker);
        lastTapTargets.push({
          fieldId: p.fieldId,
          fieldName: p.fieldName,
          pointLabel: p.pointLabel,
          lat: p.lat,
          lng: p.lng
        });
      });

      setPointMeta(points.length);
      setFieldsMeta(fields.length);
      fitToFields(fields);

      const modeLabel = scale.name === 'trace' ? 'trace scale' : (scale.name === 'light' ? 'light scale' : 'normal scale');
      setDebug(
        'range=' + currentRange +
        ' • fields=' + fields.length +
        ' • points=' + points.length +
        ' • ' + modeLabel
      );
    }

    function handleMapTap(ev){
      if (!ev || !ev.latLng || !lastFieldSummaries.length) return;

      const lat = ev.latLng.lat();
      const lng = ev.latLng.lng();
      const hit = nearestTapTarget(lat, lng);

      if (!hit){
        if (infoWindow) infoWindow.close();
        return;
      }

      const summary = lastFieldSummaries.find(x => x.fieldId === hit.fieldId);
      if (!summary){
        if (infoWindow) infoWindow.close();
        return;
      }

      if (!mapTapMarker){
        mapTapMarker = new google.maps.Marker({
          map,
          opacity: 0.001
        });
      }

      mapTapMarker.setPosition({
        lat: Number(summary.lat),
        lng: Number(summary.lng)
      });

      infoWindow.setContent(buildPopupHtml(summary, hit.pointLabel));
      infoWindow.open(map, mapTapMarker);
    }

    function cacheRangeResult(range, data){
      RANGE_CACHE.set(range, {
        ts: Date.now(),
        data
      });
    }

    function getCachedRangeResult(range){
      const hit = RANGE_CACHE.get(range);
      if (!hit) return null;
      if ((Date.now() - hit.ts) > (5 * 60 * 1000)) return null;
      return hit.data;
    }

    async function loadRenderableRows(range, requestId, force=false){
      const rows = await loadMrmsDocs(force);
      if (requestId !== currentRequestId) return { cancelled:true };

      const selectedFarmId = getSelectedFarmId();
      const farmFiltered = selectedFarmId
        ? rows.filter(row => String(row.farmId || '') === selectedFarmId)
        : rows.slice();

      let usableRows = farmFiltered.filter(row => hasUsableRainData(row.raw, range));

      usableRows.sort((a, b)=>
        String(a.fieldName).localeCompare(String(b.fieldName), undefined, { numeric:true, sensitivity:'base' })
      );

      let fieldsWithSamples = 0;
      let centerFallbackFields = 0;
      let zeroRainFields = 0;

      const points = [];
      const summaries = [];
      const renderedFields = [];

      usableRows.forEach(row=>{
        const fieldPoints = buildFieldPoints(row, range);
        const summary = buildFieldSummary(row, range);
        if (!fieldPoints.length || !summary) return;

        const geom = extractSampleGeometry(row.raw);

        renderedFields.push({
          fieldId: row.fieldId,
          fieldName: row.fieldName,
          farmId: row.farmId,
          location: {
            lat: row.location.lat,
            lng: row.location.lng
          }
        });

        summaries.push(summary);
        points.push(...fieldPoints);

        if (geom.length) fieldsWithSamples++;
        else centerFallbackFields++;

        if ((summary.rainInches || 0) <= 0) zeroRainFields++;
      });

      setDebug(
        'allDocs=' + rows.length +
        ' • farmDocs=' + farmFiltered.length +
        ' • renderedFields=' + renderedFields.length +
        ' • sampleFields=' + fieldsWithSamples +
        ' • centerFallback=' + centerFallbackFields +
        ' • zeroRain=' + zeroRainFields +
        ' • points=' + points.length
      );

      return {
        points,
        summaries,
        renderedFields,
        stats: {
          allDocs: rows.length,
          farmDocs: farmFiltered.length,
          renderedFields: renderedFields.length,
          fieldsWithSamples,
          centerFallbackFields,
          zeroRainFields,
          points: points.length,
          selectedFarmId
        }
      };
    }

    async function renderRain(force=false){
      const requestId = ++currentRequestId;
      currentRange = String($('rangeSel')?.value || currentRange || '48h');

      try{
        ensureMap();
        updateMapStyle();
      }catch(e){
        setStatus('Map failed');
        setDebug(String(e && e.message ? e.message : e || 'map error'));
        return;
      }

      const cached = !force ? getCachedRangeResult(currentRange) : null;
      if (cached && Array.isArray(cached.points) && cached.points.length){
        lastFieldSummaries = Array.isArray(cached.summaries) ? cached.summaries : [];
        lastRenderedFields = Array.isArray(cached.renderedFields) ? cached.renderedFields : [];
        drawRadarLikeBlobs(cached.points || [], cached.renderedFields || []);
        setStatus('Cached');
      } else {
        setStatus('Loading…');
        setDebug('loading MRMS docs…');
      }

      try{
        const res = await loadRenderableRows(currentRange, requestId, force);
        if (!res || res.cancelled || requestId !== currentRequestId) return;

        const points = Array.isArray(res.points) ? res.points : [];
        const summaries = Array.isArray(res.summaries) ? res.summaries : [];
        const renderedFields = Array.isArray(res.renderedFields) ? res.renderedFields : [];

        if (points.length){
          cacheRangeResult(currentRange, { points, summaries, renderedFields });
        }

        lastFieldSummaries = summaries;
        lastRenderedFields = renderedFields;

        if (!points.length || !renderedFields.length){
          clearMapOverlays();
          setFieldsMeta(0);
          setPointMeta(0);
          updateLegendDynamic(getScaleMode(0.10));
          setStatus('No data');
          setDebug(
            'no renderable MRMS docs • range=' + currentRange +
            (res.stats && res.stats.selectedFarmId ? ' • farm=' + res.stats.selectedFarmId : '')
          );
          return;
        }

        drawRadarLikeBlobs(points, renderedFields);

        const hasAnyRain = points.some(p => Number(p.rainInches || 0) > 0);
        setStatus(hasAnyRain ? 'Live' : 'Live (0 rain)');
      }catch(e){
        console.warn('[Dev Rain Map] render failed:', e);

        const fallback = getCachedRangeResult(currentRange);
        if (fallback){
          lastFieldSummaries = Array.isArray(fallback.summaries) ? fallback.summaries : [];
          lastRenderedFields = Array.isArray(fallback.renderedFields) ? fallback.renderedFields : [];
          drawRadarLikeBlobs(fallback.points || [], fallback.renderedFields || []);
          setStatus('Cached');
          setDebug('live failed • showing cached');
          return;
        }

        clearMapOverlays();
        setFieldsMeta(0);
        setPointMeta(0);
        setStatus('Load failed');
        setDebug(String(e && e.message ? e.message : e || 'render failed'));
      }
    }

    function stopMenuBubble(e){
      if (!e) return;
      e.stopPropagation();
    }

    function wireUi(){
      const btnMenu = $('btnMenu');
      const menuPanel = $('menuPanel');
      const btnRefresh = $('btnRefresh');

      ['pointerdown','mousedown','touchstart','click'].forEach(evt=>{
        btnMenu?.addEventListener(evt, stopMenuBubble);
        menuPanel?.addEventListener(evt, stopMenuBubble);
      });

      if (btnMenu && menuPanel){
        btnMenu.addEventListener('click', ()=>{
          menuPanel.classList.toggle('open');
        });

        document.addEventListener('click', (e)=>{
          if (!menuPanel.classList.contains('open')) return;
          if (menuPanel.contains(e.target) || btnMenu.contains(e.target)) return;
          menuPanel.classList.remove('open');
        });
      }

      btnRefresh?.addEventListener('click', ()=>{
        renderRain(true);
      });

      $('viewSel')?.addEventListener('change', ()=>{
        updateMapStyle();
      });

      $('radiusSel')?.addEventListener('change', ()=>{
        renderRain(false);
      });

      $('rangeSel')?.addEventListener('change', ()=>{
        renderRain(false);
      });
    }

    async function startRainMap(){
      try{
        detectLayoutMode();
        await initFirebase();
        await waitForGoogleMaps();
        ensureMap();
        wireUi();
        updateLegendDynamic(getScaleMode(0.10));
        renderRain(false);
      }catch(e){
        console.warn('[Dev Rain Map] startup failed:', e);
        setStatus('Startup failed');
        setDebug(String(e && e.message ? e.message : e || 'startup error'));
      }
    }

    window.startRainMap = startRainMap;
  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzKBEQ1-wCJ8_nv1dR3wQI0nTk1IrgWzY&callback=startRainMap"></script>
