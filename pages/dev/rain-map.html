<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FarmVista • Dev Rain Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B7E46"/>

  <link rel="manifest" href="/Farm-vista/manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="/Farm-vista/assets/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/Farm-vista/assets/icons/icon-192.png"/>

  <script src="/Farm-vista/js/theme-boot.js"></script>
  <link rel="stylesheet" href="/Farm-vista/assets/css/theme.css"/>
  <link rel="stylesheet" href="/Farm-vista/assets/css/app.css"/>

  <script src="/Farm-vista/js/firebase-config.js"></script>
  <script src="/Farm-vista/js/firebase-init.js"></script>

  <script>
    (function(){
      if(!customElements.get('fv-shell')){
        const s = document.createElement('script');
        s.src = '/Farm-vista/js/fv-shell.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>

  <style>
    :root{
      --accent:#2F6C3C;
      --glass:rgba(255,255,255,.70);
      --glass-strong:rgba(255,255,255,.80);
      --glass-border:rgba(255,255,255,.20);
      --glass-shadow:0 14px 36px rgba(0,0,0,.18);
      --text-dark:#18211b;
      --safe-top:calc(env(safe-area-inset-top, 0px) + 8px);
      --safe-bottom:calc(env(safe-area-inset-bottom, 0px) + 8px);
      --blur:blur(14px);
    }

    html.dark{
      --glass:rgba(22,28,24,.66);
      --glass-strong:rgba(22,28,24,.78);
      --glass-border:rgba(255,255,255,.08);
      --glass-shadow:0 16px 44px rgba(0,0,0,.38);
      --text-dark:#f3f7f2;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#253327;
    }

    body{
      color:var(--text-dark);
    }

    fv-shell,
    .rain-page,
    .map-stage{
      display:block;
      width:100%;
      height:100svh;
      min-height:100svh;
    }

    .rain-page{
      position:relative;
      overflow:hidden;
      background:#233125;
    }

    .map-stage{
      position:relative;
      overflow:hidden;
    }

    #rainMap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:#dfe5dd;
    }

    .glass{
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
    }

    .top-mini{
      position:absolute;
      top:var(--safe-top);
      left:10px;
      right:10px;
      z-index:20;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      pointer-events:none;
    }

    .brand-pill{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:40px;
      padding:10px 14px;
      border-radius:999px;
      color:var(--text-dark);
      font-size:14px;
      font-weight:900;
      line-height:1;
      white-space:nowrap;
    }

    .brand-dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:#2da1ff;
      flex:0 0 auto;
      box-shadow:0 0 0 3px rgba(45,161,255,.18);
    }

    .right-tools{
      pointer-events:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      color:var(--text-dark);
      background:var(--glass-strong);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      padding:0;
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      display:block;
    }

    .icon-btn:active{ transform:translateY(1px); }

    .left-legend{
      position:absolute;
      left:6px;
      top:50%;
      transform:translateY(-50%);
      z-index:18;
      width:34px;
      pointer-events:none;
    }

    .legend-wrap{
      position:relative;
      width:100%;
      height:min(44vh, 360px);
      min-height:220px;
      border-radius:14px;
      overflow:visible;
    }

    .legend-bar{
      position:absolute;
      left:0;
      top:0;
      width:12px;
      height:100%;
      border-radius:999px;
      background:
        linear-gradient(
          to top,
          #58a8ff 0%,
          #6cc7ff 10%,
          #63df89 24%,
          #49c94a 40%,
          #cde34a 56%,
          #f0d84a 70%,
          #f5a83c 82%,
          #ee5a46 92%,
          #d62ac6 100%
        );
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .legend-label{
      position:absolute;
      left:18px;
      transform:translateY(50%);
      font-size:10px;
      font-weight:900;
      color:#fff;
      line-height:1;
      text-shadow:0 1px 4px rgba(0,0,0,.55);
      white-space:nowrap;
    }

    .legend-label.l1{ bottom:100%; transform:translateY(0); }
    .legend-label.l2{ bottom:83%; }
    .legend-label.l3{ bottom:68%; }
    .legend-label.l4{ bottom:50%; }
    .legend-label.l5{ bottom:34%; }
    .legend-label.l6{ bottom:18%; }
    .legend-label.l7{ bottom:0; transform:translateY(0); }

    .bottom-dock{
      position:absolute;
      left:50%;
      bottom:calc(var(--safe-bottom) + var(--ftr-h, 42px) + 8px);
      transform:translateX(-50%);
      z-index:20;
      width:min(760px, calc(100vw - 18px));
      padding:10px 10px 12px;
      border-radius:26px;
    }

    .dock-head{
      text-align:center;
      font-size:11px;
      font-weight:900;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--text-dark);
      opacity:.72;
      margin-bottom:8px;
    }

    .range-row{
      display:grid;
      grid-template-columns:repeat(5, 1fr);
      gap:8px;
    }

    .range-btn{
      appearance:none;
      -webkit-appearance:none;
      border:none;
      border-radius:999px;
      padding:13px 6px;
      font:inherit;
      font-size:16px;
      font-weight:900;
      color:rgba(0,0,0,.56);
      background:rgba(255,255,255,.42);
      cursor:pointer;
      transition:background .12s ease, color .12s ease, box-shadow .12s ease;
    }

    html.dark .range-btn{
      color:rgba(255,255,255,.72);
      background:rgba(255,255,255,.10);
    }

    .range-btn.active{
      color:#1678ff;
      background:#f8fbff;
      box-shadow:inset 0 0 0 3px #2ea2ff;
    }

    html.dark .range-btn.active{
      color:#fff;
      background:rgba(66,134,255,.24);
      box-shadow:inset 0 0 0 3px #58a8ff;
    }

    .range-btn:active{ transform:translateY(1px); }

    .mini-meta{
      position:absolute;
      right:8px;
      bottom:calc(var(--safe-bottom) + var(--ftr-h, 42px) + 118px);
      z-index:18;
      display:grid;
      gap:8px;
      justify-items:end;
      pointer-events:none;
    }

    .mini-chip{
      pointer-events:auto;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      color:var(--text-dark);
      white-space:nowrap;
    }

    .status-dot{
      width:10px;
      height:10px;
      border-radius:999px;
      flex:0 0 auto;
      background:#6fbf73;
      box-shadow:0 0 0 3px rgba(111,191,115,.18);
    }

    .status-dot.error{
      background:#d34b5e;
      box-shadow:0 0 0 3px rgba(211,75,94,.18);
    }

    .panel-menu{
      position:absolute;
      top:58px;
      right:0;
      z-index:25;
      width:min(230px, calc(100vw - 20px));
      padding:10px;
      border-radius:18px;
      display:none;
    }

    .panel-menu.open{
      display:block;
    }

    .menu-field{
      margin-bottom:10px;
    }

    .menu-field:last-child{
      margin-bottom:0;
    }

    .menu-field label{
      display:block;
      margin:0 0 6px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text-dark);
      opacity:.80;
    }

    .menu-select{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:
        linear-gradient(45deg, transparent 50%, rgba(0,0,0,.42) 50%),
        linear-gradient(135deg, rgba(0,0,0,.42) 50%, transparent 50%),
        color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      background-position:
        calc(100% - 21px) calc(50% - 3px),
        calc(100% - 13px) calc(50% - 3px),
        0 0;
      background-size:8px 8px, 8px 8px, 100% 100%;
      background-repeat:no-repeat;
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px 38px 12px 12px;
      outline:none;
      box-sizing:border-box;
    }

    .hint-chip{
      position:absolute;
      left:50%;
      top:calc(var(--safe-top) + 54px);
      transform:translateX(-50%);
      z-index:18;
      pointer-events:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      color:var(--text-dark);
      white-space:nowrap;
      opacity:.96;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    }

    @media (max-width:680px){
      .brand-pill{
        min-height:36px;
        padding:9px 12px;
        font-size:13px;
      }

      .icon-btn{
        width:44px;
        height:44px;
      }

      .bottom-dock{
        width:calc(100vw - 12px);
        padding:8px 8px 10px;
        border-radius:22px;
      }

      .dock-head{
        font-size:10px;
        margin-bottom:6px;
      }

      .range-row{
        gap:6px;
      }

      .range-btn{
        font-size:15px;
        padding:12px 4px;
      }

      .mini-meta{
        right:6px;
        bottom:calc(var(--safe-bottom) + var(--ftr-h, 42px) + 104px);
        gap:6px;
      }

      .mini-chip{
        font-size:11px;
        padding:7px 10px;
      }

      .hint-chip{
        top:calc(var(--safe-top) + 48px);
        font-size:11px;
        padding:7px 10px;
      }

      .left-legend{
        left:4px;
        width:30px;
      }

      .legend-wrap{
        height:min(38vh, 280px);
        min-height:180px;
      }

      .legend-bar{
        width:10px;
      }

      .legend-label{
        left:15px;
        font-size:9px;
      }

      .panel-menu{
        top:52px;
      }
    }
  </style>
</head>

<body>
  <fv-shell data-boot-hold-ms="3000">
    <div class="rain-page">
      <div class="map-stage">
        <div id="rainMap" aria-label="Rain map"></div>

        <div class="top-mini">
          <div class="glass brand-pill">
            <span class="brand-dot" aria-hidden="true"></span>
            <span>FarmVista Rain</span>
          </div>

          <div class="right-tools">
            <button id="btnMenu" class="icon-btn" type="button" aria-label="Map options">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 7H20M4 12H20M4 17H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </button>

            <div id="menuPanel" class="glass panel-menu" aria-label="Map controls">
              <div class="menu-field">
                <label for="viewSel">Map style</label>
                <select id="viewSel" class="menu-select">
                  <option value="hybrid" selected>Satellite Hybrid</option>
                  <option value="roadmap">Road Map</option>
                  <option value="terrain">Terrain</option>
                </select>
              </div>

              <div class="menu-field">
                <label for="radiusSel">Smoothing</label>
                <select id="radiusSel" class="menu-select">
                  <option value="34">Tight</option>
                  <option value="52" selected>Medium</option>
                  <option value="74">Broad</option>
                  <option value="96">Max</option>
                </select>
              </div>
            </div>

            <button id="btnRefresh" class="icon-btn" type="button" aria-label="Refresh rainfall map">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M20 12A8 8 0 1 1 17.66 6.34" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M20 4V9H15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="glass hint-chip">
          <span>Drag with one finger • pinch to zoom</span>
        </div>

        <div class="left-legend" aria-label="Rainfall legend">
          <div class="legend-wrap">
            <div class="legend-bar"></div>
            <span class="legend-label l1">10"+</span>
            <span class="legend-label l2">6"</span>
            <span class="legend-label l3">4"</span>
            <span class="legend-label l4">2"</span>
            <span class="legend-label l5">1"</span>
            <span class="legend-label l6">.5"</span>
            <span class="legend-label l7">.1"</span>
          </div>
        </div>

        <div class="mini-meta">
          <div class="glass mini-chip" id="statusChip">
            <span id="statusDot" class="status-dot"></span>
            <span id="statusText">Loading…</span>
          </div>
          <div class="glass mini-chip" id="fieldsMeta">Fields: <span class="mono">0</span></div>
          <div class="glass mini-chip" id="pointCountMeta">Points: <span class="mono">0</span></div>
        </div>

        <div class="glass bottom-dock">
          <div id="rangeTitle" class="dock-head">Rain — Past 48 Hours</div>
          <div class="range-row">
            <button class="range-btn" type="button" data-range="24h">24h</button>
            <button class="range-btn active" type="button" data-range="48h">48h</button>
            <button class="range-btn" type="button" data-range="72h">72h</button>
            <button class="range-btn" type="button" data-range="7d">7d</button>
            <button class="range-btn" type="button" data-range="mtd">MTD</button>
          </div>
        </div>
      </div>
    </div>
  </fv-shell>

  <script type="module">
    import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { loadFieldMrmsDoc } from '/Farm-vista/js/field-readiness/data.js';
    import { mrmsRainInRange } from '/Farm-vista/js/field-readiness/rain.js';

    'use strict';

    const state = {
      fields: [],
      _mrmsDocByFieldId: Object.create(null)
    };

    let map = null;
    let heatmap = null;
    let infoWindow = null;
    let clickMarkers = [];
    let currentRange = '48h';
    let currentRequestId = 0;

    function $(id){ return document.getElementById(id); }

    function setStatus(msg, isError){
      const txt = $('statusText');
      const dot = $('statusDot');
      if (txt) txt.textContent = String(msg || '');
      if (dot) dot.classList.toggle('error', !!isError);
    }

    function setFieldsMeta(n){
      const el = $('fieldsMeta');
      if (el) el.innerHTML = 'Fields: <span class="mono">' + String(Number(n || 0)) + '</span>';
    }

    function setPointMeta(n){
      const el = $('pointCountMeta');
      if (el) el.innerHTML = 'Points: <span class="mono">' + String(Number(n || 0)) + '</span>';
    }

    function lower(s){
      return String(s || '').trim().toLowerCase();
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function escapeHtml(s){
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function waitForGoogleMaps(timeoutMs=20000){
      const started = Date.now();
      return new Promise((resolve, reject)=>{
        const tick = ()=>{
          if (window.google && window.google.maps && window.google.maps.visualization){
            resolve(window.google.maps);
            return;
          }
          if (Date.now() - started > timeoutMs){
            reject(new Error('Google Maps is still loading.'));
            return;
          }
          setTimeout(tick, 80);
        };
        tick();
      });
    }

    function firebaseConfig(){
      const cfg = window.FV_FIREBASE_CONFIG || null;
      if (!cfg || typeof cfg !== 'object') throw new Error('Firebase config is missing.');
      return cfg;
    }

    async function getFirebaseClients(){
      const cfg = firebaseConfig();
      const app = getApps().length ? getApp() : initializeApp(cfg);
      const auth = getAuth(app);
      const db = getFirestore(app);

      await new Promise(resolve=>{
        let done = false;
        const off = onAuthStateChanged(auth, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        });
        setTimeout(()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, 2500);
      });

      return { app, auth, db };
    }

    async function loadActiveFields(){
      const { db } = await getFirebaseClients();
      const snap = await getDocs(collection(db, 'fields'));
      const out = [];

      snap.forEach(docSnap=>{
        const d = docSnap.data() || {};
        const lat = toNum(d && d.location && d.location.lat);
        const lng = toNum(d && d.location && d.location.lng);
        if (lat == null || lng == null) return;

        const archived = !!(d.archived === true || d.isArchived === true || d.inactive === true);
        const status = lower(d.status);
        if (archived) return;
        if (status === 'archived' || status === 'inactive') return;

        out.push({
          id: docSnap.id,
          name: String(d.name || d.fieldName || 'Field'),
          farmId: String(d.farmId || ''),
          location: { lat, lng }
        });
      });

      return out;
    }

    function ensureMap(){
      if (map) return map;
      if (!(window.google && window.google.maps)) throw new Error('Google Maps is not loaded.');

      map = new google.maps.Map($('rainMap'), {
        center: { lat:39.800, lng:-91.150 },
        zoom: 8,
        mapTypeId: google.maps.MapTypeId.HYBRID,
        streetViewControl: false,
        fullscreenControl: false,
        mapTypeControl: false,
        clickableIcons: false,
        gestureHandling: 'greedy',
        zoomControl: false
      });

      infoWindow = new google.maps.InfoWindow();

      heatmap = new google.maps.visualization.HeatmapLayer({
        data: [],
        map,
        dissipating: true,
        opacity: 0.72,
        radius: Number($('radiusSel')?.value || 52),
        gradient: [
          'rgba(52, 119, 255, 0.00)',
          'rgba(90, 167, 255, 0.24)',
          'rgba(108, 199, 255, 0.34)',
          'rgba(99, 223, 137, 0.46)',
          'rgba(73, 201, 74, 0.58)',
          'rgba(205, 227, 74, 0.72)',
          'rgba(240, 216, 74, 0.82)',
          'rgba(245, 168, 60, 0.90)',
          'rgba(238, 90, 70, 0.96)',
          'rgba(214, 42, 198, 1.00)'
        ]
      });

      return map;
    }

    function updateMapStyle(){
      if (!map) return;
      const v = String($('viewSel')?.value || 'hybrid').toLowerCase();
      if (v === 'terrain') map.setMapTypeId(google.maps.MapTypeId.TERRAIN);
      else if (v === 'roadmap') map.setMapTypeId(google.maps.MapTypeId.ROADMAP);
      else map.setMapTypeId(google.maps.MapTypeId.HYBRID);
    }

    function milesToLat(miles){
      return miles / 69.0;
    }

    function milesToLng(miles, lat){
      const denom = Math.max(0.01, 69.172 * Math.cos((Number(lat || 0) * Math.PI) / 180));
      return miles / denom;
    }

    function coordsForLabel(field, label, miles=0.50){
      const baseLat = toNum(field && field.location && field.location.lat);
      const baseLng = toNum(field && field.location && field.location.lng);
      if (baseLat == null || baseLng == null) return null;

      const dLat = milesToLat(miles);
      const dLng = milesToLng(miles, baseLat);
      const norm = lower(label);

      if (!norm || norm === 'center' || norm === 'centre') return { lat: baseLat, lng: baseLng };
      if (norm === 'north' || norm === 'n') return { lat: baseLat + dLat, lng: baseLng };
      if (norm === 'south' || norm === 's') return { lat: baseLat - dLat, lng: baseLng };
      if (norm === 'east' || norm === 'e') return { lat: baseLat, lng: baseLng + dLng };
      if (norm === 'west' || norm === 'w') return { lat: baseLat, lng: baseLng - dLng };
      if (norm === 'northeast' || norm === 'ne') return { lat: baseLat + (dLat * 0.72), lng: baseLng + (dLng * 0.72) };
      if (norm === 'northwest' || norm === 'nw') return { lat: baseLat + (dLat * 0.72), lng: baseLng - (dLng * 0.72) };
      if (norm === 'southeast' || norm === 'se') return { lat: baseLat - (dLat * 0.72), lng: baseLng + (dLng * 0.72) };
      if (norm === 'southwest' || norm === 'sw') return { lat: baseLat - (dLat * 0.72), lng: baseLng - (dLng * 0.72) };
      return { lat: baseLat, lng: baseLng };
    }

    function valueToInches(raw, unitsHint){
      const n = toNum(raw);
      if (n == null) return null;
      const u = lower(unitsHint);
      if (u === 'mm' || u === 'millimeters' || u === 'millimetres') return n / 25.4;
      return n;
    }

    function rangeHours(range){
      if (range === '24h') return 24;
      if (range === '48h') return 48;
      if (range === '72h') return 72;
      if (range === '7d') return 24 * 7;
      return null;
    }

    function rangeDays(range){
      if (range === '7d') return 7;
      if (range === 'mtd') return null;
      if (range === '24h') return 1;
      if (range === '48h') return 2;
      if (range === '72h') return 3;
      return 30;
    }

    function rangeTitle(range){
      if (range === '24h') return 'Rain — Past 24 Hours';
      if (range === '48h') return 'Rain — Past 48 Hours';
      if (range === '72h') return 'Rain — Past 72 Hours';
      if (range === '7d') return 'Rain — Past 7 Days';
      return 'Rain — Month To Date';
    }

    function updateRangeUi(){
      const title = $('rangeTitle');
      if (title) title.textContent = rangeTitle(currentRange);

      document.querySelectorAll('.range-btn').forEach(btn=>{
        btn.classList.toggle('active', String(btn.dataset.range || '') === currentRange);
      });
    }

    function clearClickMarkers(){
      clickMarkers.forEach(m => { try{ m.setMap(null); }catch(_){} });
      clickMarkers = [];
    }

    function applyHeatmap(points){
      ensureMap();
      clearClickMarkers();

      const bounds = new google.maps.LatLngBounds();
      const heatData = [];
      const radius = Number($('radiusSel')?.value || 52);

      points.forEach(p=>{
        const lat = toNum(p.lat);
        const lng = toNum(p.lng);
        const rain = Math.max(0, Number(p.rainInches || 0));
        if (lat == null || lng == null) return;

        const pos = new google.maps.LatLng(lat, lng);
        const weight = Math.max(1, Math.min(100, rain * 16));

        heatData.push({ location: pos, weight });
        bounds.extend(pos);

        const marker = new google.maps.Marker({
          position: pos,
          map,
          opacity: 0.001
        });

        marker.addListener('click', ()=>{
          infoWindow.setContent(
            '<div style="min-width:180px">' +
              '<b>' + escapeHtml(p.fieldName || 'Field') + '</b><br/>' +
              'Point: ' + escapeHtml(p.pointLabel || 'Center') + '<br/>' +
              'Rain: <span class="mono">' + rain.toFixed(2) + ' in</span>' +
            '</div>'
          );
          infoWindow.open(map, marker);
        });

        clickMarkers.push(marker);
      });

      heatmap.setData(heatData);
      heatmap.set('radius', radius);

      if (!bounds.isEmpty()){
        map.fitBounds(bounds);
      }

      setPointMeta(heatData.length);
    }

    function dayStartLocalTs(isoish){
      const dt = new Date(isoish);
      if (!Number.isFinite(dt.getTime())) return NaN;
      return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()).getTime();
    }

    function monthKeyNow(){
      const now = new Date();
      return { y: now.getFullYear(), m: now.getMonth() };
    }

    function sumLatestHourlyRows(rows, range){
      const hours = rangeHours(range);
      if (!hours || !Array.isArray(rows) || !rows.length) return null;

      const usable = rows
        .map(r => ({
          ts: Date.parse(r && (r.ts || r.time || r.hour || r.iso || r.date || r.datetime || '')),
          inches: valueToInches(
            r && (r.rainInches ?? r.inches ?? r.rain_in ?? r.totalIn ?? r.rain ?? r.value ?? r.mm),
            r && (r.units || r.unit || ((r && r.mm != null) ? 'mm' : 'in'))
          )
        }))
        .filter(x => Number.isFinite(x.ts) && x.inches != null)
        .sort((a,b) => a.ts - b.ts);

      if (!usable.length) return null;
      return usable.slice(-hours).reduce((sum, x) => sum + Number(x.inches || 0), 0);
    }

    function sumDailyRows(rows, range){
      if (!Array.isArray(rows) || !rows.length) return null;

      const usable = rows
        .map(r => ({
          ts: dayStartLocalTs(r && (r.date || r.day || r.ts || r.time || '')),
          inches: valueToInches(
            r && (r.rainInches ?? r.inches ?? r.rain_in ?? r.totalIn ?? r.rain ?? r.value ?? r.mm),
            r && (r.units || r.unit || ((r && r.mm != null) ? 'mm' : 'in'))
          )
        }))
        .filter(x => Number.isFinite(x.ts) && x.inches != null)
        .sort((a,b) => a.ts - b.ts);

      if (!usable.length) return null;

      if (range === 'mtd'){
        const now = monthKeyNow();
        const sum = usable
          .filter(x => {
            const d = new Date(x.ts);
            return d.getFullYear() === now.y && d.getMonth() === now.m;
          })
          .reduce((s, x) => s + Number(x.inches || 0), 0);

        return sum > 0 ? sum : null;
      }

      const days = rangeDays(range);
      if (!days) return null;
      return usable.slice(-days).reduce((sum, x) => sum + Number(x.inches || 0), 0);
    }

    function pickDirectRangeValue(obj, range){
      if (!obj || typeof obj !== 'object') return null;

      const lookup = {
        '24h': ['24h','last24h','last24','in24h','rain24h','rain24hIn','rain24In','total24h','total24In','last24hIn','last24In'],
        '48h': ['48h','last48h','last48','in48h','rain48h','rain48hIn','rain48In','total48h','total48In','last48hIn','last48In'],
        '72h': ['72h','last72h','last72','in72h','rain72h','rain72hIn','rain72In','total72h','total72In','last72hIn','last72In'],
        '7d':  ['7d','last7d','last7','in7d','rain7d','rain7dIn','rain7In','total7d','total7In','last7dIn','last7In'],
        'mtd': ['mtd','monthToDate','month_to_date','monthtodate','rainMtd','mtdIn','mtd_inches']
      };

      const keys = lookup[range] || [];
      for (const k of keys){
        if (obj[k] != null) return valueToInches(obj[k], obj.units || obj.unit);
      }

      const pools = [obj.rangeTotals, obj.totals, obj.totalsIn, obj.summary, obj.accumulations];
      for (const pool of pools){
        if (!pool || typeof pool !== 'object') continue;
        for (const k of keys){
          if (pool[k] != null) return valueToInches(pool[k], pool.units || obj.units || obj.unit);
        }
      }

      return null;
    }

    function resolvePointLatLng(field, point){
      const lat =
        toNum(point && point.lat) ??
        toNum(point && point.latitude) ??
        toNum(point && point.location && point.location.lat) ??
        toNum(point && point.location && point.location.latitude);

      const lng =
        toNum(point && point.lng) ??
        toNum(point && point.lon) ??
        toNum(point && point.longitude) ??
        toNum(point && point.location && (point.location.lng ?? point.location.lon ?? point.location.longitude));

      if (lat != null && lng != null) return { lat, lng };

      const label = point && (point.label || point.name || point.point || point.sample || point.key);
      return coordsForLabel(field, label, 0.50);
    }

    function pointLabel(point, fallbackKey=''){
      return String(
        (point && (point.label || point.name || point.point || point.sample || point.key)) ||
        fallbackKey ||
        'Center'
      ).trim();
    }

    function pushPoint(out, seen, field, label, lat, lng, rainInches){
      if (lat == null || lng == null || rainInches == null) return;
      const key = String(field.id) + '|' + lower(label);
      if (seen.has(key)) return;
      seen.add(key);

      out.push({
        fieldId: field.id,
        fieldName: field.name || 'Field',
        pointLabel: label || 'Center',
        lat: Number(lat),
        lng: Number(lng),
        rainInches: Number(rainInches)
      });
    }

    function extractArrayPoints(container, field, range, out, seen){
      if (!Array.isArray(container)) return;

      container.forEach((point, idx)=>{
        if (!point || typeof point !== 'object') return;

        const label = pointLabel(point, idx === 0 ? 'Center' : ('Point ' + (idx + 1)));
        const pos = resolvePointLatLng(field, point);

        let inches =
          pickDirectRangeValue(point, range) ??
          sumLatestHourlyRows(point.hourly || point.hours || point.hourlyRows, range) ??
          sumDailyRows(point.daily || point.days || point.dailyRows, range);

        if (inches == null && point.inches != null) inches = valueToInches(point.inches, point.units || point.unit);
        if (inches == null && point.rainInches != null) inches = valueToInches(point.rainInches, point.units || point.unit);
        if (inches == null && point.mm != null) inches = valueToInches(point.mm, 'mm');

        if (pos && inches != null){
          pushPoint(out, seen, field, label, pos.lat, pos.lng, inches);
        }
      });
    }

    function extractObjectMapPoints(container, field, range, out, seen){
      if (!container || typeof container !== 'object' || Array.isArray(container)) return;

      Object.entries(container).forEach(([key, raw])=>{
        if (!raw || typeof raw !== 'object') return;

        const label = pointLabel(raw, key);
        const pos = resolvePointLatLng(field, raw);

        let inches =
          pickDirectRangeValue(raw, range) ??
          sumLatestHourlyRows(raw.hourly || raw.hours || raw.hourlyRows, range) ??
          sumDailyRows(raw.daily || raw.days || raw.dailyRows, range);

        if (inches == null && raw.inches != null) inches = valueToInches(raw.inches, raw.units || raw.unit);
        if (inches == null && raw.rainInches != null) inches = valueToInches(raw.rainInches, raw.units || raw.unit);
        if (inches == null && raw.mm != null) inches = valueToInches(raw.mm, 'mm');

        if (pos && inches != null){
          pushPoint(out, seen, field, label, pos.lat, pos.lng, inches);
        }
      });
    }

    function extractRealPointsFromDoc(doc, field, range){
      const out = [];
      const seen = new Set();

      const candidateKeys = [
        'points',
        'samplePoints',
        'samples',
        'sample_points',
        'gridPoints',
        'pointTotals',
        'latestPoints',
        'rangePoints',
        'pointData',
        'sampleData'
      ];

      for (const key of candidateKeys){
        const v = doc && doc[key];
        extractArrayPoints(v, field, range, out, seen);
        extractObjectMapPoints(v, field, range, out, seen);
      }

      const nestedKeys = ['mrms', 'rain', 'rainfall', 'sampling', 'samplingPoints', 'detail'];
      for (const key of nestedKeys){
        const v = doc && doc[key];
        if (!v || typeof v !== 'object') continue;
        for (const inner of candidateKeys){
          extractArrayPoints(v[inner], field, range, out, seen);
          extractObjectMapPoints(v[inner], field, range, out, seen);
        }
      }

      return out;
    }

    function fallbackWeightedCenterPoint(doc, field, range){
      try{
        const supported = (range === '24h' || range === '48h' || range === '7d') ? range : '30d';
        const res = mrmsRainInRange(doc, supported);
        if (!res || res.ready !== true) return null;

        const pos = coordsForLabel(field, 'center', 0);
        if (!pos) return null;

        const inches = toNum(res.inches);
        if (inches == null) return null;

        return [{
          fieldId: field.id,
          fieldName: field.name || 'Field',
          pointLabel: 'Center',
          lat: pos.lat,
          lng: pos.lng,
          rainInches: inches
        }];
      }catch(_){
        return null;
      }
    }

    async function loadLivePoints(range, requestId){
      const fields = await loadActiveFields();
      if (requestId !== currentRequestId) return { cancelled:true };

      state.fields = fields;
      setFieldsMeta(fields.length);

      const points = [];
      let fallbackCount = 0;

      const jobs = fields.map(async (field)=>{
        try{
          const doc = await loadFieldMrmsDoc(state, String(field.id), { force:false });
          if (!doc || typeof doc !== 'object') return;

          const realPoints = extractRealPointsFromDoc(doc, field, range);
          if (realPoints.length){
            points.push(...realPoints);
            return;
          }

          const fallback = fallbackWeightedCenterPoint(doc, field, range);
          if (fallback && fallback.length){
            fallbackCount += 1;
            points.push(...fallback);
          }
        }catch(err){
          console.warn('[Dev Rain Map] MRMS load failed for field:', field && field.id, err);
        }
      });

      await Promise.allSettled(jobs);

      return {
        points,
        fieldCount: fields.length,
        fallbackCount
      };
    }

    async function renderRain(){
      const requestId = ++currentRequestId;
      updateRangeUi();

      try{
        ensureMap();
        updateMapStyle();
      }catch(e){
        setStatus(e && e.message ? e.message : 'Map failed.', true);
        return;
      }

      setStatus('Loading MRMS…', false);

      try{
        const res = await loadLivePoints(currentRange, requestId);
        if (!res || res.cancelled || requestId !== currentRequestId) return;

        const points = Array.isArray(res.points) ? res.points : [];
        if (!points.length){
          applyHeatmap([]);
          setStatus('No points', true);
          return;
        }

        applyHeatmap(points);

        if (Number(res.fallbackCount || 0) > 0){
          setStatus('Loaded with fallback', false);
        } else {
          setStatus('Live', false);
        }
      }catch(e){
        console.warn('[Dev Rain Map] render failed:', e);
        applyHeatmap([]);
        setStatus('Load failed', true);
      }
    }

    function wireUi(){
      const btnMenu = $('btnMenu');
      const menuPanel = $('menuPanel');
      const btnRefresh = $('btnRefresh');

      if (btnMenu && menuPanel){
        btnMenu.addEventListener('click', (e)=>{
          e.preventDefault();
          e.stopPropagation();
          menuPanel.classList.toggle('open');
        });

        document.addEventListener('click', (e)=>{
          if (!menuPanel.classList.contains('open')) return;
          if (menuPanel.contains(e.target) || btnMenu.contains(e.target)) return;
          menuPanel.classList.remove('open');
        });
      }

      btnRefresh?.addEventListener('click', renderRain);

      $('viewSel')?.addEventListener('change', ()=>{
        updateMapStyle();
      });

      $('radiusSel')?.addEventListener('change', ()=>{
        if (heatmap) heatmap.set('radius', Number($('radiusSel')?.value || 52));
      });

      document.querySelectorAll('.range-btn').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const next = String(btn.dataset.range || '');
          if (!next || next === currentRange) return;
          currentRange = next;
          renderRain();
        });
      });
    }

    async function startRainMap(){
      try{
        await waitForGoogleMaps();
        ensureMap();
        wireUi();
        updateRangeUi();
        renderRain();
      }catch(e){
        console.warn('[Dev Rain Map] startup failed:', e);
        setStatus('Startup failed', true);
      }
    }

    window.startRainMap = startRainMap;
  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzKBEQ1-wCJ8_nv1dR3wQI0nTk1IrgWzY&libraries=visualization&callback=startRainMap"></script>
