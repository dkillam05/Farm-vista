<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FarmVista • Dev Rain Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B7E46"/>

  <link rel="manifest" href="/Farm-vista/manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="/Farm-vista/assets/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/Farm-vista/assets/icons/icon-192.png"/>

  <script src="/Farm-vista/js/theme-boot.js"></script>
  <link rel="stylesheet" href="/Farm-vista/assets/css/theme.css"/>
  <link rel="stylesheet" href="/Farm-vista/assets/css/app.css"/>

  <!-- Use same app boot/config path as the working app -->
  <script src="/Farm-vista/js/firebase-config.js"></script>
  <script src="/Farm-vista/js/firebase-init.js"></script>

  <script>
    (function(){
      if(!customElements.get('fv-shell')){
        const s = document.createElement('script');
        s.src = '/Farm-vista/js/fv-shell.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>

  <style>
    :root{
      --accent:#2F6C3C;
      --overlay-bg:rgba(255,255,255,.94);
      --overlay-border:rgba(0,0,0,.08);
      --overlay-shadow:0 16px 42px rgba(0,0,0,.20);
      --safe-top:calc(env(safe-area-inset-top, 0px) + 10px);
      --safe-bottom:calc(env(safe-area-inset-bottom, 0px) + 10px);
    }

    html.dark{
      --overlay-bg:rgba(28,32,29,.92);
      --overlay-border:rgba(255,255,255,.08);
      --overlay-shadow:0 18px 50px rgba(0,0,0,.42);
    }

    body{
      margin:0;
      background:var(--app-bg,var(--surface));
      overflow:hidden;
    }

    fv-shell,
    fv-shell > .dev-shell{
      display:block;
      height:100svh;
      min-height:100svh;
    }

    .dev-shell{
      position:relative;
      width:100%;
      height:100svh;
      min-height:100svh;
      overflow:hidden;
      background:var(--surface);
    }

    .map-stage{
      position:relative;
      width:100%;
      height:100%;
      min-height:100%;
      background:#e8ede7;
    }

    #rainMap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:#e8ede7;
    }

    .overlay{
      position:absolute;
      z-index:10;
      border:1px solid var(--overlay-border);
      background:var(--overlay-bg);
      color:var(--text);
      box-shadow:var(--overlay-shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .controls{
      top:var(--safe-top);
      left:50%;
      transform:translateX(-50%);
      width:min(940px, calc(100vw - 24px));
      border-radius:18px;
      padding:10px;
    }

    .controls-grid{
      display:grid;
      grid-template-columns:minmax(150px, 200px) minmax(150px, 200px) minmax(110px, 130px) 1fr;
      gap:10px;
      align-items:end;
    }

    .field{
      min-width:0;
    }

    .field label{
      display:block;
      margin:0 0 6px;
      font-size:12px;
      font-weight:900;
      color:var(--text);
    }

    .select,
    .input,
    .btn{
      width:100%;
      font:inherit;
      font-size:16px;
      border-radius:12px;
      outline:none;
      box-sizing:border-box;
    }

    .select,
    .input{
      color:var(--text);
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      border:1px solid var(--border);
      padding:12px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 14px;
      border:1px solid transparent;
      background:var(--accent);
      color:#fff !important;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .btn:active{ transform:translateY(1px); }
    .btn:disabled{ opacity:.6; cursor:not-allowed; transform:none; }

    .status-pill{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-height:48px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text);
      font-size:13px;
      line-height:1.2;
      font-weight:800;
    }

    .status-pill.error{
      color:#b00020;
      border-color:rgba(176,0,32,.20);
      background:color-mix(in srgb, #b00020 7%, var(--surface) 93%);
    }

    .legend{
      right:12px;
      bottom:var(--safe-bottom);
      width:min(220px, calc(100vw - 24px));
      border-radius:16px;
      padding:12px 14px;
    }

    .legend-title{
      font-size:12px;
      font-weight:900;
      margin:0 0 8px;
      color:var(--text);
    }

    .legend-sub{
      margin:0 0 8px;
      font-size:11px;
      color:var(--muted,#67706B);
      line-height:1.25;
    }

    .legend-row{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      margin:6px 0;
      color:var(--text);
    }

    .swatch{
      width:16px;
      height:16px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.15);
      flex:0 0 auto;
    }

    .mini-meta{
      position:absolute;
      left:12px;
      bottom:var(--safe-bottom);
      z-index:10;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      max-width:calc(100vw - 260px);
    }

    .mini-chip{
      border:1px solid var(--overlay-border);
      background:var(--overlay-bg);
      color:var(--text);
      box-shadow:var(--overlay-shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    }

    @media (max-width:980px){
      .controls-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:640px){
      .controls{
        top:calc(env(safe-area-inset-top, 0px) + 8px);
        width:calc(100vw - 16px);
        padding:8px;
        border-radius:16px;
      }

      .controls-grid{
        grid-template-columns:1fr;
        gap:8px;
      }

      .legend{
        right:8px;
        bottom:calc(env(safe-area-inset-bottom, 0px) + 8px);
        width:min(190px, calc(100vw - 16px));
      }

      .mini-meta{
        left:8px;
        bottom:calc(env(safe-area-inset-bottom, 0px) + 8px);
        max-width:calc(100vw - 214px);
        gap:6px;
      }

      .mini-chip{
        font-size:11px;
        padding:7px 10px;
      }
    }
  </style>
</head>

<body>
  <fv-shell data-boot-hold-ms="3000">
    <div class="dev-shell">
      <div class="map-stage">
        <div id="rainMap" aria-label="Rain map"></div>

        <div class="overlay controls" aria-label="Rain map controls">
          <div class="controls-grid">
            <div class="field">
              <label for="rainRangeSel">Rain range</label>
              <select id="rainRangeSel" class="select">
                <option value="24h">Last 24 hours</option>
                <option value="48h" selected>Last 48 hours</option>
                <option value="7d">Last 7 days</option>
                <option value="30d">Last 30 days</option>
              </select>
            </div>

            <div class="field">
              <label for="radiusSel">Circle radius</label>
              <select id="radiusSel" class="select">
                <option value="350">Small</option>
                <option value="550" selected>Medium</option>
                <option value="800">Large</option>
              </select>
            </div>

            <div class="field">
              <label for="btnRefresh">Refresh</label>
              <button id="btnRefresh" class="btn" type="button">Reload Map</button>
            </div>

            <div class="field">
              <label>Status</label>
              <div id="statusBox" class="status-pill">Loading map…</div>
            </div>
          </div>
        </div>

        <div class="mini-meta">
          <div class="mini-chip">Basemap: <span class="mono">HYBRID</span></div>
          <div class="mini-chip" id="fieldsMeta">Fields: <span class="mono">0</span></div>
          <div class="mini-chip" id="pointCountMeta">Points: <span class="mono">0</span></div>
        </div>

        <div class="overlay legend" aria-label="Rainfall legend">
          <div class="legend-title">Rainfall scale</div>
          <div class="legend-sub">Live MRMS point totals by selected range.</div>
          <div class="legend-row"><span class="swatch" style="background:#ffd400;"></span><span>&lt; 0.50 in</span></div>
          <div class="legend-row"><span class="swatch" style="background:#6bd46b;"></span><span>0.50–0.99 in</span></div>
          <div class="legend-row"><span class="swatch" style="background:#2fa62f;"></span><span>1.00–1.99 in</span></div>
          <div class="legend-row"><span class="swatch" style="background:#3388ff;"></span><span>2.00–2.99 in</span></div>
          <div class="legend-row"><span class="swatch" style="background:#ff3333;"></span><span>3.00–3.99 in</span></div>
          <div class="legend-row"><span class="swatch" style="background:#7a00cc;"></span><span>4.00+ in</span></div>
        </div>
      </div>
    </div>
  </fv-shell>

  <script type="module">
    import { getAPI } from '/Farm-vista/js/field-readiness/firebase.js';
    import { loadFieldMrmsDoc } from '/Farm-vista/js/field-readiness/data.js';
    import { mrmsRainInRange } from '/Farm-vista/js/field-readiness/rain.js';

    'use strict';

    const state = {
      fields: [],
      _mrmsDocByFieldId: Object.create(null)
    };

    let map = null;
    let infoWindow = null;
    let circles = [];
    let clickMarkers = [];
    let currentRequestId = 0;

    function $(id){ return document.getElementById(id); }

    function setStatus(msg, isError){
      const box = $('statusBox');
      if (!box) return;
      box.textContent = String(msg || '');
      box.classList.toggle('error', !!isError);
    }

    function setFieldsMeta(n){
      const el = $('fieldsMeta');
      if (el) el.innerHTML = 'Fields: <span class="mono">' + String(Number(n || 0)) + '</span>';
    }

    function setPointMeta(n){
      const el = $('pointCountMeta');
      if (el) el.innerHTML = 'Points: <span class="mono">' + String(Number(n || 0)) + '</span>';
    }

    function rainColor(v){
      const n = Number(v) || 0;
      if (n < 0.5) return '#ffd400';
      if (n < 1.0) return '#6bd46b';
      if (n < 2.0) return '#2fa62f';
      if (n < 3.0) return '#3388ff';
      if (n < 4.0) return '#ff3333';
      return '#7a00cc';
    }

    function clearRainLayers(){
      circles.forEach(x => { try{ x.setMap(null); }catch(_){} });
      clickMarkers.forEach(x => { try{ x.setMap(null); }catch(_){} });
      circles = [];
      clickMarkers = [];
      setPointMeta(0);
    }

    function ensureMap(){
      if (map) return map;
      if (!(window.google && window.google.maps)){
        throw new Error('Google Maps is not loaded.');
      }

      map = new google.maps.Map($('rainMap'), {
        center: { lat:39.800, lng:-91.150 },
        zoom: 9,
        mapTypeId: google.maps.MapTypeId.HYBRID,
        streetViewControl: false,
        fullscreenControl: false,
        mapTypeControl: true,
        clickableIcons: false
      });

      infoWindow = new google.maps.InfoWindow();
      return map;
    }

    function escapeHtml(s){
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function lower(s){
      return String(s || '').trim().toLowerCase();
    }

    function rangeHours(range){
      if (range === '24h') return 24;
      if (range === '48h') return 48;
      if (range === '7d')  return 24 * 7;
      return 24 * 30;
    }

    function rangeDays(range){
      if (range === '24h') return 1;
      if (range === '48h') return 2;
      if (range === '7d')  return 7;
      return 30;
    }

    function milesToLat(miles){
      return miles / 69.0;
    }

    function milesToLng(miles, lat){
      const denom = Math.max(0.01, 69.172 * Math.cos((Number(lat || 0) * Math.PI) / 180));
      return miles / denom;
    }

    function coordsForLabel(field, label, miles=0.50){
      const baseLat = toNum(field && field.location && field.location.lat);
      const baseLng = toNum(field && field.location && field.location.lng);
      if (baseLat == null || baseLng == null) return null;

      const dLat = milesToLat(miles);
      const dLng = milesToLng(miles, baseLat);
      const norm = lower(label);

      if (!norm || norm === 'center' || norm === 'centre'){
        return { lat: baseLat, lng: baseLng };
      }
      if (norm === 'north' || norm === 'n'){
        return { lat: baseLat + dLat, lng: baseLng };
      }
      if (norm === 'south' || norm === 's'){
        return { lat: baseLat - dLat, lng: baseLng };
      }
      if (norm === 'east' || norm === 'e'){
        return { lat: baseLat, lng: baseLng + dLng };
      }
      if (norm === 'west' || norm === 'w'){
        return { lat: baseLat, lng: baseLng - dLng };
      }
      if (norm === 'northeast' || norm === 'ne'){
        return { lat: baseLat + (dLat * 0.72), lng: baseLng + (dLng * 0.72) };
      }
      if (norm === 'northwest' || norm === 'nw'){
        return { lat: baseLat + (dLat * 0.72), lng: baseLng - (dLng * 0.72) };
      }
      if (norm === 'southeast' || norm === 'se'){
        return { lat: baseLat - (dLat * 0.72), lng: baseLng + (dLng * 0.72) };
      }
      if (norm === 'southwest' || norm === 'sw'){
        return { lat: baseLat - (dLat * 0.72), lng: baseLng - (dLng * 0.72) };
      }
      return { lat: baseLat, lng: baseLng };
    }

    function valueToInches(raw, unitsHint){
      const n = toNum(raw);
      if (n == null) return null;
      const u = lower(unitsHint);
      if (u === 'mm' || u === 'millimeters' || u === 'millimetres'){
        return n / 25.4;
      }
      return n;
    }

    function pickDirectRangeValue(obj, range){
      if (!obj || typeof obj !== 'object') return null;

      const lookup = {
        '24h': ['24h','last24h','last24','in24h','rain24h','rain24hIn','rain24In','total24h','total24In','last24hIn','last24In'],
        '48h': ['48h','last48h','last48','in48h','rain48h','rain48hIn','rain48In','total48h','total48In','last48hIn','last48In'],
        '7d':  ['7d','last7d','last7','in7d','rain7d','rain7dIn','rain7In','total7d','total7In','last7dIn','last7In'],
        '30d': ['30d','last30d','last30','in30d','rain30d','rain30dIn','rain30In','total30d','total30In','last30dIn','last30In']
      };

      const keys = lookup[range] || [];
      for (const k of keys){
        if (obj[k] != null) return valueToInches(obj[k], obj.units || obj.unit);
      }

      const pools = [obj.rangeTotals, obj.totals, obj.totalsIn, obj.summary, obj.accumulations];
      for (const pool of pools){
        if (!pool || typeof pool !== 'object') continue;
        for (const k of keys){
          if (pool[k] != null) return valueToInches(pool[k], pool.units || obj.units || obj.unit);
        }
      }

      return null;
    }

    function sumLatestHourlyRows(rows, range){
      const hours = rangeHours(range);
      if (!Array.isArray(rows) || !rows.length) return null;

      const usable = rows
        .map(r => ({
          ts: Date.parse(r && (r.ts || r.time || r.hour || r.iso || r.date || r.datetime || '')),
          inches:
            valueToInches(r && (r.rainInches ?? r.inches ?? r.rain_in ?? r.totalIn ?? r.rain ?? r.value ?? r.mm), r && (r.units || r.unit || ((r && r.mm != null) ? 'mm' : 'in')))
        }))
        .filter(x => Number.isFinite(x.ts) && x.inches != null)
        .sort((a,b) => a.ts - b.ts);

      if (!usable.length) return null;
      const slice = usable.slice(-hours);
      return slice.reduce((sum, x) => sum + Number(x.inches || 0), 0);
    }

    function sumLatestDailyRows(rows, range){
      const days = rangeDays(range);
      if (!Array.isArray(rows) || !rows.length) return null;

      const usable = rows
        .map(r => ({
          ts: Date.parse(r && (r.date || r.day || r.ts || r.time || '')),
          inches:
            valueToInches(r && (r.rainInches ?? r.inches ?? r.rain_in ?? r.totalIn ?? r.rain ?? r.value ?? r.mm), r && (r.units || r.unit || ((r && r.mm != null) ? 'mm' : 'in')))
        }))
        .filter(x => Number.isFinite(x.ts) && x.inches != null)
        .sort((a,b) => a.ts - b.ts);

      if (!usable.length) return null;
      const slice = usable.slice(-days);
      return slice.reduce((sum, x) => sum + Number(x.inches || 0), 0);
    }

    function resolvePointLatLng(field, point){
      const lat =
        toNum(point && point.lat) ??
        toNum(point && point.latitude) ??
        toNum(point && point.location && point.location.lat) ??
        toNum(point && point.location && point.location.latitude);

      const lng =
        toNum(point && point.lng) ??
        toNum(point && point.lon) ??
        toNum(point && point.longitude) ??
        toNum(point && point.location && (point.location.lng ?? point.location.lon ?? point.location.longitude));

      if (lat != null && lng != null) return { lat, lng };

      const label = point && (point.label || point.name || point.point || point.sample || point.key);
      return coordsForLabel(field, label, 0.50);
    }

    function pointLabel(point, fallbackKey=''){
      return String(
        (point && (point.label || point.name || point.point || point.sample || point.key)) ||
        fallbackKey ||
        'Center'
      ).trim();
    }

    function pushPoint(out, seen, field, label, lat, lng, rainInches, source){
      if (lat == null || lng == null || rainInches == null) return;
      const key = String(field.id) + '|' + lower(label);
      if (seen.has(key)) return;

      seen.add(key);
      out.push({
        fieldId: field.id,
        fieldName: field.name || 'Field',
        pointLabel: label || 'Center',
        lat: Number(lat),
        lng: Number(lng),
        rainInches: Number(rainInches),
        source: String(source || 'MRMS')
      });
    }

    function extractArrayPoints(container, field, range, out, seen){
      if (!Array.isArray(container)) return;

      container.forEach((point, idx)=>{
        if (!point || typeof point !== 'object') return;

        const label = pointLabel(point, idx === 0 ? 'Center' : ('Point ' + (idx + 1)));
        const pos = resolvePointLatLng(field, point);
        let inches =
          pickDirectRangeValue(point, range) ??
          sumLatestHourlyRows(point.hourly || point.hours || point.hourlyRows, range) ??
          sumLatestDailyRows(point.daily || point.days || point.dailyRows, range);

        if (inches == null && point.inches != null) inches = valueToInches(point.inches, point.units || point.unit);
        if (inches == null && point.rainInches != null) inches = valueToInches(point.rainInches, point.units || point.unit);
        if (inches == null && point.mm != null) inches = valueToInches(point.mm, 'mm');

        if (pos && inches != null){
          pushPoint(out, seen, field, label, pos.lat, pos.lng, inches, 'MRMS point');
        }
      });
    }

    function extractObjectMapPoints(container, field, range, out, seen){
      if (!container || typeof container !== 'object' || Array.isArray(container)) return;

      Object.entries(container).forEach(([key, raw])=>{
        if (!raw || typeof raw !== 'object') return;
        const label = pointLabel(raw, key);
        const pos = resolvePointLatLng(field, raw);
        let inches =
          pickDirectRangeValue(raw, range) ??
          sumLatestHourlyRows(raw.hourly || raw.hours || raw.hourlyRows, range) ??
          sumLatestDailyRows(raw.daily || raw.days || raw.dailyRows, range);

        if (inches == null && raw.inches != null) inches = valueToInches(raw.inches, raw.units || raw.unit);
        if (inches == null && raw.rainInches != null) inches = valueToInches(raw.rainInches, raw.units || raw.unit);
        if (inches == null && raw.mm != null) inches = valueToInches(raw.mm, 'mm');

        if (pos && inches != null){
          pushPoint(out, seen, field, label, pos.lat, pos.lng, inches, 'MRMS point');
        }
      });
    }

    function extractRealPointsFromDoc(doc, field, range){
      const out = [];
      const seen = new Set();

      const candidateKeys = [
        'points',
        'samplePoints',
        'samples',
        'sample_points',
        'gridPoints',
        'pointTotals',
        'latestPoints',
        'rangePoints',
        'pointData',
        'sampleData'
      ];

      for (const key of candidateKeys){
        const v = doc && doc[key];
        extractArrayPoints(v, field, range, out, seen);
        extractObjectMapPoints(v, field, range, out, seen);
      }

      const nestedKeys = ['mrms', 'rain', 'rainfall', 'sampling', 'samplingPoints', 'detail'];
      for (const key of nestedKeys){
        const v = doc && doc[key];
        if (!v || typeof v !== 'object') continue;
        for (const inner of candidateKeys){
          extractArrayPoints(v[inner], field, range, out, seen);
          extractObjectMapPoints(v[inner], field, range, out, seen);
        }
      }

      return out;
    }

    function fallbackWeightedCenterPoint(doc, field, range){
      try{
        const res = mrmsRainInRange(doc, range);
        if (!res || res.ready !== true) return null;
        const pos = coordsForLabel(field, 'center', 0);
        if (!pos) return null;
        const inches = toNum(res.inches);
        if (inches == null) return null;

        return [{
          fieldId: field.id,
          fieldName: field.name || 'Field',
          pointLabel: 'Center',
          lat: pos.lat,
          lng: pos.lng,
          rainInches: inches,
          source: 'Weighted center fallback'
        }];
      }catch(_){
        return null;
      }
    }

    function drawPoints(points){
      clearRainLayers();

      const gmap = ensureMap();
      const bounds = new google.maps.LatLngBounds();
      const radius = Number($('radiusSel')?.value || 550);

      points.forEach((p)=>{
        const lat = toNum(p.lat);
        const lng = toNum(p.lng);
        const rain = toNum(p.rainInches);
        if (lat == null || lng == null || rain == null) return;

        const pos = { lat, lng };
        const color = rainColor(rain);

        const circle = new google.maps.Circle({
          map: gmap,
          center: pos,
          radius: radius,
          strokeColor: color,
          strokeOpacity: 0.95,
          strokeWeight: 1,
          fillColor: color,
          fillOpacity: 0.42
        });
        circles.push(circle);

        const marker = new google.maps.Marker({
          position: pos,
          map: gmap,
          opacity: 0.01
        });

        marker.addListener('click', ()=>{
          infoWindow.setContent(
            '<div style="min-width:190px">' +
              '<b>' + escapeHtml(p.fieldName || 'Field') + '</b><br/>' +
              'Point: ' + escapeHtml(p.pointLabel || 'Center') + '<br/>' +
              'Rain: <span class="mono">' + Number(rain).toFixed(2) + ' in</span><br/>' +
              'Source: ' + escapeHtml(p.source || 'MRMS') +
            '</div>'
          );
          infoWindow.open(gmap, marker);
        });

        clickMarkers.push(marker);
        bounds.extend(pos);
      });

      if (!bounds.isEmpty()){
        gmap.fitBounds(bounds);
      }

      setPointMeta(circles.length);
    }

    async function waitForFieldApi(timeoutMs=15000){
      const started = Date.now();
      while (Date.now() - started < timeoutMs){
        try{
          const api = getAPI(state);
          if (api) return api;
        }catch(_){}
        await new Promise(r => setTimeout(r, 120));
      }
      throw new Error('Firebase API did not become ready.');
    }

    async function loadActiveFields(api){
      const out = [];

      if (api.kind === 'compat' && window.firebase && window.firebase.firestore){
        const db = window.firebase.firestore();
        const snap = await db.collection('fields').get();

        snap.forEach(doc=>{
          const d = doc.data() || {};
          const lat = toNum(d && d.location && d.location.lat);
          const lng = toNum(d && d.location && d.location.lng);
          if (lat == null || lng == null) return;

          const archived = !!(d.archived === true || d.isArchived === true || d.inactive === true);
          const status = lower(d.status);
          if (archived) return;
          if (status && (status === 'archived' || status === 'inactive')) return;

          out.push({
            id: doc.id,
            name: String(d.name || d.fieldName || 'Field'),
            farmId: String(d.farmId || ''),
            location: { lat, lng }
          });
        });

        return out;
      }

      if (api.kind !== 'compat'){
        const db = api.getFirestore();
        const col = api.collection(db, 'fields');
        const snap = await api.getDocs(col);

        snap.forEach(doc=>{
          const d = doc.data() || {};
          const lat = toNum(d && d.location && d.location.lat);
          const lng = toNum(d && d.location && d.location.lng);
          if (lat == null || lng == null) return;

          const archived = !!(d.archived === true || d.isArchived === true || d.inactive === true);
          const status = lower(d.status);
          if (archived) return;
          if (status && (status === 'archived' || status === 'inactive')) return;

          out.push({
            id: doc.id,
            name: String(d.name || d.fieldName || 'Field'),
            farmId: String(d.farmId || ''),
            location: { lat, lng }
          });
        });

        return out;
      }

      return out;
    }

    async function loadLivePoints(range, requestId){
      const api = await waitForFieldApi();
      const fields = await loadActiveFields(api);

      if (requestId !== currentRequestId) return { cancelled:true };

      state.fields = fields;
      setFieldsMeta(fields.length);

      const points = [];
      let fallbackCount = 0;

      const jobs = fields.map(async (field)=>{
        try{
          const doc = await loadFieldMrmsDoc(state, String(field.id), { force:false });
          if (!doc || typeof doc !== 'object') return;

          const realPoints = extractRealPointsFromDoc(doc, field, range);
          if (realPoints.length){
            points.push(...realPoints);
            return;
          }

          const fallback = fallbackWeightedCenterPoint(doc, field, range);
          if (fallback && fallback.length){
            fallbackCount += 1;
            points.push(...fallback);
          }
        }catch(err){
          console.warn('[Dev Rain Map] MRMS load failed for field:', field && field.id, err);
        }
      });

      await Promise.allSettled(jobs);

      return {
        points,
        fieldCount: fields.length,
        fallbackCount
      };
    }

    async function renderRain(){
      const reqId = ++currentRequestId;
      const range = String($('rainRangeSel')?.value || '48h');

      try{
        ensureMap();
      }catch(e){
        setStatus(e && e.message ? e.message : 'Map failed to load.', true);
        return;
      }

      setStatus('Loading live fields and MRMS points…', false);

      try{
        const res = await loadLivePoints(range, reqId);
        if (!res || res.cancelled || reqId !== currentRequestId) return;

        const pts = Array.isArray(res.points) ? res.points : [];
        drawPoints(pts);

        if (!pts.length){
          setStatus('No MRMS points were found for the selected range.', true);
          return;
        }

        if (Number(res.fallbackCount || 0) > 0){
          setStatus(
            'Loaded ' + pts.length + ' points across ' + res.fieldCount +
            ' fields. ' + res.fallbackCount + ' field(s) used weighted center fallback.',
            false
          );
        } else {
          setStatus(
            'Loaded ' + pts.length + ' live MRMS points across ' + res.fieldCount + ' fields.',
            false
          );
        }
      }catch(e){
        console.warn('[Dev Rain Map] render failed:', e);
        clearRainLayers();
        setStatus((e && e.message) ? e.message : 'Failed loading live MRMS points.', true);
      }
    }

    function wireControls(){
      const rangeSel = $('rainRangeSel');
      const radiusSel = $('radiusSel');
      const btnRefresh = $('btnRefresh');

      if (rangeSel) rangeSel.addEventListener('change', renderRain);
      if (radiusSel) radiusSel.addEventListener('change', ()=>{
        if (circles.length){
          renderRain();
        }
      });
      if (btnRefresh) btnRefresh.addEventListener('click', renderRain);
    }

    function startRainMap(){
      try{
        ensureMap();
        wireControls();
        renderRain();
      }catch(e){
        console.warn('[Dev Rain Map] startup failed:', e);
        setStatus((e && e.message) ? e.message : 'Failed starting map.', true);
      }
    }

    window.startRainMap = startRainMap;
  </script>

  <script>
    setTimeout(()=>{
      const box = document.getElementById('statusBox');
      if (box && box.textContent.trim() === 'Loading map…'){
        box.textContent = 'Waiting for Google Maps…';
      }
    }, 1200);
  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzKBEQ1-wCJ8_nv1dR3wQI0nTk1IrgWzY&callback=startRainMap"></script>
