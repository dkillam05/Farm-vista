<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FarmVista • Dev Rain Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B7E46"/>

  <link rel="manifest" href="/Farm-vista/manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="/Farm-vista/assets/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/Farm-vista/assets/icons/icon-192.png"/>

  <script src="/Farm-vista/js/theme-boot.js"></script>
  <link rel="stylesheet" href="/Farm-vista/assets/css/theme.css"/>
  <link rel="stylesheet" href="/Farm-vista/assets/css/app.css"/>

  <script src="/Farm-vista/js/firebase-config.js"></script>
  <script src="/Farm-vista/js/firebase-init.js"></script>

  <script>
    (function(){
      if(!customElements.get('fv-shell')){
        const s = document.createElement('script');
        s.src = '/Farm-vista/js/fv-shell.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>

  <style>
    :root{
      --glass: rgba(255,255,255,.84);
      --glass-border: rgba(255,255,255,.18);
      --glass-shadow: 0 14px 36px rgba(0,0,0,.18);
      --text-dark: #18211b;
      --blur: blur(14px);
      --menu-w: min(290px, calc(100vw - 18px));
    }

    html.dark{
      --glass: rgba(22,28,24,.80);
      --glass-border: rgba(255,255,255,.08);
      --glass-shadow: 0 16px 44px rgba(0,0,0,.38);
      --text-dark: #f3f7f2;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#253327;
    }

    body{
      color:var(--text-dark);
    }

    fv-shell{
      display:block;
      width:100%;
      height:100%;
    }

    .rain-page{
      position:fixed;
      left:0;
      right:0;
      top:calc(var(--hdr-h, 74px) + env(safe-area-inset-top, 0px));
      bottom:calc(var(--ftr-h, 42px));
      overflow:hidden;
      background:#233125;
    }

    .map-stage,
    #rainMap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    #rainMap{
      background:#dfe5dd;
    }

    .glass{
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
    }

    .top-tools{
      position:absolute;
      top:10px;
      right:10px;
      z-index:35;
      pointer-events:none;
    }

    .icon-btn{
      pointer-events:auto;
      width:48px;
      height:48px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      color:var(--text-dark);
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      padding:0;
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      display:block;
    }

    .icon-btn:active{
      transform:translateY(1px);
    }

    .panel-menu{
      position:absolute;
      top:58px;
      right:0;
      z-index:36;
      width:var(--menu-w);
      padding:12px;
      border-radius:18px;
      display:none;
    }

    .panel-menu.open{
      display:block;
    }

    .menu-field{
      margin-bottom:12px;
    }

    .menu-field:last-child{
      margin-bottom:0;
    }

    .menu-field label{
      display:block;
      margin:0 0 6px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text-dark);
      opacity:.84;
    }

    .menu-select{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:
        linear-gradient(45deg, transparent 50%, rgba(0,0,0,.42) 50%),
        linear-gradient(135deg, rgba(0,0,0,.42) 50%, transparent 50%),
        color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      background-position:
        calc(100% - 21px) calc(50% - 3px),
        calc(100% - 13px) calc(50% - 3px),
        0 0;
      background-size:8px 8px, 8px 8px, 100% 100%;
      background-repeat:no-repeat;
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px 38px 12px 12px;
      outline:none;
      box-sizing:border-box;
    }

    .menu-btn{
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      border:none;
      border-radius:14px;
      background:color-mix(in srgb, #2F6C3C 88%, #ffffff 12%);
      color:#fff;
      font:inherit;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(47,108,60,.28);
    }

    .menu-btn:active{
      transform:translateY(1px);
    }

    .menu-inline{
      display:grid;
      gap:8px;
      margin-top:2px;
    }

    .menu-pill{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:12px;
      padding:10px 12px;
      background:color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
      font-size:13px;
      font-weight:900;
      color:var(--text-dark);
    }

    .menu-pill .mutedish{
      opacity:.72;
      font-weight:800;
    }

    .menu-debug{
      font-size:11px;
      color:var(--text-dark);
      opacity:.78;
      line-height:1.2;
      margin-top:2px;
    }

    .left-legend{
      position:absolute;
      left:8px;
      top:50%;
      transform:translateY(-50%);
      z-index:20;
      width:34px;
      pointer-events:none;
    }

    .legend-wrap{
      position:relative;
      width:100%;
      height:min(44vh, 360px);
      min-height:220px;
      border-radius:14px;
      overflow:visible;
    }

    .legend-bar{
      position:absolute;
      left:0;
      top:0;
      width:12px;
      height:100%;
      border-radius:999px;
      background:
        linear-gradient(
          to top,
          #58a8ff 0%,
          #6cc7ff 12%,
          #55d79a 24%,
          #46d14d 38%,
          #d7df49 54%,
          #f0b843 72%,
          #ef6b46 88%,
          #d92cc6 100%
        );
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }

    .legend-label{
      position:absolute;
      left:18px;
      transform:translateY(50%);
      font-size:10px;
      font-weight:900;
      color:#fff;
      line-height:1;
      text-shadow:0 1px 4px rgba(0,0,0,.55);
      white-space:nowrap;
    }

    .legend-label.l1{ bottom:100%; transform:translateY(0); }
    .legend-label.l2{ bottom:83%; }
    .legend-label.l3{ bottom:68%; }
    .legend-label.l4{ bottom:50%; }
    .legend-label.l5{ bottom:34%; }
    .legend-label.l6{ bottom:18%; }
    .legend-label.l7{ bottom:0; transform:translateY(0); }

    .popup-card{
      max-width:220px;
      font-size:13px;
      line-height:1.25;
      color:#18211b;
    }

    .popup-card .name{
      font-weight:900;
      margin:0 0 4px;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-weight:800;
    }

    @media (max-width:680px){
      .icon-btn{
        width:44px;
        height:44px;
      }

      .panel-menu{
        top:52px;
        width:min(270px, calc(100vw - 16px));
      }

      .left-legend{
        left:4px;
        width:30px;
      }

      .legend-wrap{
        height:min(38vh, 280px);
        min-height:180px;
      }

      .legend-bar{
        width:10px;
      }

      .legend-label{
        left:15px;
        font-size:9px;
      }
    }
  </style>
</head>

<body>
  <fv-shell data-boot-hold-ms="3000">
    <div class="rain-page">
      <div class="map-stage">
        <div id="rainMap" aria-label="Rain map"></div>

        <div class="left-legend" aria-label="Rainfall legend">
          <div class="legend-wrap">
            <div class="legend-bar"></div>
            <span class="legend-label l1" id="legendTop">Max</span>
            <span class="legend-label l2" id="legendQ5"></span>
            <span class="legend-label l3" id="legendQ4"></span>
            <span class="legend-label l4" id="legendMid"></span>
            <span class="legend-label l5" id="legendQ2"></span>
            <span class="legend-label l6" id="legendQ1"></span>
            <span class="legend-label l7" id="legendBottom">Min</span>
          </div>
        </div>

        <div class="top-tools">
          <button id="btnMenu" class="icon-btn" type="button" aria-label="Map options">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7H20M4 12H20M4 17H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
          </button>

          <div id="menuPanel" class="glass panel-menu" aria-label="Map controls">
            <div class="menu-field">
              <label for="viewSel">Map style</label>
              <select id="viewSel" class="menu-select">
                <option value="hybrid" selected>Satellite Hybrid</option>
                <option value="roadmap">Road Map</option>
                <option value="terrain">Terrain</option>
              </select>
            </div>

            <div class="menu-field">
              <label for="radiusSel">Blend radius</label>
              <select id="radiusSel" class="menu-select">
                <option value="700">Medium</option>
                <option value="950" selected>Blended</option>
                <option value="1250">Broad</option>
                <option value="1600">Extra Broad</option>
              </select>
            </div>

            <div class="menu-field">
              <label for="rangeSel">Time frame</label>
              <select id="rangeSel" class="menu-select">
                <option value="24h">Past 24 Hours</option>
                <option value="48h" selected>Past 48 Hours</option>
                <option value="72h">Past 72 Hours</option>
                <option value="7d">Past 7 Days</option>
                <option value="mtd">Month To Date</option>
              </select>
            </div>

            <div class="menu-field">
              <label>Refresh</label>
              <button id="btnRefresh" class="menu-btn" type="button">Reload Rainfall</button>
            </div>

            <div class="menu-field">
              <label>Map status</label>
              <div class="menu-inline">
                <div class="menu-pill">
                  <span class="mutedish">Status</span>
                  <span id="statusText">Loading…</span>
                </div>
                <div class="menu-pill">
                  <span class="mutedish">Fields / Points</span>
                  <span><span id="fieldsText" class="mono">0</span> / <span id="pointsText" class="mono">0</span></span>
                </div>
                <div id="debugText" class="menu-debug">waiting…</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </fv-shell>

  <script type="module">
    import {
      initializeApp, getApps, getApp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

    import {
      getAuth, onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    import {
      getFirestore, collection, getDocs, doc, getDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    'use strict';

    const FIELDS_COLLECTION = 'fields';
    const MRMS_COLLECTION = 'field_mrms_weather';
    const FETCH_CONCURRENCY = 6;
    const PARENT_TTL_MS = 2 * 60 * 1000;
    const RANGE_CACHE = new Map();

    let map = null;
    let infoWindow = null;
    let currentRange = '48h';
    let currentRequestId = 0;
    let dbRef = null;
    let authRef = null;

    const parentDocCache = new Map();

    let rainCircles = [];
    let lastFieldSummaries = [];
    let lastFieldDocs = [];
    let mapTapMarker = null;

    function $(id){ return document.getElementById(id); }

    function setStatus(msg){
      const el = $('statusText');
      if (el) el.textContent = String(msg || '');
    }

    function setFieldsMeta(n){
      const el = $('fieldsText');
      if (el) el.textContent = String(Number(n || 0));
    }

    function setPointMeta(n){
      const el = $('pointsText');
      if (el) el.textContent = String(Number(n || 0));
    }

    function setDebug(msg){
      const el = $('debugText');
      if (el) el.textContent = String(msg || '');
    }

    function lower(s){
      return String(s || '').trim().toLowerCase();
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function escapeHtml(s){
      return String(s || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function retry(fn, tries=3, waitMs=250){
      return (async ()=>{
        let lastErr = null;
        for (let i = 0; i < tries; i++){
          try{
            return await fn();
          }catch(err){
            lastErr = err;
            if (i < tries - 1) await sleep(waitMs * (i + 1));
          }
        }
        throw lastErr;
      })();
    }

    async function runPool(items, limitCount, worker){
      const out = new Array(items.length);
      let idx = 0;

      async function next(){
        while (idx < items.length){
          const my = idx++;
          out[my] = await worker(items[my], my);
        }
      }

      const runners = [];
      for (let i = 0; i < Math.min(limitCount, items.length); i++){
        runners.push(next());
      }
      await Promise.all(runners);
      return out;
    }

    function detectLayoutMode(){
      const ua = navigator.userAgent || '';
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      const isMobile = /iPhone|Android|Mobile|iPad|iPod/i.test(ua);

      document.body.classList.remove('desktop-view', 'mobile-browser', 'pwa-standalone');

      if (isStandalone){
        document.body.classList.add('pwa-standalone');
      } else if (isMobile){
        document.body.classList.add('mobile-browser');
      } else {
        document.body.classList.add('desktop-view');
      }
    }

    function waitForGoogleMaps(timeoutMs=20000){
      const started = Date.now();
      return new Promise((resolve, reject)=>{
        const tick = ()=>{
          if (window.google && window.google.maps){
            resolve(window.google.maps);
            return;
          }
          if (Date.now() - started > timeoutMs){
            reject(new Error('Google Maps is still loading.'));
            return;
          }
          setTimeout(tick, 80);
        };
        tick();
      });
    }

    function firebaseConfig(){
      const cfg = window.FV_FIREBASE_CONFIG || null;
      if (!cfg || typeof cfg !== 'object') throw new Error('Firebase config missing.');
      return cfg;
    }

    async function initFirebase(){
      const cfg = firebaseConfig();
      const app = getApps().length ? getApp() : initializeApp(cfg);
      authRef = getAuth(app);
      dbRef = getFirestore(app);

      await new Promise(resolve=>{
        let done = false;
        const off = onAuthStateChanged(authRef, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, ()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        });
        setTimeout(()=>{
          if (done) return;
          done = true;
          try{ off(); }catch(_){}
          resolve();
        }, 2500);
      });

      return { app, auth: authRef, db: dbRef };
    }

    function ensureMap(){
      if (map) return map;
      if (!(window.google && window.google.maps)) throw new Error('Google Maps not loaded.');

      map = new google.maps.Map($('rainMap'), {
        center: { lat:39.80, lng:-89.85 },
        zoom: 11,
        mapTypeId: google.maps.MapTypeId.HYBRID,
        streetViewControl: false,
        fullscreenControl: false,
        mapTypeControl: false,
        clickableIcons: false,
        gestureHandling: 'greedy',
        zoomControl: false
      });

      infoWindow = new google.maps.InfoWindow();

      map.addListener('click', (ev)=>{
        handleMapTap(ev);
      });

      return map;
    }

    function updateMapStyle(){
      if (!map) return;
      const v = String($('viewSel')?.value || 'hybrid').toLowerCase();
      if (v === 'terrain') map.setMapTypeId(google.maps.MapTypeId.TERRAIN);
      else if (v === 'roadmap') map.setMapTypeId(google.maps.MapTypeId.ROADMAP);
      else map.setMapTypeId(google.maps.MapTypeId.HYBRID);
    }

    function rangeTitle(range){
      if (range === '24h') return 'Rain — Past 24 Hours';
      if (range === '48h') return 'Rain — Past 48 Hours';
      if (range === '72h') return 'Rain — Past 72 Hours';
      if (range === '7d') return 'Rain — Past 7 Days';
      return 'Rain — Month To Date';
    }

    function normalizeFieldDoc(docId, d){
      const lat = toNum(d && d.location && d.location.lat);
      const lng = toNum(d && d.location && d.location.lng);
      if (lat == null || lng == null) return null;

      const archived = !!(d && (d.archived === true || d.isArchived === true || d.inactive === true));
      const status = lower(d && d.status);
      if (archived) return null;
      if (status && status !== 'active') return null;

      return {
        id: String(docId || ''),
        name: String((d && (d.name || d.fieldName)) || 'Field'),
        location: { lat, lng }
      };
    }

    async function loadActiveFields(){
      if (!dbRef) await initFirebase();

      const snap = await retry(() => getDocs(collection(dbRef, FIELDS_COLLECTION)), 3, 250);
      const out = [];

      snap.forEach(docSnap=>{
        const d = docSnap.data() || {};
        const f = normalizeFieldDoc(docSnap.id, d);
        if (f) out.push(f);
      });

      out.sort((a,b)=> String(a.name).localeCompare(String(b.name), undefined, { numeric:true, sensitivity:'base' }));
      return out;
    }

    async function loadParentMrmsDoc(fieldId, force=false){
      const fid = String(fieldId || '');
      if (!fid) return null;

      const cached = parentDocCache.get(fid);
      if (!force && cached && (Date.now() - cached.loadedAt) < PARENT_TTL_MS){
        return cached.data;
      }

      const ref = doc(dbRef, MRMS_COLLECTION, fid);
      const snap = await retry(() => getDoc(ref), 3, 250);
      const data = snap.exists() ? (snap.data() || {}) : null;

      parentDocCache.set(fid, {
        loadedAt: Date.now(),
        data
      });

      return data;
    }

    function sumHourlyLast24(parentDoc){
      const rows = Array.isArray(parentDoc && parentDoc.mrmsHourlyLast24) ? parentDoc.mrmsHourlyLast24 : [];
      return rows.reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
    }

    function sumDailySeries(parentDoc, range){
      const rows = Array.isArray(parentDoc && parentDoc.mrmsDailySeries30d) ? parentDoc.mrmsDailySeries30d.slice() : [];
      if (!rows.length) return 0;

      if (range === '48h'){
        return rows.slice(-2).reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }
      if (range === '72h'){
        return rows.slice(-3).reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }
      if (range === '7d'){
        return rows.slice(-7).reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
      }
      return rows.reduce((sum, row)=> sum + (toNum(row && row.rainMm) || 0), 0);
    }

    function totalRainMmForRange(parentDoc, range){
      if (!parentDoc || typeof parentDoc !== 'object') return 0;
      if (range === '24h') return sumHourlyLast24(parentDoc);
      return sumDailySeries(parentDoc, range);
    }

    function buildSampleGeometry(field, parentDoc){
      const samples = Array.isArray(parentDoc && parentDoc.mrmsHourlyLatest && parentDoc.mrmsHourlyLatest.samples)
        ? parentDoc.mrmsHourlyLatest.samples
        : [];

      const out = [];
      samples.forEach(sample=>{
        const lat = toNum(sample && sample.lat);
        const lng = toNum(sample && sample.lon);
        if (lat == null || lng == null) return;
        out.push({
          key: String((sample && sample.key) || 'center'),
          lat,
          lng
        });
      });

      if (out.length) return out;

      return [{
        key: 'center',
        lat: field.location.lat,
        lng: field.location.lng
      }];
    }

    function pointLabelFromKey(key){
      const k = lower(key);
      if (!k) return 'Center';
      if (k === 'center') return 'Center';
      if (k === 'north') return 'North';
      if (k === 'south') return 'South';
      if (k === 'east') return 'East';
      if (k === 'west') return 'West';
      if (k === 'northeast') return 'Northeast';
      if (k === 'northwest') return 'Northwest';
      if (k === 'southeast') return 'Southeast';
      if (k === 'southwest') return 'Southwest';
      return String(key || 'Point');
    }

    function buildFieldPoints(field, parentDoc, range){
      const totalMm = totalRainMmForRange(parentDoc, range);
      const totalInches = totalMm / 25.4;
      const geom = buildSampleGeometry(field, parentDoc);

      return geom.map(g => ({
        fieldId: field.id,
        fieldName: field.name || 'Field',
        pointLabel: pointLabelFromKey(g.key),
        lat: g.lat,
        lng: g.lng,
        rainInches: totalInches
      }));
    }

    function buildFieldSummary(field, parentDoc, range){
      const totalMm = totalRainMmForRange(parentDoc, range);
      return {
        fieldId: field.id,
        fieldName: field.name || 'Field',
        lat: field.location.lat,
        lng: field.location.lng,
        rainInches: totalMm / 25.4
      };
    }

    function blendRadiusMeters(){
      const n = Number($('radiusSel')?.value || 950);
      return Number.isFinite(n) ? n : 950;
    }

    function clearMapOverlays(){
      rainCircles.forEach(x => { try{ x.setMap(null); }catch(_){} });
      clickMarkers.forEach(x => { try{ x.setMap(null); }catch(_){} });
      rainCircles = [];
      clickMarkers = [];
    }

    function quantizeValue(v, min, max){
      const denom = Math.max(0.0001, max - min);
      return Math.max(0, Math.min(1, (v - min) / denom));
    }

    function lerp(a,b,t){
      return a + ((b - a) * t);
    }

    function colorFromNormalized(t){
      const stops = [
        { t:0.00, c:[88,168,255] },
        { t:0.16, c:[108,199,255] },
        { t:0.34, c:[99,223,137] },
        { t:0.52, c:[73,201,74] },
        { t:0.70, c:[215,223,73] },
        { t:0.84, c:[240,184,67] },
        { t:0.94, c:[239,107,70] },
        { t:1.00, c:[217,44,198] }
      ];

      for (let i = 1; i < stops.length; i++){
        if (t <= stops[i].t){
          const a = stops[i - 1];
          const b = stops[i];
          const u = (t - a.t) / Math.max(0.0001, (b.t - a.t));
          const r = Math.round(lerp(a.c[0], b.c[0], u));
          const g = Math.round(lerp(a.c[1], b.c[1], u));
          const bl = Math.round(lerp(a.c[2], b.c[2], u));
          return `rgb(${r}, ${g}, ${bl})`;
        }
      }
      return 'rgb(217, 44, 198)';
    }

    function updateLegendDynamic(min, max){
      const fmt = (n)=>{
        const v = Number(n || 0);
        if (v >= 10) return v.toFixed(0) + '"+';
        if (v >= 1) return v.toFixed(1) + '"';
        return '.' + String(Math.round(v * 10));
      };

      const top = max;
      const q5 = min + ((max - min) * 0.83);
      const q4 = min + ((max - min) * 0.68);
      const mid = min + ((max - min) * 0.50);
      const q2 = min + ((max - min) * 0.34);
      const q1 = min + ((max - min) * 0.18);
      const bot = min;

      $('legendTop').textContent = fmt(top);
      $('legendQ5').textContent = fmt(q5);
      $('legendQ4').textContent = fmt(q4);
      $('legendMid').textContent = fmt(mid);
      $('legendQ2').textContent = fmt(q2);
      $('legendQ1').textContent = fmt(q1);
      $('legendBottom').textContent = fmt(bot);
    }

    function computeFieldBounds(fields){
      const bounds = new google.maps.LatLngBounds();
      fields.forEach(f=>{
        const lat = toNum(f && f.location && f.location.lat);
        const lng = toNum(f && f.location && f.location.lng);
        if (lat == null || lng == null) return;
        bounds.extend({ lat, lng });
      });
      return bounds;
    }

    function fitToFields(fields){
      if (!map || !fields || !fields.length) return;

      const bounds = computeFieldBounds(fields);
      if (bounds.isEmpty()) return;

      map.fitBounds(bounds, 0);

      google.maps.event.addListenerOnce(map, 'idle', ()=>{
        const z = map.getZoom();
        if (Number.isFinite(z) && z < 10) map.setZoom(10);
        if (Number.isFinite(z) && z > 13) map.setZoom(13);
      });
    }

    function drawRadarLikeBlobs(points, fields){
      ensureMap();
      clearMapOverlays();

      const values = points.map(p => Number(p.rainInches || 0)).filter(v => Number.isFinite(v));
      const min = values.length ? Math.min(...values) : 0;
      const max = values.length ? Math.max(...values) : 1;
      const radius = blendRadiusMeters();

      updateLegendDynamic(min, max);

      points.forEach(p=>{
        const lat = toNum(p.lat);
        const lng = toNum(p.lng);
        const rain = Number(p.rainInches || 0);
        if (lat == null || lng == null) return;

        const n = quantizeValue(rain, min, max);
        const color = colorFromNormalized(n);
        const center = { lat, lng };

        const layers = [
          { scale:2.15, opacity:0.035 + (n * 0.060) },
          { scale:1.68, opacity:0.055 + (n * 0.085) },
          { scale:1.26, opacity:0.080 + (n * 0.110) },
          { scale:0.92, opacity:0.110 + (n * 0.130) },
          { scale:0.64, opacity:0.130 + (n * 0.140) }
        ];

        layers.forEach(layer=>{
          const circle = new google.maps.Circle({
            map,
            center,
            radius: radius * layer.scale,
            strokeOpacity: 0,
            strokeWeight: 0,
            fillColor: color,
            fillOpacity: Math.min(0.30, layer.opacity)
          });
          rainCircles.push(circle);
        });

        const marker = new google.maps.Marker({
          position: center,
          map,
          opacity: 0.001
        });

        marker.addListener('click', ()=>{
          infoWindow.setContent(
            '<div class="popup-card">' +
              '<div class="name">' + escapeHtml(p.fieldName || 'Field') + '</div>' +
              '<div>Point: ' + escapeHtml(p.pointLabel || 'Center') + '</div>' +
              '<div>Rain: <span class="mono">' + rain.toFixed(2) + ' in</span></div>' +
            '</div>'
          );
          infoWindow.open(map, marker);
        });

        clickMarkers.push(marker);
      });

      setPointMeta(points.length);
      fitToFields(fields);
    }

    function nearestFieldSummary(lat, lng){
      if (!lastFieldSummaries.length) return null;

      let best = null;
      let bestDist = Infinity;

      lastFieldSummaries.forEach(item=>{
        const dLat = Number(item.lat) - lat;
        const dLng = Number(item.lng) - lng;
        const dist = (dLat * dLat) + (dLng * dLng);
        if (dist < bestDist){
          bestDist = dist;
          best = item;
        }
      });

      return best;
    }

    function handleMapTap(ev){
      if (!ev || !ev.latLng || !lastFieldSummaries.length) return;

      const lat = ev.latLng.lat();
      const lng = ev.latLng.lng();
      const nearest = nearestFieldSummary(lat, lng);
      if (!nearest || nearest.rainInches == null) return;

      if (!mapTapMarker){
        mapTapMarker = new google.maps.Marker({
          map,
          opacity: 0.001
        });
      }

      mapTapMarker.setPosition(ev.latLng);

      infoWindow.setContent(
        '<div class="popup-card">' +
          '<div class="name">' + escapeHtml(nearest.fieldName || 'Field') + '</div>' +
          '<div>' + escapeHtml(rangeTitle(currentRange)) + '</div>' +
          '<div>Rain: <span class="mono">' + Number(nearest.rainInches).toFixed(2) + ' in</span></div>' +
        '</div>'
      );
      infoWindow.open(map, mapTapMarker);
    }

    function cacheRangeResult(range, data){
      RANGE_CACHE.set(range, {
        ts: Date.now(),
        data
      });
    }

    function getCachedRangeResult(range){
      const hit = RANGE_CACHE.get(range);
      if (!hit) return null;
      if ((Date.now() - hit.ts) > (5 * 60 * 1000)) return null;
      return hit.data;
    }

    async function loadLivePoints(range, requestId, force=false){
      const fields = await loadActiveFields();
      if (requestId !== currentRequestId) return { cancelled:true };

      setFieldsMeta(fields.length);

      let docsAttempted = 0;
      let docsLoaded = 0;
      let docsWithSamples = 0;
      let docsWithRain = 0;

      const results = await runPool(fields, FETCH_CONCURRENCY, async (field)=>{
        docsAttempted++;
        try{
          const parentDoc = await loadParentMrmsDoc(field.id, force);
          if (!parentDoc) return null;

          docsLoaded++;

          const points = buildFieldPoints(field, parentDoc, range);
          const summary = buildFieldSummary(field, parentDoc, range);

          if (points.length) docsWithSamples++;
          if ((summary.rainInches || 0) > 0) docsWithRain++;

          return {
            field,
            parentDoc,
            points,
            summary
          };
        }catch(err){
          console.warn('[Dev Rain Map] parent MRMS load failed for field:', field && field.id, err);
          return null;
        }
      });

      const allPoints = [];
      const summaries = [];
      const loadedFields = [];

      results.forEach(row=>{
        if (!row) return;
        loadedFields.push(row.field);
        summaries.push(row.summary);
        allPoints.push(...row.points);
      });

      setDebug(
        'attempted ' + docsAttempted +
        ' • docs ' + docsLoaded +
        ' • sample sets ' + docsWithSamples +
        ' • fields w/rain ' + docsWithRain
      );

      return {
        points: allPoints,
        fields,
        summaries,
        loadedFields
      };
    }

    async function renderRain(force=false){
      const requestId = ++currentRequestId;
      currentRange = String($('rangeSel')?.value || currentRange || '48h');

      try{
        ensureMap();
        updateMapStyle();
      }catch(e){
        setStatus('Map failed');
        setDebug(String(e && e.message ? e.message : e || 'map error'));
        return;
      }

      setStatus('Loading…');
      setDebug('starting parent-doc fetch…');

      try{
        const res = await loadLivePoints(currentRange, requestId, force);
        if (!res || res.cancelled || requestId !== currentRequestId) return;

        const points = Array.isArray(res.points) ? res.points : [];
        const fields = Array.isArray(res.fields) ? res.fields : [];
        const summaries = Array.isArray(res.summaries) ? res.summaries : [];

        if (points.length){
          cacheRangeResult(currentRange, { points, fields, summaries });
        }

        const finalData = points.length
          ? { points, fields, summaries }
          : (getCachedRangeResult(currentRange) || { points, fields, summaries });

        const finalPoints = Array.isArray(finalData.points) ? finalData.points : [];
        const finalFields = Array.isArray(finalData.fields) ? finalData.fields : fields;
        lastFieldSummaries = Array.isArray(finalData.summaries) ? finalData.summaries : summaries;
        lastFieldDocs = finalFields;

        if (!finalPoints.length){
          clearMapOverlays();
          setPointMeta(0);
          updateLegendDynamic(0.1, 1.0);
          fitToFields(finalFields);
          setStatus('No points');
          setDebug('parent docs loaded but no usable points for this range');
          return;
        }

        drawRadarLikeBlobs(finalPoints, finalFields);
        setStatus(points.length ? 'Live' : 'Cached');
      }catch(e){
        console.warn('[Dev Rain Map] render failed:', e);
        const cached = getCachedRangeResult(currentRange);
        if (cached){
          lastFieldSummaries = Array.isArray(cached.summaries) ? cached.summaries : [];
          lastFieldDocs = Array.isArray(cached.fields) ? cached.fields : [];
          drawRadarLikeBlobs(cached.points || [], cached.fields || []);
          setStatus('Cached');
          setDebug('live failed • showing cached');
          return;
        }
        clearMapOverlays();
        setPointMeta(0);
        setStatus('Load failed');
        setDebug(String(e && e.message ? e.message : e || 'render failed'));
      }
    }

    function wireUi(){
      const btnMenu = $('btnMenu');
      const menuPanel = $('menuPanel');
      const btnRefresh = $('btnRefresh');

      if (btnMenu && menuPanel){
        btnMenu.addEventListener('click', (e)=>{
          e.preventDefault();
          e.stopPropagation();
          menuPanel.classList.toggle('open');
        });

        document.addEventListener('click', (e)=>{
          if (!menuPanel.classList.contains('open')) return;
          if (menuPanel.contains(e.target) || btnMenu.contains(e.target)) return;
          menuPanel.classList.remove('open');
        });
      }

      btnRefresh?.addEventListener('click', ()=>{
        renderRain(true);
      });

      $('viewSel')?.addEventListener('change', updateMapStyle);

      $('radiusSel')?.addEventListener('change', ()=>{
        renderRain(false);
      });

      $('rangeSel')?.addEventListener('change', ()=>{
        renderRain(false);
      });
    }

    async function startRainMap(){
      try{
        detectLayoutMode();
        await initFirebase();
        await waitForGoogleMaps();
        ensureMap();
        wireUi();
        updateLegendDynamic(0.1, 1.0);
        renderRain(true);
      }catch(e){
        console.warn('[Dev Rain Map] startup failed:', e);
        setStatus('Startup failed');
        setDebug(String(e && e.message ? e.message : e || 'startup error'));
      }
    }

    window.startRainMap = startRainMap;
  </script>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCzKBEQ1-wCJ8_nv1dR3wQI0nTk1IrgWzY&callback=startRainMap"></script>
