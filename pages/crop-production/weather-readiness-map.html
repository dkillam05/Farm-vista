<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>FarmVista • Weather / Readiness Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#3B7E46"/>

  <link rel="manifest" href="/Farm-vista/manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="/Farm-vista/assets/icons/apple-touch-icon.png"/>
  <link rel="icon" href="/Farm-vista/assets/icons/icon-192.png"/>

  <script src="/Farm-vista/js/theme-boot.js"></script>
  <link rel="stylesheet" href="/Farm-vista/assets/css/theme.css"/>
  <link rel="stylesheet" href="/Farm-vista/assets/css/app.css"/>

  <script src="/Farm-vista/js/firebase-config.js"></script>

  <script>
    window.FV_DATE_RANGE_PICKER_CONFIG = {
      disallowFuture: true,
      maxLookbackDays: 30
    };
  </script>
  <script src="/Farm-vista/js/fv-date-range-picker.js"></script>

  <script>
    (function(){
      if(!customElements.get('fv-shell')){
        const s = document.createElement('script');
        s.src = '/Farm-vista/js/fv-shell.js';
        s.defer = true;
        document.head.appendChild(s);
      }
    })();
  </script>

  <style>
    :root{
      --glass: rgba(255,255,255,.84);
      --glass-border: rgba(255,255,255,.18);
      --glass-shadow: 0 14px 36px rgba(0,0,0,.18);
      --text-dark: #18211b;
      --blur: blur(14px);
      --menu-w: min(400px, calc(100vw - 18px));
    }

    html.dark{
      --glass: rgba(22,28,24,.80);
      --glass-border: rgba(255,255,255,.08);
      --glass-shadow: 0 16px 44px rgba(0,0,0,.38);
      --text-dark: #f3f7f2;
    }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#253327;
    }

    body{
      color:var(--text-dark);
    }

    fv-shell{
      display:block;
      width:100%;
      height:100%;
    }

    .rain-page{
      position:fixed;
      left:0;
      right:0;
      top:calc(var(--hdr-h, 74px) + env(safe-area-inset-top, 0px));
      bottom:calc(var(--ftr-h, 42px));
      overflow:hidden;
      overflow-x:hidden;
      background:#233125;
    }

    .map-stage,
    #rainMap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    #rainMap{
      background:#dfe5dd;
    }

    .glass{
      background:rgba(255,255,255,.96);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 14px 36px rgba(0,0,0,.18);
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    html.dark .glass{
      background:rgba(22,28,24,.96);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 16px 44px rgba(0,0,0,.38);
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .top-left-tools{
      position:absolute;
      top:10px;
      left:10px;
      z-index:35;
      pointer-events:none;
    }

    .top-left-tools > *{
      pointer-events:auto;
    }

    .top-tools{
      position:absolute;
      top:10px;
      right:10px;
      z-index:35;
      pointer-events:auto;
    }

    .icon-btn{
      width:48px;
      height:48px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      color:var(--text-dark);
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      padding:0;
      text-decoration:none;
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      display:block;
      flex:0 0 auto;
    }

    .icon-btn:active{
      transform:translateY(1px);
    }

    .panel-menu{
      position:absolute;
      top:58px;
      right:0;
      z-index:36;
      width:var(--menu-w);
      max-width:calc(100vw - 12px);
      padding:14px;
      border-radius:18px;
      display:none;
      pointer-events:auto;
      max-height:min(78vh, 760px);
      overflow-y:auto;
      overflow-x:hidden;
      box-sizing:border-box;
      overscroll-behavior:contain;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }

    .panel-menu::-webkit-scrollbar{
      width:0;
      height:0;
      display:none;
    }

    .panel-menu *{
      box-sizing:border-box;
      min-width:0;
    }

    .panel-menu.open{
      display:block;
    }

    .menu-field{
      margin-bottom:12px;
      position:relative;
      min-width:0;
      overflow:visible;
    }

    .menu-field:last-child{
      margin-bottom:0;
    }

    .menu-field label{
      display:block;
      margin:0 0 6px;
      font-size:10px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--text-dark);
      opacity:.84;
    }

    .menu-select{
      width:100%;
      max-width:100%;
      appearance:none;
      -webkit-appearance:none;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:
        linear-gradient(45deg, transparent 50%, rgba(0,0,0,.42) 50%),
        linear-gradient(135deg, rgba(0,0,0,.42) 50%, transparent 50%),
        color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      background-position:
        calc(100% - 21px) calc(50% - 3px),
        calc(100% - 13px) calc(50% - 3px),
        0 0;
      background-size:8px 8px, 8px 8px, 100% 100%;
      background-repeat:no-repeat;
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px 38px 12px 12px;
      outline:none;
      box-sizing:border-box;
    }

    .menu-input{
      width:100%;
      max-width:100%;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:color-mix(in srgb, var(--surface) 90%, #ffffff 10%);
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:800;
      padding:12px 14px;
      outline:none;
      box-sizing:border-box;
      cursor:pointer;
      min-height:46px;
      line-height:1.2;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .menu-input::placeholder{
      color:color-mix(in srgb, var(--text-dark) 72%, transparent 28%);
      opacity:1;
    }

    .menu-btn{
      width:100%;
      max-width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      border:none;
      border-radius:14px;
      background:color-mix(in srgb, #2F6C3C 88%, #ffffff 12%);
      color:#fff;
      font:inherit;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(47,108,60,.28);
      text-align:center;
      white-space:normal;
    }

    .menu-btn:active{
      transform:translateY(1px);
    }

    .menu-inline{
      display:grid;
      gap:8px;
      margin-top:2px;
      min-width:0;
      overflow:hidden;
    }

    .menu-pill{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border:1px solid rgba(0,0,0,.06);
      border-radius:12px;
      padding:10px 12px;
      background:color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
      font-size:13px;
      font-weight:900;
      color:var(--text-dark);
      min-width:0;
      overflow:hidden;
    }

    .menu-pill > span{
      min-width:0;
    }

    .menu-pill .mutedish{
      opacity:.72;
      font-weight:800;
      flex:0 0 auto;
    }

    .menu-debug{
      font-size:11px;
      color:var(--text-dark);
      opacity:.78;
      line-height:1.25;
      margin-top:2px;
      word-break:break-word;
      overflow-wrap:anywhere;
      min-width:0;
    }

    .mode-section[hidden]{
      display:none !important;
    }

    #calendarPopover{
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      left:auto;
      width:100%;
      max-width:100%;
      background:var(--glass);
      border:1px solid var(--glass-border);
      border-radius:16px;
      box-shadow:0 14px 45px rgba(0,0,0,.25);
      padding:12px;
      display:none;
      z-index:100000;
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
      box-sizing:border-box;
      overflow-x:hidden;
    }

    .cal-top{
      display:grid;
      grid-template-columns:minmax(0, 1fr) minmax(0, 1fr) 36px;
      gap:8px;
      align-items:center;
      margin-bottom:10px;
      min-width:0;
    }

    .cal-xbtn{
      width:34px;
      height:34px;
      border-radius:12px;
      border:1px solid rgba(0,0,0,.08);
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text-dark);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      padding:0;
    }

    .cal-xbtn svg{
      width:18px;
      height:18px;
      display:block;
    }

    .cal-xbtn:active{
      transform:translateY(1px);
    }

    #calDays{
      display:grid;
      grid-template-columns:repeat(7, minmax(0, 1fr));
      gap:6px;
      min-width:0;
      width:100%;
    }

    .cal-day{
      border:1px solid rgba(0,0,0,.08);
      border-radius:10px;
      min-height:40px;
      padding:8px 0;
      text-align:center;
      font-size:12px;
      cursor:pointer;
      background:color-mix(in srgb, var(--surface) 94%, #ffffff 6%);
      user-select:none;
      color:var(--text-dark);
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .cal-day.other-month{
      opacity:.45;
    }

    .cal-day.in-range{
      background:color-mix(in srgb, #2F6C3C 14%, var(--surface) 86%);
    }

    .cal-day.range-start,
    .cal-day.range-end,
    .cal-day.single-day,
    .cal-day.start-selected{
      background:#2F6C3C;
      color:#fff;
      border-color:transparent;
    }

    .cal-footer{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
      min-width:0;
    }

    .cal-actions{
      display:flex;
      gap:8px;
      min-width:0;
      flex-wrap:wrap;
      justify-content:flex-end;
      flex:0 0 auto;
    }

    .cal-btn{
      min-width:auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:38px;
      border-radius:12px;
      font:inherit;
      font-size:13px;
      font-weight:900;
      padding:0 12px;
      cursor:pointer;
      white-space:nowrap;
    }

    .cal-btn-neutral{
      border:1px solid rgba(0,0,0,.08);
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text-dark);
    }

    .cal-btn-primary{
      border:none;
      background:#2F6C3C;
      color:#fff;
    }

    #rangeSummary{
      display:block;
      min-width:0;
      flex:1 1 auto;
      font-size:12px;
      line-height:1.35;
      opacity:.86;
      overflow-wrap:anywhere;
    }

    .left-legend{
      position:absolute;
      left:8px;
      top:50%;
      transform:translateY(-50%);
      z-index:20;
      width:40px;
      pointer-events:none;
    }

    .legend-wrap{
      position:relative;
      width:100%;
      height:min(46vh, 380px);
      min-height:230px;
      border-radius:14px;
      overflow:visible;
    }

    .legend-bar{
      position:absolute;
      left:0;
      top:0;
      width:12px;
      height:100%;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      background:
        linear-gradient(
          to top,
          #58a8ff 0%,
          #6cc7ff 12%,
          #55d79a 24%,
          #46d14d 38%,
          #d7df49 54%,
          #f0b843 72%,
          #ef6b46 88%,
          #d92cc6 100%
        );
    }

    .legend-bar.readiness{
      background:
        linear-gradient(
          to top,
          #c83b3b 0%,
          #e16b43 14%,
          #f0b843 32%,
          #d7df49 50%,
          #88c14d 68%,
          #53b85d 84%,
          #2f8f4b 100%
        );
    }

    .legend-label{
      position:absolute;
      left:18px;
      transform:translateY(50%);
      font-size:10px;
      font-weight:900;
      color:#fff;
      line-height:1;
      text-shadow:0 1px 4px rgba(0,0,0,.55);
      white-space:nowrap;
    }

    .legend-label.l1{ bottom:100%; transform:translateY(0); }
    .legend-label.l2{ bottom:83%; }
    .legend-label.l3{ bottom:68%; }
    .legend-label.l4{ bottom:50%; }
    .legend-label.l5{ bottom:34%; }
    .legend-label.l6{ bottom:18%; }
    .legend-label.l7{ bottom:0; transform:translateY(0); }

    .popup-card{
      max-width:260px;
      font-size:13px;
      line-height:1.28;
      color:#18211b;
    }

    .popup-card .name{
      font-weight:900;
      margin:0 0 4px;
    }

    .popup-card .muted{
      opacity:.76;
    }

    .mono{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-weight:800;
    }

    .radar-sep{
      height:1px;
      margin:12px 0;
      background:rgba(0,0,0,.08);
    }

    .menu-btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .menu-btn-secondary{
      width:100%;
      max-width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:44px;
      border:1px solid rgba(0,0,0,.08);
      border-radius:14px;
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text-dark);
      font:inherit;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
      text-align:center;
      white-space:normal;
    }

    .menu-btn-secondary:active{
      transform:translateY(1px);
    }

    .menu-range{
      width:100%;
      accent-color:#2F6C3C;
      cursor:pointer;
    }

    .radar-timeline{
      position:absolute;
      left:50%;
      bottom:80px;
      transform:translateX(-50%);
      z-index:26;
      width:min(92vw, 760px);
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      background:var(--glass);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow);
      backdrop-filter:var(--blur);
      -webkit-backdrop-filter:var(--blur);
    }

    .radar-timeline[hidden]{
      display:none !important;
    }

    .radar-mini-btn{
      width:34px;
      height:34px;
      border:none;
      border-radius:999px;
      display:grid;
      place-items:center;
      cursor:pointer;
      padding:0;
      flex:0 0 auto;
      background:color-mix(in srgb, #2F6C3C 88%, #ffffff 12%);
      color:#fff;
      box-shadow:0 8px 20px rgba(47,108,60,.22);
    }

    .radar-mini-btn.secondary{
      background:color-mix(in srgb, var(--surface) 92%, #ffffff 8%);
      color:var(--text-dark);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:none;
    }

    .radar-mini-btn svg{
      width:15px;
      height:15px;
      display:block;
    }

    .radar-mini-btn:active{
      transform:translateY(1px);
    }

    .radar-slider-wrap{
      flex:1 1 auto;
      min-width:0;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .radar-slider{
      flex:1 1 auto;
      min-width:0;
      margin:0;
      accent-color:#2F6C3C;
      cursor:pointer;
    }

    .radar-slider-label{
      flex:0 0 auto;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
      color:var(--text-dark);
      opacity:.88;
      min-width:72px;
      text-align:right;
    }

    #rainMap .gm-bundled-control,
    #rainMap .gm-bundled-control-on-bottom,
    #rainMap .gmnoprint[style*="bottom"][style*="right"]{
      display:none !important;
    }

    @media (max-width:860px){
      :root{
        --menu-w: min(360px, calc(100vw - 16px));
      }
    }

    @media (max-width:680px){
      :root{
        --menu-w: min(350px, calc(100vw - 12px));
      }

      .icon-btn{
        width:44px;
        height:44px;
      }

      .panel-menu{
        top:52px;
        width:var(--menu-w);
        max-width:calc(100vw - 12px);
        padding:10px;
        border-radius:16px;
      }

      .menu-field{
        margin-bottom:10px;
      }

      .menu-select,
      .menu-input{
        font-size:16px;
      }

      #calendarPopover{
        width:100%;
        max-width:100%;
        right:0;
        left:auto;
        padding:9px;
        border-radius:14px;
      }

      .cal-top{
        grid-template-columns:minmax(0, 1fr) minmax(0, 1fr) 32px;
        gap:6px;
        margin-bottom:8px;
      }

      .cal-top .menu-select{
        padding:10px 32px 10px 10px !important;
        font-size:14px;
      }

      .cal-xbtn{
        width:32px;
        height:32px;
        border-radius:10px;
      }

      #calDays{
        gap:4px;
      }

      .cal-day{
        min-height:32px;
        padding:6px 0;
        font-size:10px;
        border-radius:8px;
      }

      .cal-footer{
        flex-direction:column;
        align-items:stretch;
        gap:8px;
      }

      #rangeSummary{
        order:1;
        font-size:11px;
      }

      .cal-actions{
        order:2;
        width:100%;
        justify-content:stretch;
      }

      .cal-actions .cal-btn{
        flex:1 1 0;
      }

      .cal-btn{
        min-height:36px;
        font-size:12px;
        padding:0 10px;
      }

      .left-legend{
        left:4px;
        width:30px;
      }

      .legend-wrap{
        height:min(38vh, 280px);
        min-height:180px;
      }

      .legend-bar{
        width:10px;
      }

      .legend-label{
        left:15px;
        font-size:9px;
      }

      .radar-timeline{
        width:min(94vw, 760px);
        bottom:80px;
        gap:6px;
        padding:7px 8px;
      }

      .radar-mini-btn{
        width:32px;
        height:32px;
      }

      .radar-slider-label{
        min-width:58px;
        font-size:10px;
      }
    }

    @media (max-width:420px){
      :root{
        --menu-w: calc(100vw - 10px);
      }

      .panel-menu{
        width:var(--menu-w);
        max-width:var(--menu-w);
        right:0;
        padding:9px;
      }

      #calendarPopover{
        padding:8px;
      }

      .cal-top .menu-select{
        font-size:13px;
      }

      .cal-day{
        min-height:30px;
        font-size:10px;
      }

      .cal-btn{
        min-height:38px;
      }

      .radar-slider-label{
        display:none;
      }
    }
  </style>
</head>

<body>
  <fv-shell data-boot-hold-ms="3000">
    <div class="rain-page">
      <div class="map-stage">
        <div id="rainMap" aria-label="Weather and readiness map"></div>

        <div class="top-left-tools">
          <a
            id="btnBack"
            class="icon-btn"
            href="/Farm-vista/pages/crop-production/field-weather.html"
            aria-label="Back to Field Weather"
            title="Back to Field Weather"
          >
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>

        <div class="left-legend" aria-label="Map legend">
          <div class="legend-wrap">
            <div id="legendBar" class="legend-bar"></div>
            <span class="legend-label l1" id="legendTop">Max</span>
            <span class="legend-label l2" id="legendQ5"></span>
            <span class="legend-label l3" id="legendQ4"></span>
            <span class="legend-label l4" id="legendMid"></span>
            <span class="legend-label l5" id="legendQ2"></span>
            <span class="legend-label l6" id="legendQ1"></span>
            <span class="legend-label l7" id="legendBottom">Min</span>
          </div>
        </div>

        <div id="radarTimeline" class="radar-timeline" hidden>
          <button id="btnTimelinePlay" class="radar-mini-btn" type="button" aria-label="Play radar" title="Play radar">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M8 6.5V17.5L17 12L8 6.5Z"></path>
            </svg>
          </button>

          <button id="btnTimelinePause" class="radar-mini-btn secondary" type="button" aria-label="Pause radar" title="Pause radar">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M7 6H10V18H7V6ZM14 6H17V18H14V6Z"></path>
            </svg>

<script type="module">
  import { startWeatherMap } from '/Farm-vista/js/rainfallmap/app.js';
  import { appState } from '/Farm-vista/js/rainfallmap/store.js';

  window.startWeatherMap = startWeatherMap;

  (() => {
    const RADAR_MANIFEST_URL = 'https://farmvista-radar-service-300398089669.us-central1.run.app/api/radar/manifest?minutes=300';
    const DEFAULT_OPACITY = 0.50;
    const DEFAULT_SPEED_MS = 780;
    const FRAME_FADE_MS = 180;
    const LAST_FRAME_DELAY_MS = 140;

    const radarState = {
      overlay: null,
      enabled: true,
      opacity: DEFAULT_OPACITY,
      uiBuilt: false,
      manifest: null,
      frames: [],
      frameIndex: 0,
      playing: false,
      speedMs: DEFAULT_SPEED_MS,
      timer: null,
      loading: false,
      idleTimer: null,
      prefetch: new Map(),
      booted: false,
      scrubbing: false
    };

    function effectiveOpacity(value){
      return Math.max(0.05, Math.min(1, Number(value || 0)));
    }

    function setRadarStatus(text){
      const el = document.getElementById('radarStatusText');
      if (el) el.textContent = text;
    }

    function setRadarTimeText(text){
      const el = document.getElementById('radarTimeText');
      if (el) el.textContent = text;

      const timelineLabel = document.getElementById('radarTimelineLabel');
      if (timelineLabel) timelineLabel.textContent = text || '--:--';
    }

    function setRadarOpacityText(){
      const el = document.getElementById('radarOpacityMenuText');
      if (el) el.textContent = `${Math.round(radarState.opacity * 100)}%`;
    }

    function setRadarToggleText(){
      const el = document.getElementById('btnRadarToggle');
      if (el) el.textContent = radarState.enabled ? 'Radar On' : 'Radar Off';
      updateRadarTimelineVisibility();
    }

    function setRadarPlayText(){
      const el = document.getElementById('btnRadarPlay');
      if (el) el.textContent = radarState.playing ? 'Pause Radar' : 'Play Radar';

      const playBtn = document.getElementById('btnTimelinePlay');
      const pauseBtn = document.getElementById('btnTimelinePause');

      if (playBtn){
        playBtn.style.opacity = radarState.playing ? '.55' : '1';
      }
      if (pauseBtn){
        pauseBtn.style.opacity = radarState.playing ? '1' : '.55';
      }
    }

    function setRadarFrameCountText(){
      const count = radarState.frames.length || 0;
      const el = document.getElementById('radarFrameCountText');
      if (el) el.textContent = String(count);

      const slider = document.getElementById('radarTimelineSlider');
      if (slider){
        slider.max = String(Math.max(0, count - 1));
        slider.value = String(Math.max(0, Math.min(count - 1, radarState.frameIndex)));
      }
    }

    function updateRadarTimelineVisibility(){
      const wrap = document.getElementById('radarTimeline');
      if (!wrap) return;

      if (radarState.enabled && radarState.frames.length > 0){
        wrap.hidden = false;
      } else {
        wrap.hidden = true;
      }
    }

    function updateRadarTimelineSlider(){
      const slider = document.getElementById('radarTimelineSlider');
      if (!slider) return;
      slider.max = String(Math.max(0, (radarState.frames.length || 1) - 1));
      slider.value = String(Math.max(0, Math.min(radarState.frames.length - 1, radarState.frameIndex)));
    }

    function formatRadarTime(iso){
      if (!iso) return '--:--';
      try{
        return new Intl.DateTimeFormat('en-US', {
          month: 'numeric',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          timeZone: 'America/Chicago'
        }).format(new Date(iso));
      }catch(_){
        return iso;
      }
    }

    function stopRadarTimer(){
      if (radarState.timer){
        clearTimeout(radarState.timer);
        radarState.timer = null;
      }
    }

    function scheduleRadarTimer(){
      stopRadarTimer();

      if (!radarState.enabled || !radarState.playing || radarState.frames.length <= 1 || radarState.scrubbing){
        return;
      }

      const baseDelay = Math.max(250, Math.min(2200, Number(radarState.speedMs || DEFAULT_SPEED_MS)));
      const isLastFrame = radarState.frameIndex >= radarState.frames.length - 1;
      const delay = isLastFrame ? LAST_FRAME_DELAY_MS : baseDelay;

      radarState.timer = setTimeout(() => {
        nextRadarFrame();
        scheduleRadarTimer();
      }, delay);
    }

    function currentFrame(){
      if (!radarState.frames.length) return null;
      const idx = Math.max(0, Math.min(radarState.frames.length - 1, radarState.frameIndex));
      return radarState.frames[idx] || null;
    }

    function cloneBounds(bounds){
      if (!bounds) return null;
      return new google.maps.LatLngBounds(bounds.getSouthWest(), bounds.getNorthEast());
    }

    function lngLatToMercator(lng, lat){
      const originShift = 20037508.342789244;
      const mx = (lng * originShift) / 180.0;
      let my = Math.log(Math.tan((90 + lat) * Math.PI / 360.0)) / (Math.PI / 180.0);
      my = (my * originShift) / 180.0;
      return { x: mx, y: my };
    }

    function buildViewportWmsUrl(frame, map, boundsOverride = null){
      if (!frame?.wms || !map) return '';

      const bounds = boundsOverride || map.getBounds();
      const div = map.getDiv();
      if (!bounds || !div) return '';

      const ne = bounds.getNorthEast();
      const sw = bounds.getSouthWest();

      const topLeft = lngLatToMercator(sw.lng(), ne.lat());
      const bottomRight = lngLatToMercator(ne.lng(), sw.lat());

      const width = Math.max(256, Math.round(div.clientWidth || 256));
      const height = Math.max(256, Math.round(div.clientHeight || 256));

      const cfg = frame.wms;
      const params = new URLSearchParams({
        SERVICE: 'WMS',
        REQUEST: 'GetMap',
        VERSION: cfg.version || '1.1.1',
        LAYERS: cfg.layers,
        STYLES: '',
        FORMAT: cfg.format || 'image/png',
        TRANSPARENT: String(cfg.transparent !== false).toUpperCase(),
        SRS: cfg.srs || 'EPSG:3857',
        WIDTH: String(width),
        HEIGHT: String(height),
        BBOX: `${topLeft.x},${bottomRight.y},${bottomRight.x},${topLeft.y}`,
        TIME: cfg.time
      });

      return `${cfg.baseUrl}?${params.toString()}`;
    }

    function warmRadarUrl(url){
      if (!url || radarState.prefetch.has(url)) return;

      const img = new Image();
      img.decoding = 'async';
      img.loading = 'eager';
      img.src = url;

      radarState.prefetch.set(url, img);

      if (radarState.prefetch.size > 24){
        const firstKey = radarState.prefetch.keys().next().value;
        if (firstKey) radarState.prefetch.delete(firstKey);
      }
    }

    function warmNextRadarFrames(map, bounds){
      if (!map || !bounds || radarState.frames.length < 2) return;

      for (let i = 1; i <= 2; i++){
        const idx = (radarState.frameIndex + i) % radarState.frames.length;
        const frame = radarState.frames[idx];
        const url = buildViewportWmsUrl(frame, map, bounds);
        warmRadarUrl(url);
      }
    }

    function createRadarImageOverlayClass(){
      return class RadarImageOverlay extends google.maps.OverlayView {
        constructor(map){
          super();
          this.map = map;
          this.div = null;
          this.bounds = null;
          this.currentImg = null;
          this.lastUrl = '';
          this.visible = true;
          this.opacity = effectiveOpacity(DEFAULT_OPACITY);
          this.loadToken = 0;
          this.setMap(map);
        }

        onAdd(){
          this.div = document.createElement('div');
          this.div.style.position = 'absolute';
          this.div.style.pointerEvents = 'none';
          this.div.style.overflow = 'hidden';
          this.div.style.zIndex = '20';
          this.div.style.display = this.visible ? 'block' : 'none';

          const panes = this.getPanes();
          panes.overlayLayer.appendChild(this.div);
        }

        draw(){
          if (!this.div || !this.bounds) return;
          const projection = this.getProjection();
          if (!projection) return;

          const sw = projection.fromLatLngToDivPixel(this.bounds.getSouthWest());
          const ne = projection.fromLatLngToDivPixel(this.bounds.getNorthEast());
          if (!sw || !ne) return;

          const left = Math.min(sw.x, ne.x);
          const top = Math.min(ne.y, sw.y);
          const width = Math.max(1, Math.abs(ne.x - sw.x));
          const height = Math.max(1, Math.abs(sw.y - ne.y));

          this.div.style.left = `${left}px`;
          this.div.style.top = `${top}px`;
          this.div.style.width = `${width}px`;
          this.div.style.height = `${height}px`;

          Array.from(this.div.children).forEach((node) => {
            node.style.width = '100%';
            node.style.height = '100%';
          });
        }

        onRemove(){
          if (this.div && this.div.parentNode){
            this.div.parentNode.removeChild(this.div);
          }
          this.div = null;
          this.currentImg = null;
          this.lastUrl = '';
        }

        setVisible(flag){
          this.visible = !!flag;
          if (this.div){
            this.div.style.display = this.visible ? 'block' : 'none';
          }
        }

        setOpacity(value){
          this.opacity = effectiveOpacity(value);
          if (this.currentImg){
            this.currentImg.style.opacity = String(this.opacity);
          }
        }

        clear(){
          this.lastUrl = '';
          this.loadToken++;
          if (!this.div) return;
          this.div.innerHTML = '';
          this.currentImg = null;
        }

        setFrame(url, bounds){
          if (!url || !bounds){
            return;
          }

          this.bounds = bounds;
          this.draw();

          if (url === this.lastUrl && this.currentImg){
            return;
          }

          this.lastUrl = url;
          const token = ++this.loadToken;

          const img = new Image();
          img.decoding = 'async';
          img.loading = 'eager';
          img.alt = '';
          img.draggable = false;
          img.style.position = 'absolute';
          img.style.left = '0';
          img.style.top = '0';
          img.style.width = '100%';
          img.style.height = '100%';
          img.style.userSelect = 'none';
          img.style.pointerEvents = 'none';
          img.style.opacity = '0';
          img.style.transition = `opacity ${FRAME_FADE_MS}ms linear`;
          img.src = url;

          img.onload = () => {
            if (token !== this.loadToken || !this.div) return;

            const prev = this.currentImg;
            this.div.appendChild(img);
            this.currentImg = img;
            this.bounds = bounds;
            this.draw();

            requestAnimationFrame(() => {
              img.style.opacity = String(this.opacity);
              if (prev){
                prev.style.opacity = '0';
              }
            });

            if (prev){
              window.setTimeout(() => {
                if (prev.parentNode){
                  prev.parentNode.removeChild(prev);
                }
              }, FRAME_FADE_MS + 80);
            }
          };

          img.onerror = () => {
            if (token !== this.loadToken) return;
            setRadarStatus('frame load failed');
          };
        }
      };
    }

    function ensureRadarOverlay(){
      const map = appState.map;
      if (!map || !window.google || !google.maps || !google.maps.OverlayView) return null;

      if (!radarState.overlay){
        const RadarImageOverlay = createRadarImageOverlayClass();
        radarState.overlay = new RadarImageOverlay(map);
        radarState.overlay.setOpacity(radarState.opacity);
      }

      return radarState.overlay;
    }

    function renderRadarFrame(){
      const map = appState.map;
      if (!map){
        setRadarStatus('waiting on map');
        return;
      }

      const overlay = ensureRadarOverlay();
      if (!overlay){
        setRadarStatus('overlay unavailable');
        return;
      }

      if (!radarState.enabled){
        overlay.setVisible(false);
        setRadarStatus('off');
        setRadarTimeText('--:--');
        updateRadarTimelineVisibility();
        return;
      }

      const frame = currentFrame();
      if (!frame){
        setRadarStatus('no frames');
        setRadarTimeText('--:--');
        updateRadarTimelineSlider();
        updateRadarTimelineVisibility();
        return;
      }

      const bounds = map.getBounds();
      if (!bounds){
        setRadarStatus('waiting on bounds');
        return;
      }

      const safeBounds = cloneBounds(bounds);
      const imageUrl = buildViewportWmsUrl(frame, map, safeBounds);
      if (!imageUrl){
        setRadarStatus('no image url');
        return;
      }

      overlay.setVisible(true);
      overlay.setOpacity(radarState.opacity);
      overlay.setFrame(imageUrl, safeBounds);

      warmNextRadarFrames(map, safeBounds);

      setRadarStatus(radarState.playing ? 'animating' : 'paused');
      setRadarTimeText(formatRadarTime(frame.time));
      updateRadarTimelineSlider();
      updateRadarTimelineVisibility();
    }

    function nextRadarFrame(){
      if (!radarState.frames.length) return;
      radarState.frameIndex = (radarState.frameIndex + 1) % radarState.frames.length;
      renderRadarFrame();
    }

    async function loadRadarManifest(force = false){
      if (radarState.loading) return;
      radarState.loading = true;
      setRadarStatus(force ? 'reloading…' : 'loading…');

      try{
        const url = force
          ? `${RADAR_MANIFEST_URL}&_=${Date.now()}`
          : RADAR_MANIFEST_URL;

        const resp = await fetch(url, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`manifest ${resp.status}`);

        const manifest = await resp.json();
        const frames = Array.isArray(manifest?.frames) ? manifest.frames : [];

        radarState.manifest = manifest;
        radarState.frames = frames;
        radarState.frameIndex = Math.max(0, frames.length - 1);
        radarState.speedMs = Number(manifest?.defaultSpeedMs || DEFAULT_SPEED_MS);

        const newestFrame = frames[radarState.frameIndex];
        setRadarTimeText(formatRadarTime(newestFrame?.time));

        const speedSel = document.getElementById('radarSpeedSel');
        if (speedSel){
          speedSel.value = String(radarState.speedMs);
          if (!speedSel.querySelector(`option[value="${radarState.speedMs}"]`)){
            speedSel.value = String(DEFAULT_SPEED_MS);
            radarState.speedMs = DEFAULT_SPEED_MS;
          }
        }

        setRadarFrameCountText();
        updateRadarTimelineVisibility();

        const waitForBoundsAndRender = () => {
          const map = appState.map;
          if (!map) return;

          const bounds = map.getBounds();
          if (!bounds){
            setTimeout(waitForBoundsAndRender, 120);
            return;
          }

          renderRadarFrame();
          scheduleRadarTimer();
        };

        waitForBoundsAndRender();
      }catch(err){
        console.warn('[WeatherReadinessRadar] manifest load failed:', err);
        setRadarStatus('load failed');
      }finally{
        radarState.loading = false;
      }
    }

    function updateRadarOpacity(){
      radarState.opacity = effectiveOpacity(radarState.opacity);
      const overlay = ensureRadarOverlay();
      if (overlay){
        overlay.setOpacity(radarState.opacity);
      }
      setRadarOpacityText();
    }

          </div>

        <div class="menu-field">

        timelineSlider.addEventListener('pointerup', endScrub);
        timelineSlider.addEventListener('touchend', endScrub);
        timelineSlider.addEventListener('mouseup', endScrub);
      }

      setRadarOpacityText();
      setRadarToggleText();
      setRadarPlayText();
      setRadarFrameCountText();
      updateRadarTimelineVisibility();
      radarState.uiBuilt = true;
    }

    function hideLowerRightControlAgain(){
      try{
        const root = document.getElementById('rainMap');
        if (!root) return;

        root.querySelectorAll('.gm-bundled-control, .gm-bundled-control-on-bottom, .gmnoprint').forEach(node => {
          const style = window.getComputedStyle(node);
          const right = style.right || '';
          const bottom = style.bottom || '';
          if (
            node.classList.contains('gm-bundled-control') ||
            node.classList.contains('gm-bundled-control-on-bottom') ||
            (right !== 'auto' && bottom !== 'auto')
          ){
            node.style.display = 'none';
          }
        });
      }catch(_){}
    }

    function waitForMap(timeoutMs = 30000){
      const start = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          if (appState.map){
            resolve(appState.map);
            return;
          }
          if (Date.now() - start > timeoutMs){
            reject(new Error('Timed out waiting for map'));
            return;
          }
          setTimeout(tick, 100);
        };
        tick();
      });
    }

    function waitForGoogleMaps(timeoutMs = 30000){
      const start = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          if (window.google && window.google.maps){
            resolve();
            return;
          }
          if (Date.now() - start > timeoutMs){
            reject(new Error('Timed out waiting for google maps'));
            return;
          }
          setTimeout(tick, 100);
        };
        tick();
      });
    }

    async function bootDevRadar(){
      try{
        await waitForMap();
        ensureRadarOverlay();

        if (!radarState.booted){
          appState.map.addListener('idle', () => {
            hideLowerRightControlAgain();

            if (radarState.idleTimer){
              clearTimeout(radarState.idleTimer);
            }

            radarState.idleTimer = setTimeout(() => {
              if (radarState.enabled && radarState.frames.length && !radarState.scrubbing){
                renderRadarFrame();
              }
            }, 120);
          });

          radarState.booted = true;
        }

        buildRadarMenuUi();
        await loadRadarManifest(false);
        hideLowerRightControlAgain();
        setTimeout(hideLowerRightControlAgain, 1200);
      }catch(err){
        console.warn('[WeatherReadinessRadar] boot failed:', err);
      }
    }

    async function bootPage(){
      try{
        await waitForGoogleMaps();

        if (!appState.map){
          await startWeatherMap();
        }

        await bootDevRadar();
      }catch(err){
        console.warn('[WeatherReadinessRadar] page boot failed:', err);
      }
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        bootPage();
      }, 250);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible'){
        setTimeout(async () => {
          try{
            await waitForGoogleMaps();

            if (!appState.map){
              await startWeatherMap();
            }

            buildRadarMenuUi();
            ensureRadarOverlay();
            renderRadarFrame();
            scheduleRadarTimer();
            hideLowerRightControlAgain();
          }catch(err){
            console.warn('[WeatherReadinessRadar] visibility boot failed:', err);
          }
        }, 300);
      } else {
        stopRadarTimer();
      }
    });
  })();
</script>
